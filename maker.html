<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CFC Quiz · Maker</title>
<style>
  /* ============================================================
     THEME — clean & classic, subtle motion. Tool UI (not the show).
     ============================================================ */
  :root {
    --bg:        #f4f5f7;
    --panel:     #ffffff;
    --ink:       #1d2330;
    --ink-soft:  #5b6472;
    --line:      #e3e6eb;
    --line-2:    #cfd4dd;
    --accent:    #4f46e5;
    --accent-ink:#ffffff;
    --accent-soft:#eef0fe;
    --danger:    #d6455d;
    --ok:        #1f9d6b;
    --radius:    10px;
    --shadow:    0 1px 2px rgba(20,28,48,.06), 0 6px 20px rgba(20,28,48,.06);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: var(--font); color: var(--ink);
    background: var(--bg); font-size: 14px; line-height: 1.45;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; font-size: inherit; }

  /* ---- Layout ---- */
  .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
  .topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 18px; background: var(--panel);
    border-bottom: 1px solid var(--line); box-shadow: var(--shadow); z-index: 5;
  }
  .brand { font-weight: 700; letter-spacing: .2px; display: flex; align-items: center; gap: 9px; }
  .brand .dot { width: 11px; height: 11px; border-radius: 3px; background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft); }
  .brand small { font-weight: 500; color: var(--ink-soft); }
  .topbar .spacer { flex: 1; }
  .saved { font-size: 12px; color: var(--ink-soft); display: flex; align-items: center; gap: 6px; }
  .saved .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); }

  .main { display: grid; grid-template-columns: 300px 1fr; min-height: 0; }
  .sidebar { border-right: 1px solid var(--line); background: var(--panel);
    overflow-y: auto; display: flex; flex-direction: column; }
  .editor { overflow-y: auto; padding: 22px 26px; }

  /* ---- Buttons ---- */
  .btn {
    border: 1px solid var(--line-2); background: #fff; color: var(--ink);
    padding: 7px 13px; border-radius: 8px; transition: transform .08s ease, box-shadow .15s ease, background .15s ease, border-color .15s;
    display: inline-flex; align-items: center; gap: 7px; font-weight: 500;
  }
  .btn:hover { border-color: var(--accent); box-shadow: var(--shadow); }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.05); }
  .btn.ghost { border-color: transparent; background: transparent; padding: 6px 9px; }
  .btn.ghost:hover { background: var(--accent-soft); border-color: transparent; box-shadow: none; }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn.sm { padding: 4px 9px; font-size: 12.5px; }
  .icon-btn { border: none; background: transparent; padding: 4px; border-radius: 6px; color: var(--ink-soft); line-height: 0; }
  .icon-btn:hover { background: var(--accent-soft); color: var(--accent); }

  /* ---- Sidebar sections ---- */
  .sect { padding: 14px 14px 8px; }
  .sect + .sect { border-top: 1px solid var(--line); }
  .sect-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .sect-head h3 { margin: 0; font-size: 11.5px; text-transform: uppercase; letter-spacing: .8px; color: var(--ink-soft); }

  .list { display: flex; flex-direction: column; gap: 4px; }
  .row {
    display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 8px;
    border: 1px solid transparent; cursor: pointer; transition: background .12s, border-color .12s;
  }
  .row:hover { background: var(--bg); }
  .row.active { background: var(--accent-soft); border-color: #d9dcfb; }
  .row .grow { flex: 1; min-width: 0; }
  .row .title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .sub { font-size: 12px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .badge { font-size: 10.5px; font-weight: 700; color: var(--accent); background: var(--accent-soft);
    padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: .4px; }
  .row .tools { display: none; gap: 2px; }
  .row:hover .tools, .row.active .tools { display: flex; }

  .empty { color: var(--ink-soft); font-size: 13px; padding: 10px 9px; }

  /* ---- Editor ---- */
  .ed-head { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .ed-head .type-chip { font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-soft);
    padding: 4px 11px; border-radius: 20px; }
  .ed-head h2 { margin: 0; font-size: 19px; }
  .ed-sub { color: var(--ink-soft); margin: 2px 0 20px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px 22px; max-width: 760px; }

  .field { margin-bottom: 18px; }
  .field > label { display: block; font-weight: 600; margin-bottom: 6px; }
  .field .hint { font-weight: 400; color: var(--ink-soft); font-size: 12.5px; margin-left: 6px; }
  .field input[type=text], .field input[type=number], .field textarea, .field select {
    width: 100%; padding: 9px 11px; border: 1px solid var(--line-2); border-radius: 8px;
    background: #fff; color: var(--ink); transition: border-color .15s, box-shadow .15s; outline: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .field textarea { resize: vertical; min-height: 70px; }

  /* choices */
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice { display: flex; align-items: center; gap: 9px; }
  .choice .mark { flex: 0 0 auto; }
  .choice input[type=text] { flex: 1; }
  .choice .correct-tag { font-size: 11px; font-weight: 700; color: var(--ok); opacity: 0; transition: opacity .15s; }
  .choice.is-correct .correct-tag { opacity: 1; }
  .choice .mark input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

  /* matching pairs */
  .pairs { display: flex; flex-direction: column; gap: 8px; }
  .pair { display: grid; grid-template-columns: 1fr auto 1fr auto; gap: 8px; align-items: center; }
  .pair .link { color: var(--ink-soft); }

  /* boolean toggle */
  .seg { display: inline-flex; border: 1px solid var(--line-2); border-radius: 8px; overflow: hidden; }
  .seg button { border: none; background: #fff; padding: 8px 18px; color: var(--ink-soft); font-weight: 600; }
  .seg button.on { background: var(--accent); color: #fff; }

  /* image field */
  .imgfield { display: flex; gap: 14px; align-items: flex-start; }
  .imgfield .thumb { width: 120px; height: 84px; border: 1px dashed var(--line-2); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--ink-soft); font-size: 12px; background: var(--bg); }
  .imgfield .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .imgfield .ctrls { display: flex; flex-direction: column; gap: 8px; flex: 1; }

  .add-row { width: 100%; justify-content: center; border-style: dashed; color: var(--ink-soft); }
  .add-row:hover { color: var(--accent); }

  /* ---- Type picker popover ---- */
  .picker { position: fixed; inset: 0; background: rgba(20,28,48,.32); display: none; z-index: 50;
    align-items: center; justify-content: center; animation: fade .15s ease; }
  .picker.open { display: flex; }
  .picker .sheet { background: #fff; border-radius: 14px; box-shadow: 0 20px 60px rgba(20,28,48,.3);
    width: min(620px, 92vw); max-height: 80vh; overflow: auto; padding: 22px; animation: pop .18s cubic-bezier(.2,.8,.3,1.2); }
  .picker h3 { margin: 0 0 4px; }
  .picker .muted { color: var(--ink-soft); margin: 0 0 16px; }
  .pgroup { margin-bottom: 16px; }
  .pgroup h4 { font-size: 11.5px; text-transform: uppercase; letter-spacing: .8px; color: var(--ink-soft); margin: 0 0 8px; }
  .ptiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .ptile { text-align: left; border: 1px solid var(--line); border-radius: 10px; padding: 11px 13px; background: #fff;
    transition: border-color .12s, box-shadow .12s, transform .08s; }
  .ptile:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateY(-1px); }
  .ptile .pt-name { font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .ptile .pt-desc { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .ptile .pt-ico { font-size: 16px; }

  /* ---- Dropdown menu ---- */
  .menu-wrap { position: relative; }
  .menu { position: absolute; right: 0; top: calc(100% + 6px); background: #fff; border: 1px solid var(--line);
    border-radius: 10px; box-shadow: 0 12px 36px rgba(20,28,48,.18); padding: 6px; min-width: 210px; display: none; z-index: 40;
    animation: pop .14s ease; }
  .menu.open { display: block; }
  .menu button { display: flex; width: 100%; align-items: center; gap: 9px; padding: 9px 11px; border: none;
    background: transparent; border-radius: 7px; text-align: left; color: var(--ink); }
  .menu button:hover { background: var(--accent-soft); }
  .menu .sep { height: 1px; background: var(--line); margin: 5px 4px; }
  .menu .mlabel { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--ink-soft); padding: 6px 11px 3px; }

  /* ---- Toast ---- */
  .toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 80;
    display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast { background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 10px; font-weight: 500;
    box-shadow: 0 10px 30px rgba(20,28,48,.3); animation: rise .25s cubic-bezier(.2,.8,.3,1.2); display: flex; align-items: center; gap: 9px; }
  .toast.ok .ic { color: #7ef0bf; }

  .empty-editor { display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--ink-soft); text-align: center; gap: 8px; }
  .empty-editor .big { font-size: 40px; opacity: .35; }

  @keyframes pop { from { opacity: 0; transform: scale(.96) translateY(-4px); } to { opacity: 1; transform: none; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* ============================================================
     PRESENT / PREVIEW — the "show" view (also the Display engine).
     Dark, cinematic, classic, projector-legible, animated.
     ============================================================ */
  .present { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column;
    background: radial-gradient(120% 100% at 50% 0%, #232c45 0%, #11162a 55%, #0a0e1d 100%);
    color: #fff; font-family: var(--font); }
  .present.open { display: flex; }
  .pv-main { flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 5vh 6vw; overflow: hidden; position: relative; }
  .pv-stage { width: 100%; max-width: 1120px; text-align: center; animation: pvIn .5s cubic-bezier(.2,.85,.25,1); }
  .pv-badge { display: inline-block; font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase;
    color: #9fb0d0; border: 1px solid rgba(255,255,255,.18); padding: 6px 14px; border-radius: 20px; margin-bottom: 3vh; }
  .pv-q { font-size: clamp(26px, 4.6vw, 54px); font-weight: 800; line-height: 1.16; letter-spacing: -.5px; margin: 0 auto 3vh; max-width: 16ch; }
  .pv-sub { color: #9fb0d0; font-size: clamp(16px, 2.2vw, 26px); margin-top: 2vh; }
  .pv-title-huge { font-size: clamp(46px, 9vw, 124px); font-weight: 900; letter-spacing: -1.5px; line-height: 1.02;
    background: linear-gradient(180deg, #ffffff, #aebede); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .pv-media { margin: 0 auto 3vh; max-width: min(620px, 64vw); }
  .pv-media img { width: 100%; border-radius: 18px; box-shadow: 0 24px 70px rgba(0,0,0,.55); }

  .pv-options { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; max-width: 940px; margin: 0 auto; }
  .pv-options.n1 { grid-template-columns: 1fr; max-width: 560px; }
  .pv-opt { display: flex; align-items: center; gap: 16px; padding: clamp(14px,2vh,22px) 22px; text-align: left;
    background: rgba(255,255,255,.06); border: 2px solid rgba(255,255,255,.12); border-radius: 14px;
    font-size: clamp(17px, 2.3vw, 27px); font-weight: 600; animation: optIn .45s both; transition: all .45s cubic-bezier(.2,.8,.2,1); }
  .pv-letter { width: 44px; height: 44px; flex: 0 0 auto; border-radius: 11px; background: var(--accent);
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; }
  .pv-opt-text { flex: 1; }
  .pv-opt.correct { background: rgba(47,211,154,.18); border-color: #2fd39a; transform: scale(1.03);
    box-shadow: 0 0 0 3px rgba(47,211,154,.28), 0 16px 44px rgba(47,211,154,.22); }
  .pv-opt.correct .pv-letter { background: #2fd39a; color: #08231a; }
  .pv-opt.dim { opacity: .38; filter: saturate(.4); }
  .pv-check { margin-left: auto; color: #2fd39a; font-weight: 900; font-size: 1.4em; }

  .pv-answer { font-size: clamp(30px, 5.5vw, 70px); font-weight: 900; color: #7ef0bf; margin-top: 1vh; animation: pop .45s; }
  .pv-passage { font-size: clamp(22px, 3.2vw, 40px); font-weight: 600; line-height: 1.35; max-width: 22ch; margin: 0 auto; }

  /* timer ring — big & centered */
  .pv-timer { position: absolute; top: 2.5vh; left: 50%; transform: translateX(-50%); width: 230px; height: 230px; z-index: 4; }
  .pv-timer .num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 82px; }
  .pv-timer .prog { transition: none; }
  .pv-timer.warn .prog { stroke: #ff6b81 !important; }
  .pv-timer.warn .num { color: #ff6b81; animation: tick .5s infinite; }
  .pv-timer.ended { display: none; }
  .pv-timesup { position: absolute; top: 5vh; left: 50%; transform: translateX(-50%); z-index: 5; white-space: nowrap;
    font-size: clamp(46px, 8vw, 108px); font-weight: 900; color: #ff6b81; letter-spacing: 1px;
    text-shadow: 0 8px 34px rgba(255,107,129,.5); animation: timesupPop .5s cubic-bezier(.2,.9,.3,1.3); }
  @keyframes timesupPop { from { opacity: 0; transform: translateX(-50%) scale(.7); } to { opacity: 1; transform: translateX(-50%) scale(1); } }

  /* buzzer */
  .pv-buzz { margin-top: 3vh; display: inline-flex; align-items: center; gap: 14px; background: linear-gradient(180deg,#ff4d63,#e11d36);
    color: #fff; padding: 18px 44px; border-radius: 50px; font-size: clamp(22px,3vw,34px); font-weight: 900;
    box-shadow: 0 16px 44px rgba(225,29,54,.5); animation: buzzPulse 1.2s infinite; }

  /* leaderboard */
  .pv-board { max-width: 780px; margin: 0 auto; text-align: left; display: flex; flex-direction: column; gap: 11px; }
  .pv-board-row { display: flex; align-items: center; gap: 16px; }
  .pv-rank { width: 40px; font-weight: 800; color: var(--pv-ink-soft, #9fb0d0); font-size: 20px; text-align: center; }
  .pv-rank.top { color: #fbbf24; }
  .pv-team { width: 130px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pv-bar { flex: 1; height: 32px; background: rgba(255,255,255,.07); border-radius: 8px; overflow: hidden; }
  .pv-bar-fill { height: 100%; width: 0; border-radius: 8px; background: linear-gradient(90deg, var(--accent), #8b5cf6);
    transition: width 1.1s cubic-bezier(.2,.85,.2,1); }
  .pv-score { width: 66px; text-align: right; font-weight: 800; font-size: 20px; }

  /* matching */
  .pv-cols { display: flex; gap: clamp(20px,5vw,70px); justify-content: center; align-items: flex-start; }
  .pv-col { display: flex; flex-direction: column; gap: 12px; }
  .pv-mitem { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14); border-radius: 12px;
    padding: 14px 22px; font-weight: 600; min-width: 190px; font-size: clamp(16px,1.9vw,22px); animation: optIn .4s both; }
  .pv-pairlist { display: flex; flex-direction: column; gap: 10px; max-width: 640px; margin: 0 auto; }
  .pv-pair-row { display: flex; align-items: center; gap: 14px; justify-content: center; font-size: clamp(17px,2.1vw,26px);
    font-weight: 600; animation: optIn .4s both; }
  .pv-pair-row .ar { color: #2fd39a; font-weight: 900; }

  /* controls */
  .pv-controls { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 13px;
    background: #0c1124; border-top: 1px solid rgba(255,255,255,.08); color: #fff; }
  .pv-hold-label { color: #fff; }
  .pv-step { color: #9fb0d0; font-size: 13px; min-width: 86px; text-align: center; font-variant-numeric: tabular-nums; }
  .pv-btn { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.18); border-radius: 10px;
    padding: 10px 18px; font-weight: 600; transition: background .15s; }
  .pv-btn:hover { background: rgba(255,255,255,.2); }
  .pv-btn.primary { background: var(--accent); border-color: var(--accent); }
  .pv-hint { color: #6b7690; font-size: 12px; margin-left: 6px; }

  @keyframes pvIn { from { opacity: 0; transform: translateY(22px) scale(.985); } to { opacity: 1; transform: none; } }
  @keyframes optIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @keyframes buzzPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes tick { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

  /* ---- THEME VARIABLES (later rules override the hardcoded Show colors) ---- */
  .present { --pv-bg: radial-gradient(120% 100% at 50% 0%, #232c45 0%, #11162a 55%, #0a0e1d 100%);
    --pv-ink:#fff; --pv-ink-soft: rgba(255,255,255,.62); --pv-accent:#4f46e5; --pv-accent2:#8b5cf6;
    --pv-correct:#2fd39a; --pv-correct-soft: rgba(47,211,154,.18); --pv-tile: rgba(255,255,255,.06);
    --pv-tile-border: rgba(255,255,255,.12); --pv-heading-font: var(--font); --pv-body-font: var(--font);
    background: var(--pv-bg); color: var(--pv-ink); font-family: var(--pv-body-font); }
  .pv-q, .pv-title-huge { font-family: var(--pv-heading-font); }
  .pv-title-huge { background: none; -webkit-text-fill-color: currentColor; color: var(--pv-ink); }
  .pv-sub, .pv-badge, .pv-step { color: var(--pv-ink-soft); }
  .pv-badge { border-color: var(--pv-tile-border); }
  .pv-letter { background: var(--pv-accent); color: var(--pv-on-accent, #fff); }
  .pv-opt { background: var(--pv-tile); border-color: var(--pv-tile-border); }
  .pv-opt.correct { background: var(--pv-correct-soft); border-color: var(--pv-correct);
    box-shadow: 0 0 0 3px var(--pv-correct-soft), 0 16px 44px var(--pv-correct-soft); }
  .pv-opt.correct .pv-letter { background: var(--pv-correct); color: var(--pv-on-correct, #06231a); }
  .pv-check, .pv-answer, .pv-pair-row .ar { color: var(--pv-correct); }
  .pv-bar { background: var(--pv-tile); }
  .pv-bar-fill { background: linear-gradient(90deg, var(--pv-accent), var(--pv-accent2)); }
  .pv-mitem { background: var(--pv-tile); border-color: var(--pv-tile-border); }
  .pv-timer .prog { stroke: var(--pv-ink); }

  /* ---- timer field ---- */
  .timerfield { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .timerfield .num { width: 78px; }
  .timerfield .chips { display: flex; gap: 6px; }
  .timerfield .chip { padding: 5px 10px; border: 1px solid var(--line-2); border-radius: 20px; background: #fff; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); }
  .timerfield .chip:hover { border-color: var(--accent); color: var(--accent); }
  .timerfield .chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .timerfield.off .num, .timerfield.off .chips, .timerfield.off .tsel { opacity: .4; pointer-events: none; }
  .timerfield .tsel { padding: 6px 9px; border: 1px solid var(--line-2); border-radius: 7px; min-width: 92px; background: #fff; }
  .row .title.q3 { white-space: normal; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.28; }
  .fmt-label { font-size: 12px; color: var(--ink-soft); font-weight: 600; margin-left: 4px; }
  .fmt-select { padding: 6px 10px; border: 1px solid var(--line-2); border-radius: 8px; background: #fff; font-weight: 600; }
  .deck-name { border: 1px solid var(--line-2); border-radius: 8px; padding: 6px 12px; font-weight: 600; min-width: 200px; background: var(--bg); color: var(--ink); }
  .deck-name:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-soft); }

  /* ---- show: stream switcher ---- */
  .pv-stream-sel { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.18); border-radius: 10px; padding: 9px 10px; font-weight: 600; max-width: 190px; }
  .pv-stream-sel option { color: #111; }
  /* ---- show: score tally ---- */
  .pv-tally { display: grid; grid-template-columns: repeat(2, minmax(280px, 1fr)); gap: 8px 22px; width: min(960px, 95vw); margin: 2.5vh auto 0; max-height: 62vh; overflow: auto; padding: 4px; }
  .pv-trow { display: flex; align-items: center; gap: 12px; background: var(--pv-tile, rgba(255,255,255,.06)); border: 1px solid var(--pv-tile-border, rgba(255,255,255,.12)); border-radius: 12px; padding: 7px 12px; transition: background .15s; }

  .theme-item .nm { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .theme-preview .tp-q { font-weight: 800; font-size: 22px; margin-bottom: 16px; }
  .theme-preview .tp-opts { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .theme-preview .tp-opt { display: flex; align-items: center; gap: 8px; padding: 9px 15px; border-radius: 10px; border: 2px solid; font-weight: 600; font-size: 14px; }
  .theme-preview .tp-letter { width: 25px; height: 25px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-size: 12px; }
  .tp-contrast { margin-top: 16px; display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; }
  .tp-contrast.ok { background: #16623f; color: #fff; }
  .tp-contrast.warn { background: #7a5b00; color: #fff; }
  .tp-contrast.bad { background: #7a1020; color: #fff; }
  .trow { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .trow label { width: 110px; font-weight: 600; font-size: 13px; }
  .trow input[type=color] { width: 46px; height: 30px; padding: 0; border: 1px solid var(--line-2); border-radius: 6px; background: #fff; cursor: pointer; }
  .trow input[type=text], .trow select { padding: 7px 9px; border: 1px solid var(--line-2); border-radius: 7px; min-width: 170px; }
  .trow input[type=range] { flex: 1; min-width: 140px; accent-color: var(--accent); }

  /* ---- intentional advance (press-and-hold) ---- */
  .pv-advance { min-width: 240px; display: flex; justify-content: center; }
  .pv-hold { position: relative; overflow: hidden; border: 1px solid var(--pv-accent, #4f46e5);
    background: rgba(255,255,255,.08); color: #fff; border-radius: 12px; padding: 12px 26px;
    font-weight: 700; font-size: 15px; cursor: pointer; user-select: none; min-width: 240px; transition: background .15s; }
  .pv-hold:hover { background: rgba(255,255,255,.15); }
  .pv-hold.holding { box-shadow: 0 0 0 3px rgba(127,127,255,.35); }

  .pv-timer.done .prog { stroke: var(--pv-correct, #2fd39a) !important; }
  .pv-btn[disabled] { opacity: .55; pointer-events: none; }

  /* AUDIENCE MODE — the actual display: no operator chrome, no Skip */

</style>

<body>
<div class="app">
  <!-- ================= TOP BAR ================= -->
  <header class="topbar">
    <div class="brand"><span class="dot"></span> CFC Quiz <small>· Maker</small></div>
    <input id="deckName" class="deck-name" placeholder="Deck name…" title="Deck name — used for the export filename" />
    <div class="spacer"></div>
    <div class="saved" id="savedInd"><span class="pulse"></span> Saved locally</div>
    <button class="btn" id="resetBtn" title="Clear all local data and reload the fresh sample deck">🗑 Reset</button>
    <button class="btn" id="themeBtn" title="Edit themes">🎨 Theme</button>
    <button class="btn" id="presentBtn" title="Preview / present this stream (P)">▶ Present</button>
    <button class="btn" id="importBtn">⬆ Import</button>
    <button class="btn primary" id="exportBtn" title="Export">🔒 Export</button>
    <input type="file" id="fileInput" accept="application/json,.json" hidden />
  </header>

  <!-- ================= MAIN ================= -->
  <div class="main">
    <aside class="sidebar">
      <div class="sect">
        <div class="sect-head">
          <h3>Streams</h3>
          <button class="btn sm" id="addStream">+ Stream</button>
        </div>
        <div class="list" id="streamList"></div>
      </div>
      <div class="sect" style="flex:1;">
        <div class="sect-head">
          <h3 id="slidesHead">Slides</h3>
          <button class="btn sm" id="addSlide">+ Slide</button>

<!-- Type picker -->
<div class="picker" id="picker">
  <div class="sheet">
    <h3>Add a slide</h3>
    <p class="muted">Pick a template. Everything is editable after.</p>
    <div id="pickerGroups"></div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
"use strict";
/* ================================================================
   CFC QUIZ — MAKER
   Single-file, no server, localStorage + file export/import.

   Architecture (SOLID):
     • Store          — single source of truth, persistence, pub/sub  (SRP, DIP)
     • SlideTypes      — plugin registry of slide templates           (OCP)
     • FieldRenderers  — plugin registry of form-field widgets        (OCP)
     • FormRenderer    — generic: builds a form from a type's fields  (SRP)
     • Views           — Streams / Slides / Editor render functions   (SRP)
     • IO              — export/import + file helpers                 (SRP)

   ┌─────────────────────────────────────────────────────────────┐
   │ HOW TO ADD A NEW QUESTION TYPE  (this is the whole job):      │
   │   SlideTypes.register({ type, label, group, icon, desc,       │
   │                         createDefault, fields, summary })      │
   │ Nothing else changes — the form, the slide list, storage and  │
   │ export all read the registry. Same story for FieldRenderers.  │
   └─────────────────────────────────────────────────────────────┘
   ================================================================ */

/* ---------- tiny utils ---------- */
const uid = () => 'id_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);
const el = (tag, props = {}, kids = []) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k === 'text') n.textContent = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (v === true) n.setAttribute(k, '');
    else if (v !== false && v != null) n.setAttribute(k, v);
  }
  (Array.isArray(kids) ? kids : [kids]).forEach(c => c != null && n.append(c.nodeType ? c : document.createTextNode(c)));
  return n;
};
const clamp = (s, n = 70) => !s ? '' : (s.length > n ? s.slice(0, n - 1) + '…' : s);

/* ================================================================
   FIELD RENDERERS — registry of widgets. Each returns a DOM node and
   calls onChange(newValue) when edited.  Add a key here = new widget.
   ================================================================ */
const FieldRenderers = {
  text: (def, val, onChange) =>
    el('input', { type: 'text', value: val ?? '', placeholder: def.placeholder || '',
      oninput: e => onChange(e.target.value) }),

  textarea: (def, val, onChange) =>
    el('textarea', { placeholder: def.placeholder || '', oninput: e => onChange(e.target.value) }, val ?? ''),

  number: (def, val, onChange) =>
    el('input', { type: 'number', value: val ?? '', min: def.min ?? '', max: def.max ?? '',
      placeholder: def.placeholder || '', oninput: e => onChange(e.target.value === '' ? null : Number(e.target.value)) }),

  /* timer: snaps to an allowed value (10..60 by 5, then 75/90/105/120). 0 = off. */
  timer: (def, val, onChange) => {
    const STEPS = [10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 75, 90, 105, 120];
    const nearest = n => STEPS.reduce((a, b) => Math.abs(b - n) < Math.abs(a - n) ? b : a, STEPS[0]);
    let v = Number(val) || 0;
    const wrap = el('div', { class: 'timerfield' });
    const seg = el('div', { class: 'seg' });
    const onBtn = el('button', { type: 'button', text: 'On' });
    const offBtn = el('button', { type: 'button', text: 'Off' });
    const sel = el('select', { class: 'tsel' });
    STEPS.forEach(s => sel.append(el('option', { value: s, text: s + 's' })));
    const paint = () => {
      const on = v > 0;
      wrap.classList.toggle('off', !on);
      onBtn.classList.toggle('on', on); offBtn.classList.toggle('on', !on);
      sel.value = String(on ? nearest(v) : 20);
    };
    const setV = nv => { v = nv > 0 ? nearest(nv) : 0; onChange(v); paint(); };
    onBtn.onclick = () => setV(Number(sel.value) || 20);
    offBtn.onclick = () => setV(0);
    sel.onchange = () => setV(Number(sel.value));
    seg.append(onBtn, offBtn);
    wrap.append(seg, sel);
    paint();
    return wrap;
  },

  boolean: (def, val, onChange) => {
    const wrap = el('div', { class: 'seg' });
    const tBtn = el('button', { type: 'button', class: val === true ? 'on' : '', text: def.trueLabel || 'True' });
    const fBtn = el('button', { type: 'button', class: val === false ? 'on' : '', text: def.falseLabel || 'False' });
    tBtn.onclick = () => { onChange(true); tBtn.classList.add('on'); fBtn.classList.remove('on'); };
    fBtn.onclick = () => { onChange(false); fBtn.classList.add('on'); tBtn.classList.remove('on'); };
    wrap.append(tBtn, fBtn); return wrap;
  },

  /* choices: array of {text, correct}. variant: 'single' | 'multi' | 'none' */
  choices: (def, val, onChange) => {
    let list = Array.isArray(val) ? val.map(o => ({ text: o.text || '', correct: !!o.correct })) : [];
    const variant = def.variant || 'single';
    const wrap = el('div', { class: 'choices' });
    const rerender = () => {
      wrap.innerHTML = '';
      list.forEach((opt, i) => {
        const row = el('div', { class: 'choice' + (opt.correct ? ' is-correct' : '') });
        if (variant !== 'none') {
          const mark = el('span', { class: 'mark' });
          const input = el('input', { type: variant === 'single' ? 'radio' : 'checkbox',
            name: 'correct_' + def.key, checked: opt.correct });
          input.onchange = () => {
            if (variant === 'single') list.forEach((o, j) => o.correct = j === i);
            else list[i].correct = input.checked;
            commit(); rerender();
          };
          mark.append(input); row.append(mark);
        }
        const tx = el('input', { type: 'text', value: opt.text, placeholder: 'Option ' + (i + 1) });
        tx.oninput = () => { list[i].text = tx.value; commit(); };
        const tag = el('span', { class: 'correct-tag', text: 'correct' });
        const del = el('button', { class: 'icon-btn', type: 'button', title: 'Remove', html: '✕' });
        del.onclick = () => { list.splice(i, 1); commit(); rerender(); };
        row.append(tx, tag, del);
        wrap.append(row);
      });
      const add = el('button', { class: 'btn add-row sm', type: 'button', text: '+ Add option' });
      add.onclick = () => { list.push({ text: '', correct: false }); commit(); rerender(); };
      wrap.append(add);
    };
    const commit = () => onChange(list.map(o => ({ text: o.text, correct: o.correct })));
    rerender(); return wrap;
  },

  /* choice: composite {options:[{text,correct}], multiple} — single OR multiple correct in one widget */
  choice: (def, val, onChange) => {
    let v = (val && typeof val === 'object')
      ? { options: (val.options || []).map(o => ({ text: o.text || '', correct: !!o.correct })), multiple: !!val.multiple }
      : { options: [], multiple: false };
    const commit = () => onChange({ options: v.options.map(o => ({ text: o.text, correct: o.correct })), multiple: v.multiple });
    const wrap = el('div');
    const seg = el('div', { class: 'seg' });
    const singleBtn = el('button', { type: 'button', text: 'Single answer' });
    const multiBtn = el('button', { type: 'button', text: 'Multiple answers' });
    const optsBox = el('div', { class: 'choices' });
    const paintSeg = () => { singleBtn.classList.toggle('on', !v.multiple); multiBtn.classList.toggle('on', v.multiple); };
    singleBtn.onclick = () => { v.multiple = false; let seen = false; v.options.forEach(o => { if (o.correct) { if (seen) o.correct = false; else seen = true; } }); commit(); paintSeg(); renderOpts(); };
    multiBtn.onclick = () => { v.multiple = true; commit(); paintSeg(); renderOpts(); };
    seg.append(singleBtn, multiBtn);
    function renderOpts() {
      optsBox.innerHTML = '';
      v.options.forEach((opt, i) => {
        const row = el('div', { class: 'choice' + (opt.correct ? ' is-correct' : '') });
        const input = el('input', { type: v.multiple ? 'checkbox' : 'radio', name: 'corr_' + def.key, checked: opt.correct });
        input.onchange = () => { if (v.multiple) v.options[i].correct = input.checked; else v.options.forEach((o, j) => o.correct = j === i); commit(); renderOpts(); };
        const tx = el('input', { type: 'text', value: opt.text, placeholder: 'Option ' + (i + 1) });
        tx.oninput = () => { v.options[i].text = tx.value; commit(); };
        const del = el('button', { class: 'icon-btn', type: 'button', html: '✕' });
        del.onclick = () => { v.options.splice(i, 1); commit(); renderOpts(); };
        row.append(el('span', { class: 'mark' }, [ input ]), tx, el('span', { class: 'correct-tag', text: 'correct' }), del);
        optsBox.append(row);
      });
      const add = el('button', { class: 'btn add-row sm', type: 'button', text: '+ Add option' });
      add.onclick = () => { v.options.push({ text: '', correct: false }); commit(); renderOpts(); };
      optsBox.append(add);
    }
    paintSeg(); renderOpts();
    wrap.append(seg, el('div', { style: 'height:10px' }), optsBox);
    return wrap;
  },

  /* pairs: array of {left, right} for matching */
  pairs: (def, val, onChange) => {
    let list = Array.isArray(val) ? val.map(p => ({ left: p.left || '', right: p.right || '' })) : [];
    const wrap = el('div', { class: 'pairs' });
    const commit = () => onChange(list.map(p => ({ left: p.left, right: p.right })));
    const rerender = () => {
      wrap.innerHTML = '';
      list.forEach((p, i) => {
        const l = el('input', { type: 'text', value: p.left, placeholder: 'Item' });
        const r = el('input', { type: 'text', value: p.right, placeholder: 'Match' });
        l.oninput = () => { list[i].left = l.value; commit(); };
        r.oninput = () => { list[i].right = r.value; commit(); };
        const del = el('button', { class: 'icon-btn', type: 'button', html: '✕' });
        del.onclick = () => { list.splice(i, 1); commit(); rerender(); };
        wrap.append(el('div', { class: 'pair' }, [l, el('span', { class: 'link', text: '↔' }), r, del]));
      });
      const add = el('button', { class: 'btn add-row sm', type: 'button', text: '+ Add pair' });
      add.onclick = () => { list.push({ left: '', right: '' }); commit(); rerender(); };
      wrap.append(add);
    };
    rerender(); return wrap;
  },

  /* image: stores a string (data-URL for offline reliability, or a pasted URL) */
  image: (def, val, onChange) => {
    const wrap = el('div', { class: 'imgfield' });
    const thumb = el('div', { class: 'thumb' });
    const paint = () => { thumb.innerHTML = ''; if (val) thumb.append(el('img', { src: val })); else thumb.textContent = 'No image'; };
    const file = el('input', { type: 'file', accept: 'image/*' });
    file.onchange = () => {
      const f = file.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = () => { val = rd.result; onChange(val); paint(); };
      rd.readAsDataURL(f);
    };
    const url = el('input', { type: 'text', placeholder: '…or paste an image URL', value: (val && !val.startsWith('data:')) ? val : '' });
    url.oninput = () => { val = url.value.trim(); onChange(val); paint(); };
    const clr = el('button', { class: 'btn sm danger', type: 'button', text: 'Clear' });
    clr.onclick = () => { val = ''; onChange(''); url.value = ''; file.value = ''; paint(); };
    paint();
    wrap.append(thumb, el('div', { class: 'ctrls' }, [file, url, clr]));
    return wrap;
  },
};

/* ================================================================
   SLIDE TYPES — the plugin registry (Open/Closed extension point).
   ================================================================ */
const SlideTypes = (() => {
  const map = new Map();
  const order = [];
  const T = 20; // default per-question timer (seconds)
  const timerField = { key: 'timer', label: 'Timer', type: 'timer', hint: 'countdown ring on the question' };
  return {
    register(def) { if (!map.has(def.type)) order.push(def.type); map.set(def.type, def); },
    get: t => map.get(t),
    all: () => order.map(t => map.get(t)),
    byGroup() {
      const g = {};
      order.forEach(t => { const d = map.get(t); (g[d.group] ||= []).push(d); });
      return g;
    },
    T, timerField,
  };
})();

/* slide-kind helper: question | leaderboard | title (derived from a slide's type) */
function kindOf(type) {
  const d = SlideTypes.get(type);
  if (d && d.kind) return d.kind;
  return type === 'leaderboard' ? 'leaderboard' : (type === 'title' || type === 'answer') ? 'title' : 'question';
}

/* ================================================================
   STORE — single source of truth + persistence + pub/sub
   ================================================================ */
const Store = (() => {
  const KEY = 'cfc-quiz-maker-v4';
  const listeners = new Set();
  let state = load();

  function blankProject() { return { app: 'cfc-quiz', kind: 'content', version: 1, name: 'Untitled Deck', themes: cloneThemes(), themeId: THEME_DEFAULTS[0].id, streams: [] }; }

  // first-run seed: one stream showcasing EVERY template
  function buildDemo() {
    const S = (type, data) => ({ id: uid(), type, data, options: {} });
    const stream = { id: uid(), name: 'Demo Quiz', teamCount: 20, themeId: null, slides: [

        choice: { multiple: false, options: [ { text: 'Noah', correct: true }, { text: 'Moses', correct: false }, { text: 'David', correct: false }, { text: 'Paul', correct: false } ] } }),
      S('choices', { question: 'Which of these are Gospels?', media: '', timer: 20,
        choice: { multiple: true, options: [ { text: 'Matthew', correct: true }, { text: 'Mark', correct: true }, { text: 'Acts', correct: false }, { text: 'John', correct: true } ] } }),
      S('true-false', { statement: 'Jonah was swallowed by a great fish.', answer: true, timer: 15 }),
      S('fill-blank', { prompt: 'The Lord is my ___.', answer: 'shepherd', timer: 25 }),
      S('guess-verse', { reference: 'A famous verse about love', passage: '“For God so loved the ___ that he gave his one and only Son.”', answer: 'John 3:16', timer: 30 }),
      S('numeric', { question: 'How many books are in the New Testament?', answer: 27, timer: 20 }),
      S('image-question', { question: 'Name this symbol of faith.', media: '', answer: 'The cross', timer: 20 }),
      S('matching', { instruction: 'Match the person to their role.', timer: 30,
        pairs: [ { left: 'Moses', right: 'Led the Exodus' }, { left: 'David', right: 'King of Israel' }, { left: 'Mary', right: 'Mother of Jesus' } ] }),
      S('poll', { question: 'Which round are you most excited for?', timer: 0,
        options: [ { text: 'Buzzer' }, { text: 'Verses' }, { text: 'Pictures' } ] }),
      S('buzzer', { question: 'First to buzz: name the first book of the Bible.', answer: 'Genesis', timer: 0 }),
      S('answer', { heading: 'Well done!', body: '“Well done, good and faithful servant.” — Matthew 25:23' }),
      S('leaderboard', { title: 'Final Standings' }),
    ] };
    const juniors = { id: uid(), name: 'Juniors (ages 6–9)', teamCount: 12, themeId: 'theme-parchment', slides: [
      S('title', { heading: 'Juniors Round', subheading: 'Nice and easy!' }),
      S('choices', { question: 'How many days did creation take?', media: '', timer: 20, choice: { multiple: false, options: [ { text: '7', correct: true }, { text: '3', correct: false }, { text: '40', correct: false } ] } }),
      S('true-false', { statement: 'Noah built a big boat (an ark).', answer: true, timer: 15 }),
      S('leaderboard', { title: 'Juniors Standings' }),
    ] };
    const p = blankProject(); p.name = 'CFC Sample Deck'; p.streams.push(stream, juniors); return p;
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) { const p = JSON.parse(raw); return { project: normalize(p.project || p), selStream: p.selStream || null, selSlide: p.selSlide || null }; }
    } catch (e) { console.warn('load failed', e); }
    const p = buildDemo(); const f = p.streams[0];
    return { project: p, selStream: f.id, selSlide: f.slides[0].id };
  }

  // migrate older slide shapes to the current model (e.g. MC/MA → choices)
  function migrateSlide(sl) {
    if (sl.type === 'multiple-choice' || sl.type === 'multiple-answer') {
      const opts = ((sl.data && sl.data.options) || []).map(o => ({ text: o.text || '', correct: !!o.correct }));
      sl.data.choice = { options: opts, multiple: sl.type === 'multiple-answer' };
      delete sl.data.options;
      sl.type = 'choices';
    }
    return sl;
  }
  function normalize(p) {
    p = p || blankProject(); p.app = 'cfc-quiz'; p.kind = 'content'; p.version = 1;
    p.name = p.name || 'Untitled Deck';
    p.themes = (Array.isArray(p.themes) && p.themes.length) ? p.themes : cloneThemes();
    // one-time refresh of built-in themes (keeps custom/renamed ones untouched) so fixes land without wiping data
    if (!p.themesVersion || p.themesVersion < 2) {
      p.themes = p.themes.map(t => { const def = THEME_DEFAULTS.find(d => d.id === t.id && d.name === t.name); return def ? Object.assign({}, t, def) : t; });
      p.themesVersion = 2;
    }
    if (!p.themes.find(t => t.id === p.themeId)) p.themeId = p.themes[0].id;
    p.streams = (p.streams || []).map(s => ({ id: s.id || uid(), name: s.name || 'Stream',
      teamCount: s.teamCount || 10, themeId: s.themeId || null,
      slides: (s.slides || []).map(sl => migrateSlide({ id: sl.id || uid(), type: sl.type, data: sl.data || {}, options: sl.options || {} })) }));
    return p;
  }
  let warnedFull = false;
  function persist() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); warnedFull = false; }
    catch (e) {
      console.warn('persist failed (likely storage quota from embedded images)', e);
      if (!warnedFull && typeof toast === 'function') { warnedFull = true; toast('⚠ Local storage is full (large images). Use Export to save everything to a file.'); }
    }
  }
  function emit() { persist(); listeners.forEach(l => l(state)); }

  /* selectors */
  const curStream = () => state.project.streams.find(s => s.id === state.selStream) || null;
  const curSlide = () => { const s = curStream(); return s ? s.slides.find(x => x.id === state.selSlide) || null : null; };

  return {
    subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },
    get: () => state, project: () => state.project, curStream, curSlide,
    setDeckName(n) { state.project.name = n; persist(); },
    reset() { try { localStorage.removeItem(KEY); localStorage.removeItem('cfc-quiz-scores-v1'); } catch (e) {} location.reload(); },

    /* streams */
    addStream() {
      const n = state.project.streams.length + 1;
      const s = { id: uid(), name: 'Stream ' + n, teamCount: 20, slides: [] };
      state.project.streams.push(s); state.selStream = s.id; state.selSlide = null; emit();
    },
    selectStream(id) { state.selStream = id; const s = curStream(); state.selSlide = s && s.slides[0] ? s.slides[0].id : null; emit(); },
    renameStream(id, name) { const s = state.project.streams.find(x => x.id === id); if (s) { s.name = name; emit(); } },
    setTeamCount(id, n) { const s = state.project.streams.find(x => x.id === id); if (s) { s.teamCount = Math.max(1, Math.min(99, n || 1)); emit(); } },
    deleteStream(id) {
      state.project.streams = state.project.streams.filter(s => s.id !== id);
      if (state.selStream === id) { const f = state.project.streams[0]; state.selStream = f ? f.id : null; state.selSlide = f && f.slides[0] ? f.slides[0].id : null; }
      emit();
    },

    /* slides */
    addSlide(type) {
      const s = curStream(); if (!s) return;
      const def = SlideTypes.get(type); if (!def) return;
      const sl = { id: uid(), type, data: def.createDefault() };
      const idx = s.slides.findIndex(x => x.id === state.selSlide);
      if (idx >= 0) s.slides.splice(idx + 1, 0, sl); else s.slides.push(sl);
      state.selSlide = sl.id; emit();
    },
    selectSlide(id) { state.selSlide = id; emit(); },
    // switch a question's format, preserving the question text + image + timer
    changeType(id, newType) {
      const s = curStream(); if (!s) return; const sl = s.slides.find(x => x.id === id); if (!sl || sl.type === newType) return;
      const def = SlideTypes.get(newType); if (!def) return;
      const ok = PROMPT_KEY[sl.type], nk = PROMPT_KEY[newType];
      const prompt = ok ? sl.data[ok] : '';
      const media = sl.data.media, timer = sl.data.timer;
      const nd = def.createDefault();
      if (nk && prompt) nd[nk] = prompt;
      if ('media' in nd && media != null) nd.media = media;
      if ('timer' in nd && timer != null) nd.timer = timer;
      sl.type = newType; sl.data = nd; emit();
    },
    updateSlideData(id, key, value) { const s = curStream(); if (!s) return; const sl = s.slides.find(x => x.id === id); if (sl) { sl.data[key] = value; persist(); refreshList(); } },
    moveSlide(id, dir) { const s = curStream(); if (!s) return; const i = s.slides.findIndex(x => x.id === id); const j = i + dir;
      if (i < 0 || j < 0 || j >= s.slides.length) return; [s.slides[i], s.slides[j]] = [s.slides[j], s.slides[i]]; emit(); },
    duplicateSlide(id) { const s = curStream(); if (!s) return; const i = s.slides.findIndex(x => x.id === id); if (i < 0) return;
      const copy = { id: uid(), type: s.slides[i].type, data: JSON.parse(JSON.stringify(s.slides[i].data)) };
      s.slides.splice(i + 1, 0, copy); state.selSlide = copy.id; emit(); },
    deleteSlide(id) { const s = curStream(); if (!s) return; const i = s.slides.findIndex(x => x.id === id);
      s.slides = s.slides.filter(x => x.id !== id); if (state.selSlide === id) { const n = s.slides[Math.max(0, i - 1)]; state.selSlide = n ? n.id : null; } emit(); },

    /* drag & drop reorder */
    reorderSlide(dragId, targetId) {
      const s = curStream(); if (!s || dragId === targetId) return;
      const from = s.slides.findIndex(x => x.id === dragId), to = s.slides.findIndex(x => x.id === targetId);
      if (from < 0 || to < 0) return; const [m] = s.slides.splice(from, 1); s.slides.splice(to, 0, m); emit();
    },

    /* per-slide options (transition / reveal gesture — used by Present) */
    updateSlideOption(id, key, value) { const s = curStream(); if (!s) return; const sl = s.slides.find(x => x.id === id); if (sl) { sl.options = sl.options || {}; sl.options[key] = value; persist(); } },

    /* themes */
    themes: () => state.project.themes,
    projectThemeId: () => state.project.themeId,
    resolveThemeFor(stream) {
      const id = (stream && stream.themeId) || state.project.themeId;
      return state.project.themes.find(t => t.id === id) || state.project.themes[0];
    },
    setProjectTheme(id) { state.project.themeId = id; emit(); },
    setStreamTheme(streamId, themeId) { const s = state.project.streams.find(x => x.id === streamId); if (s) { s.themeId = themeId || null; emit(); } },
    addTheme() { const t = { id: 'theme-' + uid(), name: 'New Theme', bgType: 'linear', bg1: '#1f2937', bg2: '#0b1220', angle: 160, ink: '#ffffff', accent: '#6366f1', correct: '#34d399', headingFont: 'System Sans', bodyFont: 'System Sans' }; state.project.themes.push(t); emit(); return t.id; },
    duplicateTheme(id) { const t = state.project.themes.find(x => x.id === id); if (!t) return; const c = JSON.parse(JSON.stringify(t)); c.id = 'theme-' + uid(); c.name = t.name + ' copy'; state.project.themes.push(c); emit(); return c.id; },
    updateTheme(id, patch) { const t = state.project.themes.find(x => x.id === id); if (t) { Object.assign(t, patch); persist(); listeners.forEach(l => l(state)); } },
    deleteTheme(id) { if (state.project.themes.length <= 1) return; state.project.themes = state.project.themes.filter(t => t.id !== id); if (state.project.themeId === id) state.project.themeId = state.project.themes[0].id; state.project.streams.forEach(s => { if (s.themeId === id) s.themeId = null; }); emit(); },
    importTheme(theme) { const t = JSON.parse(JSON.stringify(theme)); t.id = 'theme-' + uid(); if (!t.name) t.name = 'Imported'; state.project.themes.push(t); emit(); return t.id; },

    /* import */
    replaceProject(p) { state.project = normalize(p); const f = state.project.streams[0]; state.selStream = f ? f.id : null; state.selSlide = f && f.slides[0] ? f.slides[0].id : null; emit(); },
    mergeStreams(p) { const inc = normalize(p); inc.streams.forEach(s => { s.id = uid(); state.project.streams.push(s); }); emit(); },
  };
})();

/* light helper so updateSlideData can refresh just the list snippet without rebuilding the editor (keeps input focus) */
function refreshList() { Views.renderSlides(Store.get()); }

/* ================================================================
   FORM RENDERER — generic; builds a form from a slide type's fields
   ================================================================ */
function renderForm(slide) {
  const def = SlideTypes.get(slide.type);
  const form = el('div');
  def.fields.forEach(f => {
    const field = el('div', { class: 'field' });
    const lab = el('label', {}, [ f.label ]);
    if (f.hint) lab.append(el('span', { class: 'hint', text: f.hint }));
    field.append(lab);
    const render = FieldRenderers[f.type];
    const widget = render
      ? render(f, slide.data[f.key], v => Store.updateSlideData(slide.id, f.key, v))
      : el('div', { class: 'empty', text: 'Unknown field type: ' + f.type });
    field.append(widget);
    form.append(field);
  });
  return form;
}

const Views = (() => {
  const $ = id => document.getElementById(id);
  let dragId = null;

  function renderStreams(state) {
    const wrap = $('streamList'); wrap.innerHTML = '';
    if (!state.project.streams.length) { wrap.append(el('div', { class: 'empty', text: 'No streams yet. Add one →' })); return; }
    state.project.streams.forEach(s => {
      const active = s.id === state.selStream;
      const row = el('div', { class: 'row' + (active ? ' active' : ''), onclick: () => Store.selectStream(s.id) });
      const grow = el('div', { class: 'grow' });
      grow.append(el('div', { class: 'title', text: s.name }));
      grow.append(el('div', { class: 'sub', text: s.slides.length + ' slide' + (s.slides.length === 1 ? '' : 's') + ' · ' + s.teamCount + ' teams' }));
      const tools = el('div', { class: 'tools' });
      const del = el('button', { class: 'icon-btn', title: 'Delete stream', html: '🗑' });
      del.onclick = e => { e.stopPropagation(); if (confirm('Delete stream “' + s.name + '” and all its slides?')) Store.deleteStream(s.id); };
      tools.append(del);
      row.append(grow, tools);
      wrap.append(row);
    });
  }

  function renderThemePicker(s) { // per-stream settings bar: team count + which theme this stream uses
    const old = document.getElementById('streamThemePick'); if (old) old.remove();
    if (!s) return;
    const slideList = $('slideList');
    const bar = el('div', { class: 'theme-pick', id: 'streamThemePick' });
    const teams = el('input', { type: 'number', min: 1, max: 99, value: s.teamCount, class: 'teams-input', title: 'Number of teams in this stream' });
    teams.onchange = () => Store.setTeamCount(s.id, Number(teams.value));
    const sel = el('select');
    const defName = (Store.themes().find(t => t.id === Store.projectThemeId()) || {}).name || 'default';
    sel.append(el('option', { value: '', text: 'Project default (' + defName + ')', selected: !s.themeId }));
    Store.themes().forEach(t => sel.append(el('option', { value: t.id, text: t.name, selected: s.themeId === t.id })));
    sel.onchange = () => Store.setStreamTheme(s.id, sel.value || null);
    bar.append(el('span', { class: 'theme-pick-label', text: '👥 Teams' }), teams,
               el('span', { class: 'theme-pick-label', text: '🎨 Theme' }), sel);
    slideList.parentElement.insertBefore(bar, slideList);
  }

  function renderSlides(state) {
    const wrap = $('slideList'); wrap.innerHTML = '';
    const s = Store.curStream();
    $('slidesHead').textContent = s ? 'Slides — ' + s.name : 'Slides';
    renderThemePicker(s);
    if (!s) { wrap.append(el('div', { class: 'empty', text: 'Select a stream first.' })); return; }
    if (!s.slides.length) { wrap.append(el('div', { class: 'empty', text: 'No slides yet. Add one →' })); return; }
    s.slides.forEach((sl, i) => {
      const def = SlideTypes.get(sl.type) || { label: sl.type, icon: '?', summary: () => '' };
      const active = sl.id === state.selSlide;
      const row = el('div', { class: 'row' + (active ? ' active' : ''), draggable: 'true', onclick: () => Store.selectSlide(sl.id) });
      row.dataset.id = sl.id;
      const handle = el('span', { class: 'drag-handle', html: '⠿', title: 'Drag to reorder' });
      const grow = el('div', { class: 'grow' });
      grow.append(el('div', { class: 'title q3', text: (i + 1) + '. ' + (def.summary(sl.data) || def.label) }));
      grow.append(el('div', { class: 'sub' }, [ el('span', { class: 'badge', text: def.label }) ]));
      const tools = el('div', { class: 'tools' });
      const up = el('button', { class: 'icon-btn', title: 'Move up', html: '↑' }); up.onclick = e => { e.stopPropagation(); Store.moveSlide(sl.id, -1); };
      const dn = el('button', { class: 'icon-btn', title: 'Move down', html: '↓' }); dn.onclick = e => { e.stopPropagation(); Store.moveSlide(sl.id, 1); };
      const dup = el('button', { class: 'icon-btn', title: 'Duplicate', html: '⧉' }); dup.onclick = e => { e.stopPropagation(); Store.duplicateSlide(sl.id); };
      const del = el('button', { class: 'icon-btn', title: 'Delete', html: '✕' }); del.onclick = e => { e.stopPropagation(); Store.deleteSlide(sl.id); };
      tools.append(up, dn, dup, del);
      // drag & drop reorder
      row.addEventListener('dragstart', e => { dragId = sl.id; row.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
      row.addEventListener('dragend', () => { dragId = null; wrap.querySelectorAll('.row').forEach(r => r.classList.remove('dragging', 'drop-before', 'drop-after')); });
      row.addEventListener('dragover', e => { e.preventDefault(); if (!dragId || dragId === sl.id) return; const before = e.offsetY < row.offsetHeight / 2; row.classList.toggle('drop-before', before); row.classList.toggle('drop-after', !before); });
      row.addEventListener('dragleave', () => row.classList.remove('drop-before', 'drop-after'));
      row.addEventListener('drop', e => { e.preventDefault(); if (dragId && dragId !== sl.id) Store.reorderSlide(dragId, sl.id); });
      row.append(handle, grow, tools);
      wrap.append(row);
    });
  }

  function renderEditor(state) {
    const ed = $('editor'); ed.innerHTML = '';
    const slide = Store.curSlide();
    if (!slide) {
      ed.append(el('div', { class: 'empty-editor' }, [
        el('div', { class: 'big', text: '✦' }),
        el('div', { text: Store.curStream() ? 'Add or select a slide to edit it.' : 'Add a stream to begin.' }),
      ]));
      return;
    }
    const def = SlideTypes.get(slide.type);
    const isQuestion = kindOf(slide.type) === 'question';
    const head = el('div', { class: 'ed-head' }, [
      el('span', { class: 'type-chip', text: (isQuestion ? '❓ Question' : def.icon + ' ' + def.label) }),
    ]);
    if (isQuestion) {
      const sel = el('select', { class: 'fmt-select' });
      SlideTypes.all().filter(d => kindOf(d.type) === 'question').forEach(d => sel.append(el('option', { value: d.type, text: d.label, selected: d.type === slide.type })));
      sel.onchange = () => Store.changeType(slide.id, sel.value);
      head.append(el('span', { class: 'fmt-label', text: 'Format' }), sel);
    }
    ed.append(head);
    ed.append(el('p', { class: 'ed-sub', text: def.desc }));
    const card = el('div', { class: 'card' });
    card.append(renderForm(slide));
    if (isQuestion) {
      const field = el('div', { class: 'field' });
      field.append(el('label', {}, [ 'Timer start', el('span', { class: 'hint', text: 'applies when a timer is set · "On button" = press ▶ Start in the show' }) ]));
      const auto = !(slide.options && slide.options.autoStart === false);
      field.append(FieldRenderers.boolean({ trueLabel: 'Auto', falseLabel: 'On button' }, auto, v => Store.updateSlideOption(slide.id, 'autoStart', v)));
      card.append(field);
    }
    ed.append(card);
  }

  function renderAll(state) { renderStreams(state); renderSlides(state); renderEditor(state); }
  return { renderStreams, renderSlides, renderEditor, renderAll };
})();
