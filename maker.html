    const colors = ['#4f46e5', '#2fd39a', '#fbbf24', '#ff6b81', '#8b5cf6'];
    for (let i = 0; i < 30; i++) {
      const p = el('div'); const ang = Math.random() * Math.PI * 2, dist = 120 + Math.random() * 240;
      p.style.cssText = 'position:absolute;left:50%;top:40%;width:9px;height:13px;border-radius:2px;z-index:6;' +
        'background:' + colors[i % colors.length] + ';transform:translate(-50%,-50%);opacity:1;' +
        'transition:transform 1s cubic-bezier(.1,.7,.2,1),opacity 1s;';
      host.append(p);
      requestAnimationFrame(() => {
        p.style.transform = 'translate(' + (Math.cos(ang) * dist) + 'px,' + (Math.sin(ang) * dist + 220) + 'px) rotate(' + (Math.random() * 720) + 'deg)';
        p.style.opacity = '0';
      });
      setTimeout(() => p.remove(), 1100);
    }
  }

  /* ---- controller ---- */
  let overlay = null, steps = [], idx = 0, stopTimer = null, curStream = null, advanceCtl = null;
  const positions = {}; // remembers each stream's step index across switches
  // stable per-run shuffle (e.g. matching right-column order) so a re-render / ← Back never re-deals
  let shuffleOrders = {};
  function stableShuffle(key, arr) { const o = shuffleOrders[key]; if (!o || o.length !== arr.length) shuffleOrders[key] = shuffle(arr.map((_, i) => i)); return shuffleOrders[key].map(i => arr[i]); }
  // pending score marks are committed only when you LEAVE the scoring slide (advance / switch / board / exit)
  let commitMarks = null;
  function flushScore() { if (commitMarks) { const fn = commitMarks; commitMarks = null; fn(); } renderConsole(); }
  function onResize() {
    if (!overlay || !overlay.classList.contains('open')) return;
    const rl = overlay.querySelector('.pv-pod-rest-list'); if (rl) layoutRest(rl, Number(rl.dataset.count) || 0);
    fitStage(overlay.querySelector('.pv-main'));
  }

  function buildOverlay() {
    overlay = el('div', { class: 'present' }, [
      el('div', { class: 'pv-main' }),
      el('div', { class: 'pv-controls' }, [
        el('button', { class: 'pv-btn', id: 'pvExit', text: '✕ Exit' }),
        el('select', { class: 'pv-stream-sel', id: 'pvStream', title: 'Switch stream' }),
        el('button', { class: 'pv-btn', id: 'pvPrev', text: '← Back' }),
        el('div', { class: 'pv-step', id: 'pvStep', text: '0 / 0' }),
        el('div', { class: 'pv-advance', id: 'pvAdvance' }),
        el('div', { class: 'pv-timerctl', id: 'pvTimerCtl' }),
        el('button', { class: 'pv-btn', id: 'pvBoard', text: '🏆 Scores', title: 'Show standings (any time)' }),
        el('button', { class: 'pv-btn pv-skip', id: 'pvSkip', text: '⤳ Skip', title: 'Operator override — jump straight to next (presenter only)' }),
      ]),
    ]);
    document.body.append(overlay);
    overlay.querySelector('#pvExit').onclick = close;
    overlay.querySelector('#pvPrev').onclick = prev;
    overlay.querySelector('#pvSkip').onclick = next;
    overlay.querySelector('#pvBoard').onclick = openConsole;   // private score console (popup); preview mirrors Display
    overlay.querySelector('#pvStream').onchange = e => switchStream(e.target.value);
  }

  /* press-and-hold control — fills over DURATION; releasing early cancels. NO plain click advances. */
  function holdControl(label, onDone) {
    const DURATION = 800;   // deliberate press-and-hold (~0.8s) so advancing is never accidental, but snappy
    const btn = el('button', { class: 'pv-hold' });
    const fill = el('span', { class: 'pv-hold-fill' });
    btn.append(fill, el('span', { class: 'pv-hold-label', text: label }));
    let raf = null, start = null, done = false;
    function frame(ts) {
      if (start == null) start = ts;
      const p = Math.min(1, (ts - start) / DURATION);
      fill.style.width = (p * 100) + '%';
      if (p >= 1) { done = true; stop(); onDone(); } else raf = requestAnimationFrame(frame);
    }
    function begin() { if (raf != null || done) return; btn.classList.add('holding'); start = null; raf = requestAnimationFrame(frame); }
    function stop() { if (raf != null) { cancelAnimationFrame(raf); raf = null; } }
    function reset() { stop(); if (!done) fill.style.width = '0%'; btn.classList.remove('holding'); }
    btn.addEventListener('mousedown', begin);
    btn.addEventListener('mouseup', reset);
    btn.addEventListener('mouseleave', reset);
    btn.addEventListener('touchstart', e => { e.preventDefault(); begin(); }, { passive: false });
    btn.addEventListener('touchend', e => { e.preventDefault(); reset(); });
    btn.addEventListener('touchcancel', () => reset());   // OS stole the touch → cancel, don't keep filling
    return { el: btn, begin, reset, cancel: stop };        // cancel() kills the rAF even after the button is detached
  }

  /* the hold label always names the page you are about to land on — no surprises */
  function advanceLabel() {
    const hasNext = idx < steps.length - 1;
    if (!hasNext) return 'Hold to finish';
    const nx = steps[idx + 1];
    if (nx.phase === 'reveal') return 'Hold to reveal answer';
    if (nx.phase === 'score') return 'Hold for scoring';
    const sl = nx.slide;
    if (kindOf(sl.type) === 'question') {
      const qList = curStream.slides.filter(s => kindOf(s.type) === 'question');
      const qi = qList.findIndex(s => s.id === sl.id);
      return 'Hold for next — Q' + (qi + 1);
    }
    if (sl.type === 'leaderboard') return 'Hold for next — Leaderboard';
    if (sl.type === 'podium') return 'Hold for next — Podium';
    if (sl.type === 'answer') return 'Hold for next — Answer';
    if (sl.type === 'reveal-answers') return 'Hold for next — Answers';
    return 'Hold for next — Title';
  }
  function mountAdvance() {
    const host = overlay.querySelector('#pvAdvance'); if (advanceCtl) advanceCtl.cancel(); host.innerHTML = ''; advanceCtl = null;
    const hasNext = idx < steps.length - 1;
    advanceCtl = holdControl(advanceLabel(), () => { if (hasNext) next(); else close(); });
    host.append(advanceCtl.el);
  }
  function lockAdvance(msg) {
    const host = overlay.querySelector('#pvAdvance'); if (advanceCtl) advanceCtl.cancel(); advanceCtl = null; host.innerHTML = '';
    host.append(el('div', { class: 'pv-locked', text: msg }));
  }

  function renderStep(opts) {
    flushScore(); // leaving a (possibly scoring) step commits any pending marks
    if (stopTimer) { stopTimer(); stopTimer = null; }
    const main = overlay.querySelector('.pv-main'); main.innerHTML = '';
    const tctl = overlay.querySelector('#pvTimerCtl'); if (tctl) tctl.innerHTML = '';
    const step = steps[idx];
    if (!step) { main.append(stage([ q('This stream has no slides.') ])); const ps = overlay.querySelector('#pvStep'); if (ps) ps.textContent = '0 / 0'; lockAdvance('—'); return; }
    const def = renderers[step.slide.type];
    let node;
    if (step.phase === 'score') node = renderTally(step.slide);
    else node = def ? def.render(step.slide.data, { phase: step.phase, stream: curStream, slideId: step.slide.id })
                    : stage([ q('No preview for: ' + step.slide.type) ]);
    main.append(node);
    if (node.__cleanup) stopTimer = node.__cleanup;   // a self-running slide (Reveal Answers) dies with the slide
    if (opts && opts.quiet) {   // a score-driven refresh must not replay entrances — snap, don't animate
      node.style.animation = 'none';   // the stage root carries the pvIn entrance — mute it too
      node.querySelectorAll('.pv-pod-rest-row, .pv-pod-medal, .pv-opt, .pv-mitem').forEach(e2 => { e2.style.animation = 'none'; });
      node.querySelectorAll('.pv-pod-block').forEach(b => { b.style.transition = 'none'; if (b.dataset.h) b.style.height = b.dataset.h; });
    }
    // length-aware question width: short = punchy narrow column, long = use full width (then fit scales font)
    const qEl = node.querySelector('.pv-q');
    if (qEl) { const L = (qEl.textContent || '').length; qEl.style.maxWidth = L > 80 ? '100%' : L > 36 ? '22ch' : '16ch'; }
    if (step.phase === 'question') {
      const qel = node.querySelector('.pv-q, .pv-passage');
      if (step.slide.type !== 'poll' && !(step.slide.options && step.slide.options.scored === false)) { const p = pointsOf(step.slide.data); if (p !== 1 && qel) qel.after(el('div', { class: 'pv-points', text: 'Worth ' + p + ' point' + (p === 1 ? '' : 's') })); }
    }
    // question progress (only on question slides)
    const qList = curStream.slides.filter(s => kindOf(s.type) === 'question');
    const qi = qList.findIndex(s => s.id === step.slide.id);
    if (qi >= 0) main.append(el('div', { class: 'pv-progress', text: 'Q ' + (qi + 1) + ' / ' + qList.length }));
    // deck branding — logo + title centered in a reserved header band, note bottom left;
    // a BLANK title falls back to the deck name; nothing set = hidden, colors follow the theme
    const brand = Store.project().branding || {};
    const brandTitle = (brand.title || '').trim() || ((brand.logo || brand.footer) ? Store.project().name || '' : '');
    let hb = overlay.querySelector('.pv-brand');
    if (!hb) { hb = el('div', { class: 'pv-brand' }); overlay.append(hb); }
    hb.innerHTML = '';
    if (brand.logo) hb.append(el('img', { src: brand.logo, alt: '' }));
    if (brandTitle) hb.append(el('span', { text: brandTitle }));
    const branded = !!(brand.logo || brandTitle);
    hb.style.display = branded ? 'flex' : 'none';
    overlay.classList.toggle('branded', branded);   // reserves the header band — ring + content start below it
    if (brand.footer || brand.footerLogo) {
      const fn = el('div', { class: 'pv-footnote' });
      if (brand.footerLogo) fn.append(el('img', { src: brand.footerLogo, alt: '' }));
      if (brand.footer) fn.append(el('span', { text: brand.footer }));
      main.append(fn);
    }
    overlay.querySelector('#pvStep').textContent = (idx + 1) + ' / ' + steps.length;
    overlay.querySelector('#pvPrev').disabled = idx === 0;

    const timed = step.phase === 'question' && Number(step.slide.data.timer) > 0;
    main.classList.toggle('has-timer', !!timed);
    if (timed) {
      const auto = !(step.slide.options && step.slide.options.autoStart === false);
      const lockMsg = auto ? '⏳ Locked — unlocks when the timer ends' : '⏳ Press ▶ Start to begin';
      // "Auto next": when time's up, advance ONE step by itself after a short beat. The pending
      // hop dies with the slide (stopTimer) and when +5s revives a finished timer (relock).
      const autoNext = !!(step.slide.options && step.slide.options.autoNext) && idx < steps.length - 1;
      let hopT = null;
      const hopMsg = () => advanceLabel().replace(/^Hold to reveal answer$/, '⏭ Showing the answer…').replace(/^Hold for scoring$/, '⏭ Scoring…').replace(/^Hold for next — (.+)$/, '⏭ Next — $1…');
      const t = makeTimer(main, Number(step.slide.data.timer), () => {
        if (autoNext) { lockAdvance(hopMsg()); hopT = setTimeout(next, 2500); } else mountAdvance();
      }, auto);
      stopTimer = () => { if (hopT) { clearTimeout(hopT); hopT = null; } t.stop(); };
      lockAdvance(lockMsg);
      // adding time while the clock is live must re-lock advance (extending un-ends a finished timer) + cancel the pending hop
      const relock = () => { if (t.isActive()) { if (hopT) { clearTimeout(hopT); hopT = null; } lockAdvance('⏳ Locked — unlocks when the timer ends'); } };
      if (tctl) {
        const mk = (txt, fn, cls) => { const b = el('button', { class: 'pv-btn sm' + (cls ? ' ' + cls : ''), text: txt }); b.onclick = fn; return b; };
        if (!auto) { const sb = mk('▶ Start', () => { t.start(); sb.remove(); }, 'primary'); tctl.append(sb); }
        tctl.append(mk('−5s', () => { t.addTime(-5); relock(); }), mk('+5s', () => { t.addTime(5); relock(); }), mk('⏰ Time’s up', () => t.end(), 'warn'));
      }
    } else {
      mountAdvance();
    }
    if ((step.phase === 'reveal' || step.slide.type === 'podium') && !(opts && opts.quiet)) requestAnimationFrame(() => burst(main));
    main.querySelectorAll('img').forEach(im => im.addEventListener('load', () => fitStage(main)));
    requestAnimationFrame(() => fitStage(main));
    renderConsole();   // keep the private console in sync with the current stream/slide
  }
  function next() { if (idx < steps.length - 1) { idx++; renderStep(); } }
  function prev() { if (idx > 0) { idx--; renderStep(); } }

  function loadStream(stream, startSlideId) {
    curStream = stream; steps = [];
    Theme.apply(overlay, Theme.resolve(stream));
    // "Show answer screen" (default NO) keeps the reveal phase only when explicitly Yes;
    // "Scored: No" questions have no scoring page (default: scored)
    stream.slides.forEach(sl => { const r = renderers[sl.type]; let phs = r ? r.phases : SOLO; const o = sl.options || {}; if (o.reveal !== true) phs = phs.filter(p => p !== 'reveal'); if (o.scored === false) phs = phs.filter(p => p !== 'score'); phs.forEach(ph => steps.push({ slide: sl, phase: ph })); });
    idx = 0;
    if (startSlideId) { const i = steps.findIndex(s => s.slide.id === startSlideId); if (i >= 0) idx = i; }
    else if (positions[stream.id] != null) idx = Math.max(0, Math.min(positions[stream.id], steps.length - 1));
    fillStreamSel();
    renderStep();
  }
  function fillStreamSel() {
    const sel = overlay.querySelector('#pvStream'); if (!sel) return; sel.innerHTML = '';
    Store.project().streams.forEach(s => sel.append(el('option', { value: s.id, text: s.name, selected: curStream && s.id === curStream.id })));
  }
  function switchStream(id) {
    if (curStream) positions[curStream.id] = idx; // remember where we were
    const s = Store.project().streams.find(x => x.id === id);
    if (s && s.slides.length) loadStream(s, null); else { toast('That stream has no slides'); fillStreamSel(); }   // revert the dropdown — no desync
  }

  /* score phase — tap ✓ (+points) / ✗ (−points) to MARK teams (green/red highlight).
     Nothing is committed here; marks are applied to the scores only when you LEAVE this
     slide (hold-to-advance, switch stream, open standings, or exit) — see flushScore(). */
  function renderTally(slide) {
    const n = (curStream && curStream.teamCount) || 8;
    const sid = curStream.id;
    const points = pointsOf(slide.data);
    const marks = {}; // teamIndex -> 1 | -1
    const wrap = stage([]);
    wrap.append(badge('Tap ✓ (+' + points + ') or ✗ (−' + points + ') — saved when you advance'));
    wrap.append(q(slide.data.question || slide.data.statement || slide.data.prompt || slide.data.instruction || 'Score this round'));

    const list = el('div', { class: 'pv-tally' });
    for (let i = 0; i < n; i++) {
      const row = el('div', { class: 'pv-trow' });
      const sc = el('div', { class: 'pv-tscore', text: Scores.get(sid, n)[i] });
      const check = el('button', { class: 'pv-mark check', text: '✓' });
      const cross = el('button', { class: 'pv-mark cross', text: '✗' });
      const paint = () => {
        check.classList.toggle('on', marks[i] === 1);
        cross.classList.toggle('on', marks[i] === -1);
        row.classList.toggle('plus', marks[i] === 1);
        row.classList.toggle('minus', marks[i] === -1);
      };
      check.onclick = () => { marks[i] === 1 ? delete marks[i] : marks[i] = 1; paint(); renderConsole(); };
      cross.onclick = () => { marks[i] === -1 ? delete marks[i] : marks[i] = -1; paint(); renderConsole(); };
      row.append(check, el('div', { class: 'pv-tname', text: 'Team ' + (i + 1) }), sc, cross);
      list.append(row); paint();
    }
    commitMarks = () => { Object.keys(marks).forEach(k => { if (marks[k]) Scores.add(sid, Number(k), marks[k] * points); }); };
    wrap.append(list, el('div', { class: 'pv-award-status', text: '✓ / ✗ marks are saved automatically when you move to the next slide.' }));
    return wrap;
  }

  /* ---------- private score console — a popup window on the operator's OTHER
     screen, driven by this same script. Nothing renders on the projected window.
     Identical to display.html's console (kept in sync). Committed scores only. ---------- */
  let consoleWin = null, blockMsgT = null, pagehideHooked = false;
  const CONSOLE_CSS = '<style>'
    + ':root{color-scheme:dark}*{box-sizing:border-box}'
    + 'body{margin:0;font:15px -apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0a0e1d;color:#fff;padding:14px}'
    + '#cc-head{font-size:18px;font-weight:800;margin-bottom:4px}'
    + '#cc-note{font-size:12px;color:#9fb0d0;margin-bottom:12px}#cc-note.warn{color:#fbbf24;font-weight:700}'
    + '#cc-rows{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-auto-flow:column;gap:8px}'   /* two columns, filled DOWN */
    + '.cc-row{display:grid;grid-template-columns:1fr 52px 56px 52px 76px;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 10px}'
    + '.cc-team{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}'
    + '.cc-score{text-align:center;font-weight:800;font-size:22px;font-variant-numeric:tabular-nums}'
    + '.cc-pm{height:48px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:24px;font-weight:800;cursor:pointer}'
    + '.cc-pm:hover{background:rgba(255,255,255,.2)}'
    + '.cc-set{height:44px;border-radius:8px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#fff;text-align:center;font-weight:700;font-size:16px;min-width:0}'
    + '@media(max-width:560px){#cc-rows{grid-template-columns:1fr!important;grid-auto-flow:row!important;grid-template-rows:none!important}.cc-row{grid-template-columns:1fr 40px 46px 40px 60px;gap:6px}}'
    + '</style>';
  function pendingMarkCount() { return overlay ? overlay.querySelectorAll('.pv-trow.plus, .pv-trow.minus').length : 0; }
  function openConsole() {
    if (!curStream) return;
    if (!pagehideHooked) { pagehideHooked = true; window.addEventListener('pagehide', () => { try { if (consoleWin && !consoleWin.closed) consoleWin.close(); } catch (e) {} }); }
    if (consoleWin && !consoleWin.closed) { consoleWin.focus(); renderConsole(); return; }
    consoleWin = window.open('', 'cfcScoreConsoleMaker', 'width=820,height=640');   // app-unique name so Maker/Display don't hijack each other
    if (!consoleWin) {                                   // popup blocked — discreet, operator-bar-only notice
      const b = overlay && overlay.querySelector('#pvBoard');
      if (b) { if (blockMsgT) clearTimeout(blockMsgT); else b.dataset.label = b.textContent; b.textContent = '🏆 allow pop-ups'; blockMsgT = setTimeout(() => { b.textContent = b.dataset.label || '🏆 Scores'; blockMsgT = null; }, 3000); }
      return;
    }
    const doc = consoleWin.document;
    doc.title = 'Score Console';
    doc.head.innerHTML = '<meta name="viewport" content="width=device-width,initial-scale=1">' + CONSOLE_CSS;
    doc.body.innerHTML = '<div id="cc-head"></div><div id="cc-note"></div><div id="cc-rows"></div>';
    doc.body.addEventListener('click', onConsoleClick);
    doc.body.addEventListener('change', onConsoleChange);
    renderConsole();
  }
  function renderConsole() {
    if (!consoleWin || consoleWin.closed || !curStream) return;
    const doc = consoleWin.document; const sid = curStream.id, n = curStream.teamCount || 8;
    doc.getElementById('cc-head').textContent = (Store.project().name || 'Deck') + ' — ' + curStream.name;
    const pend = pendingMarkCount();
    const note = doc.getElementById('cc-note');
    note.className = pend ? 'warn' : '';
    note.textContent = pend ? ('⚠ ' + pend + ' mark' + (pend === 1 ? '' : 's') + ' pending on this slide — they commit when you advance')
                            : 'Edit any team’s score privately — changes are live.';
    const scores = Scores.get(sid, n);
    const rows = doc.getElementById('cc-rows');
    rows.style.gridTemplateRows = 'repeat(' + Math.ceil(n / 2) + ', auto)';   // fill DOWN the left column first
    if (rows.children.length === n) {                                          // in-place update — never clobber a set-field being typed in
      for (let i = 0; i < n; i++) {
        rows.children[i].querySelector('.cc-score').textContent = scores[i];
        const set = rows.children[i].querySelector('.cc-set');
        if (doc.activeElement !== set) set.value = scores[i];
      }
    } else {
      rows.innerHTML = scores.map((sc, i) =>
        '<div class="cc-row"><span class="cc-team">Team ' + (i + 1) + '</span>'
        + '<button class="cc-pm" data-act="minus" data-i="' + i + '">−</button>'
        + '<span class="cc-score">' + sc + '</span>'
        + '<button class="cc-pm" data-act="plus" data-i="' + i + '">+</button>'
        + '<input class="cc-set" type="number" data-i="' + i + '" value="' + sc + '" title="Set score" /></div>').join('');
    }
  }
  function onConsoleClick(e) {
    const b = e.target.closest && e.target.closest('[data-act]'); if (!b || !curStream) return;
    Scores.add(curStream.id, Number(b.dataset.i), b.dataset.act === 'plus' ? 1 : -1);
    refreshScoreUIs();
  }
  function onConsoleChange(e) {
    const inp = e.target.closest && e.target.closest('.cc-set'); if (!inp || !curStream) return;
    const v = inp.value.trim();
    if (v === '' || !Number.isFinite(+v)) { renderConsole(); return; }   // ignore blank / garbage — restore the shown value, never commit 0
    Scores.set(curStream.id, Number(inp.dataset.i), Math.round(+v));
    refreshScoreUIs();
  }
  function closeConsole() { if (consoleWin && !consoleWin.closed) consoleWin.close(); consoleWin = null; }
  function refreshScoreUIs() {
    renderConsole();
    const step = steps[idx]; if (!step) return;
    if (step.slide.type === 'leaderboard' || step.slide.type === 'podium') renderStep({ quiet: true });   // re-render board, no confetti replay
    else if (step.phase === 'score' && curStream) {                                                       // live-update tally numbers WITHOUT rebuilding (keeps pending marks)
      const n = curStream.teamCount || 8, sc = Scores.get(curStream.id, n);
      overlay.querySelectorAll('.pv-tally .pv-tscore').forEach((cell, i) => { cell.textContent = sc[i]; });
    }
  }

  function open(stream, startSlideId, opts) {
    if (!stream || !stream.slides.length) { toast('Add a slide to preview'); return; }
    shuffleOrders = {};   // fresh preview → re-deal shuffles once (then stable for the run)
    if (!overlay) buildOverlay();
    overlay.classList.toggle('audience', !!(opts && opts.audience)); // audience mode = no controls / no Skip
    overlay.classList.add('open');
    window.addEventListener('resize', onResize);
    loadStream(stream, startSlideId);
  }
  function close() {
    flushScore();
    if (stopTimer) { stopTimer(); stopTimer = null; }
    if (advanceCtl) { advanceCtl.cancel(); advanceCtl = null; }   // a held button must not fire after Exit
    closeConsole();                                    // the private console belongs to this show
    overlay.querySelectorAll('.pv-jump').forEach(e => e.remove()); // don't leave stale overlays for the next open
    overlay.classList.remove('open');
    window.removeEventListener('resize', onResize);
    if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
  }
  // no keyboard shortcuts in the show — every action is an on-screen button click (Esc does NOT exit)

  return { open, renderers, next: () => next(), prev: () => prev(), console: () => openConsole(), switchStream: id => switchStream(id) };
})();

/* ================================================================
   THEME — apply a theme to the Show via CSS variables, + editor drawer.
   (display.html will reuse Theme.apply/resolve unchanged.)
   ================================================================ */
const Theme = (() => {
  const fam = k => THEME_FONTS[k] || k;
  function hexToRgba(hex, a) {
    let h = (hex || '#000').replace('#', ''); if (h.length === 3) h = h.split('').map(c => c + c).join('');
    const n = parseInt(h, 16); return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
  }
  function bgCss(t) {
    if (t.bgType === 'solid') return t.bg1;
    if (t.bgType === 'radial') return 'radial-gradient(120% 100% at 50% 0%, ' + t.bg1 + ' 0%, ' + t.bg2 + ' 70%)';
    return 'linear-gradient(' + (t.angle || 160) + 'deg, ' + t.bg1 + ', ' + t.bg2 + ')';
  }
  // relative luminance + pick black/white text for best contrast on a colored chip
  function lum(hex) { let h = (hex || '#000').replace('#', ''); if (h.length === 3) h = h.split('').map(c => c + c).join('');
    const v = [0, 2, 4].map(i => { let x = parseInt(h.substr(i, 2), 16) / 255; return x <= 0.03928 ? x / 12.92 : Math.pow((x + 0.055) / 1.055, 2.4); });
    return 0.2126 * v[0] + 0.7152 * v[1] + 0.0722 * v[2]; }
  function readableOn(hex) { const L = lum(hex); return (1.05 / (L + 0.05)) >= ((L + 0.05) / 0.05) ? '#ffffff' : '#0b1220'; }
  function contrast(h1, h2) { const L1 = lum(h1), L2 = lum(h2); return (Math.max(L1, L2) + 0.05) / (Math.min(L1, L2) + 0.05); }
  function inkContrast(t) { const a = contrast(t.ink, t.bg1); return t.bgType === 'solid' ? a : Math.min(a, contrast(t.ink, t.bg2)); }
  function apply(elm, t) {
    if (!elm || !t) return;
    const set = (k, v) => elm.style.setProperty(k, v);
    set('--pv-bg', bgCss(t)); set('--pv-ink', t.ink); set('--pv-ink-soft', hexToRgba(t.ink, .62));
    set('--pv-accent', t.accent); set('--pv-accent2', t.accent);
    set('--pv-correct', t.correct); set('--pv-correct-soft', hexToRgba(t.correct, .18));
    set('--pv-on-accent', readableOn(t.accent)); set('--pv-on-correct', readableOn(t.correct));
    set('--pv-tile', hexToRgba(t.ink, .07)); set('--pv-tile-border', hexToRgba(t.ink, .16));
    set('--pv-heading-font', fam(t.headingFont)); set('--pv-body-font', fam(t.bodyFont));
  }
  const resolve = stream => Store.resolveThemeFor(stream);

  /* ---- editor drawer ---- */
  let drawer, bg, editId;
  function ensure() {
    if (drawer) return;
    bg = el('div', { class: 'drawer-bg' }); drawer = el('div', { class: 'drawer' });
    document.body.append(bg, drawer); bg.onclick = close;
  }
  function open() { ensure(); render(); bg.classList.add('open'); drawer.classList.add('open'); }
  function close() { if (bg) { bg.classList.remove('open'); drawer.classList.remove('open'); } }

  function render() {
    const themes = Store.themes();
    if (!editId || !themes.find(t => t.id === editId)) editId = Store.projectThemeId();
    const t = themes.find(x => x.id === editId);
    drawer.innerHTML = '';
    drawer.append(
      el('div', { class: 'drawer-head' }, [
        el('h2', { text: '🎨 Themes' }), el('div', { style: 'flex:1' }),
        el('button', { class: 'btn sm', text: '+ New', onclick: () => { editId = Store.addTheme(); render(); } }),
        el('button', { class: 'btn sm', text: '✕ Close', onclick: close }),
      ]),
      el('div', { class: 'drawer-body' }, [ themeList(themes), el('div', { class: 'theme-edit' }, [ buildPreview(t), controls(t) ]) ]),
    );
  }
  function themeList(themes) {
    const list = el('div', { class: 'theme-list' });
    themes.forEach(t => {
      const item = el('div', { class: 'theme-item' + (t.id === editId ? ' active' : ''), onclick: () => { editId = t.id; render(); } });
      const sw = el('span', { class: 'sw' }); sw.style.background = bgCss(t);
      item.append(sw, el('span', { class: 'nm', text: t.name }));
      if (t.id === Store.projectThemeId()) item.append(el('span', { class: 'def', text: 'DEFAULT' }));
      list.append(item);
    });
    return list;
  }
  function buildPreview(t) {
    const p = el('div', { class: 'theme-preview' });
    p.style.background = bgCss(t); p.style.color = t.ink; p.style.fontFamily = fam(t.bodyFont);
    const q = el('div', { class: 'tp-q', text: 'Sample question?' }); q.style.fontFamily = fam(t.headingFont); q.style.color = t.ink;
    const mk = (letter, txt, correct) => {
      const o = el('div', { class: 'tp-opt' });
      o.style.borderColor = correct ? t.correct : hexToRgba(t.ink, .18);
      o.style.background = correct ? hexToRgba(t.correct, .18) : hexToRgba(t.ink, .07);
      o.style.color = t.ink;
      const L = el('span', { class: 'tp-letter', text: letter }); L.style.background = correct ? t.correct : t.accent;
      o.append(L, el('span', { text: txt })); return o;
    };
    p.append(q, el('div', { class: 'tp-opts' }, [ mk('A', 'Right answer ✓', true), mk('B', 'Another option', false) ]));
    const cr = inkContrast(t);
    p.append(el('div', { class: 'tp-contrast ' + (cr >= 4.5 ? 'ok' : cr >= 3 ? 'warn' : 'bad'),
      text: 'Text contrast ' + cr.toFixed(1) + (cr >= 4.5 ? '  ✓ great' : cr >= 3 ? '  ⚠ ok for big text only' : '  ✕ too low — adjust colors') }));
    return p;
  }
  function controls(t) {
    const wrap = el('div');
    const row = (label, node) => el('div', { class: 'trow' }, [ el('label', { text: label }), node ]);
    const color = key => { const i = el('input', { type: 'color', value: t[key] }); i.oninput = () => { Store.updateTheme(t.id, { [key]: i.value }); soft(); }; return i; };
    const name = el('input', { type: 'text', value: t.name }); name.oninput = () => { Store.updateTheme(t.id, { name: name.value }); listOnly(); };
    const bgSel = el('select'); ['solid', 'linear', 'radial'].forEach(o => bgSel.append(el('option', { value: o, text: o[0].toUpperCase() + o.slice(1), selected: t.bgType === o })));
    bgSel.onchange = () => { Store.updateTheme(t.id, { bgType: bgSel.value }); render(); };
    const angle = el('input', { type: 'range', min: 0, max: 360, value: t.angle || 160 }); angle.oninput = () => { Store.updateTheme(t.id, { angle: Number(angle.value) }); soft(); };
    const fontSel = key => { const s = el('select'); Object.keys(THEME_FONTS).forEach(f => s.append(el('option', { value: f, text: f, selected: t[key] === f }))); s.onchange = () => { Store.updateTheme(t.id, { [key]: s.value }); soft(); }; return s; };

    wrap.append(row('Name', name), row('Background', bgSel), row(t.bgType === 'solid' ? 'Color' : 'Color 1', color('bg1')));
    if (t.bgType !== 'solid') wrap.append(row('Color 2', color('bg2')));
    if (t.bgType === 'linear') wrap.append(row('Angle', angle));
    wrap.append(row('Text', color('ink')), row('Accent', color('accent')), row('Correct', color('correct')),
                row('Heading font', fontSel('headingFont')), row('Body font', fontSel('bodyFont')));
    wrap.append(el('div', { class: 'trow', style: 'margin-top:18px;gap:8px;flex-wrap:wrap;' }, [
      el('button', { class: 'btn sm primary', text: '★ Set as project default', onclick: () => { Store.setProjectTheme(t.id); render(); toast('Default theme set', 'ok'); } }),
      el('button', { class: 'btn sm', text: 'Duplicate', onclick: () => { editId = Store.duplicateTheme(t.id); render(); } }),
      el('button', { class: 'btn sm', text: '⬇ Export', onclick: () => exportTheme(t) }),
      el('button', { class: 'btn sm', text: '⬆ Import', onclick: importTheme }),
      el('button', { class: 'btn sm danger', text: 'Delete', onclick: () => { if (Store.themes().length <= 1) { toast('Cannot delete the last theme'); return; } if (confirm('Delete theme “' + t.name + '”?')) { Store.deleteTheme(t.id); editId = null; render(); } } }),
    ]));
    return wrap;
  }
  function soft() { const t = Store.themes().find(x => x.id === editId); if (!t) return;
    const old = drawer.querySelector('.theme-preview'); if (old) old.replaceWith(buildPreview(t)); listOnly(); }
  function listOnly() { drawer.querySelectorAll('.theme-item').forEach((it, i) => { const th = Store.themes()[i]; if (th) {
    const sw = it.querySelector('.sw'); if (sw) sw.style.background = bgCss(th);
    const nm = it.querySelector('.nm'); if (nm) nm.textContent = th.name; } }); }
  function exportTheme(t) { IO.downloadObj('cfc-theme-' + (t.name || 'theme').replace(/[^\w-]+/g, '-').toLowerCase() + '.json', { app: 'cfc-quiz', kind: 'theme', version: 1, theme: t }); toast('Theme exported', 'ok'); }
  function importTheme() {
    const inp = el('input', { type: 'file', accept: 'application/json,.json' });
    inp.onchange = () => { const f = inp.files[0]; if (!f) return; const rd = new FileReader();
      rd.onload = () => { let d; try { d = JSON.parse(rd.result); } catch { toast('Bad file'); return; }
        const th = d.kind === 'theme' ? d.theme : (d && d.bgType ? d : null);
        if (!th) { toast('Not a theme file'); return; }
        editId = Store.importTheme(th); render(); toast('Theme imported', 'ok'); };
      rd.readAsText(f); };
    inp.click();
  }
  return { apply, resolve, open, bgCss };
})();

/* ================================================================
   TOAST
   ================================================================ */
let toastTimer;
function toast(msg, kind) {
  const wrap = document.getElementById('toasts');
  const t = el('div', { class: 'toast' + (kind === 'ok' ? ' ok' : '') }, [
    el('span', { class: 'ic', text: kind === 'ok' ? '✓' : 'ℹ' }), msg ]);
  wrap.append(t);
  setTimeout(() => { t.style.transition = 'opacity .3s, transform .3s'; t.style.opacity = '0'; t.style.transform = 'translateY(8px)'; setTimeout(() => t.remove(), 300); }, 2200);
}

/* ================================================================
   WIRING
   ================================================================ */
function init() {
  Store.subscribe(s => Views.renderAll(s));
  Views.renderAll(Store.get());

  document.getElementById('addStream').onclick = () => { Store.addStream(); Views.openStreamSettings(Store.curStream().id); };   // name + set its defaults right away
  document.getElementById('addSlide').onclick = () => { if (!Store.curStream()) { toast('Add a stream first'); return; } openPicker(); };
  document.getElementById('picker').onclick = e => { if (e.target.id === 'picker') closePicker(); };

  // mobile drill-down: ONE screen at a time — Streams → Slides(questions) → Edit slide
  const main = document.querySelector('.main');
  const isMobile = () => window.matchMedia('(max-width: 860px)').matches;
  const setMView = v => main.setAttribute('data-mview', v);
  setMView('streams');
  window.__makerNav = { setMView, isMobile };   // back buttons in the editor use this
  document.getElementById('navToggle').onclick = () => setMView('streams');   // hamburger = jump to Streams
  document.getElementById('slidesBack').onclick = () => setMView('streams');
  // tap a STREAM → its questions; tap a QUESTION → edit that slide
  document.getElementById('streamList').addEventListener('click', e => { if (isMobile() && e.target.closest('.row')) setMView('slides'); });
  document.getElementById('slideList').addEventListener('click', e => { if (isMobile() && e.target.closest('.row')) setMView('editor'); });

  // a small format-picker dropdown anchored under a button
  function ioMenu(anchor, items) {
    document.querySelectorAll('.io-menu').forEach(e => e.remove());
    const menu = el('div', { class: 'io-menu' });
    items.forEach(it => { if (it.sub) { menu.append(el('div', { class: 'io-sub', text: it.sub })); return; } const b = el('button', { text: it.label }); b.onclick = () => { menu.remove(); it.onClick(); }; menu.append(b); });
    document.body.append(menu);
    const r = anchor.getBoundingClientRect();
    menu.style.top = (r.bottom + 4) + 'px';
    menu.style.left = Math.max(8, Math.min(r.left, window.innerWidth - menu.offsetWidth - 8)) + 'px';
    setTimeout(() => { const close = e => { if (!menu.contains(e.target) && e.target !== anchor) { menu.remove(); document.removeEventListener('mousedown', close); } }; document.addEventListener('mousedown', close); }, 0);
  }

  const fileInput = document.getElementById('fileInput');
  // export — choose format: 🔒 encrypted (answers hidden) · JSON (plain) · CSV (editable text + themes)
  // two formats only: JSON (the recommended save — always ★ + 🔒 encrypted) or CSV (plain, editable)
  document.getElementById('exportBtn').onclick = e => ioMenu(e.currentTarget, [
    { label: '★ 🔒 JSON', onClick: () => IO.exportEncrypted() },
    { label: 'CSV', onClick: () => IO.exportCsv() },
  ]);
  document.getElementById('importBtn').onclick = e => ioMenu(e.currentTarget, [
    { label: '★ 🔒 JSON', onClick: () => { fileInput.accept = 'application/json,.json'; fileInput.dataset.mode = 'json'; fileInput.click(); } },
    { label: 'CSV', onClick: () => { fileInput.accept = '.csv,text/csv,text/plain'; fileInput.dataset.mode = 'csv'; fileInput.click(); } },
  ]);
  fileInput.onchange = () => { if (fileInput.files[0]) { fileInput.dataset.mode === 'csv' ? IO.importCsvFile(fileInput.files[0]) : IO.importFile(fileInput.files[0]); } fileInput.value = ''; };

  // deck name (asked up front; used for export filenames + the browser tab title)
  const deckInput = document.getElementById('deckName');
  deckInput.value = Store.project().name === 'Untitled Deck' ? '' : (Store.project().name || '');
  deckInput.oninput = () => Store.setDeckName(deckInput.value.trim() || 'Untitled Deck');
  Store.syncTitle();   // reflect the loaded deck name in the tab title right away

  // present / preview (debug harness) — starts from the selected slide
  const present = () => { const s = Store.curStream(); if (!s) { toast('Add a stream first'); return; } Present.open(s, Store.get().selSlide); };
  document.getElementById('presentBtn').onclick = present;
  document.getElementById('themeBtn').onclick = () => Theme.open();
  document.getElementById('resetBtn').onclick = () => { if (confirm('Clear ALL local data (deck, slides, themes, scores) and reload the fresh sample deck?\n\nExport first if you want to keep your work — this cannot be undone.')) Store.reset(); };

  // keyboard niceties
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePicker();
    const typing = /^(INPUT|TEXTAREA|SELECT)$/.test((e.target.tagName || ''));
    if (!typing && (e.key === 'p' || e.key === 'P')) present();
  });

  // test/automation hook (also handy for debugging)
  window.CFC = { Store, Theme, Present, Scores, SlideTypes, kindOf, CryptoBox, IO, CsvIO };
}
document.addEventListener('DOMContentLoaded', init);
</script>
