<!-- Type picker -->
<div class="picker" id="picker">
  <div class="sheet">
    <h3>Add a slide</h3>
    <p class="muted">Pick a template. Everything is editable after.</p>
    <div id="pickerGroups"></div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
"use strict";
/* ================================================================
   CFC QUIZ — MAKER
   Single-file, no server, localStorage + file export/import.

   Architecture (SOLID):
     • Store          — single source of truth, persistence, pub/sub  (SRP, DIP)
     • SlideTypes      — plugin registry of slide templates           (OCP)
     • FieldRenderers  — plugin registry of form-field widgets        (OCP)
     • FormRenderer    — generic: builds a form from a type's fields  (SRP)
     • Views           — Streams / Slides / Editor render functions   (SRP)
     • IO              — export/import + file helpers                 (SRP)

   ┌─────────────────────────────────────────────────────────────┐
   │ HOW TO ADD A NEW QUESTION TYPE  (this is the whole job):      │
   │   SlideTypes.register({ type, label, group, icon, desc,       │
   │                         createDefault, fields, summary })      │
   │ Nothing else changes — the form, the slide list, storage and  │
   │ export all read the registry. Same story for FieldRenderers.  │
   └─────────────────────────────────────────────────────────────┘
   ================================================================ */

/* ---------- tiny utils ---------- */
const uid = () => 'id_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);
const el = (tag, props = {}, kids = []) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k === 'text') n.textContent = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (v === true) n.setAttribute(k, '');
    else if (v !== false && v != null) n.setAttribute(k, v);
  }
  (Array.isArray(kids) ? kids : [kids]).forEach(c => c != null && n.append(c.nodeType ? c : document.createTextNode(c)));
  return n;
};
const clamp = (s, n = 70) => !s ? '' : (s.length > n ? s.slice(0, n - 1) + '…' : s);

/* ================================================================
   FIELD RENDERERS — registry of widgets. Each returns a DOM node and
   calls onChange(newValue) when edited.  Add a key here = new widget.
   ================================================================ */
const FieldRenderers = {
  text: (def, val, onChange) =>
    el('input', { type: 'text', value: val ?? '', placeholder: def.placeholder || '',
      oninput: e => onChange(e.target.value) }),

  textarea: (def, val, onChange) =>
    el('textarea', { placeholder: def.placeholder || '', oninput: e => onChange(e.target.value) }, val ?? ''),

  number: (def, val, onChange) =>
    el('input', { type: 'number', value: val ?? '', min: def.min ?? '', max: def.max ?? '',
      placeholder: def.placeholder || '', oninput: e => onChange(e.target.value === '' ? null : Number(e.target.value)) }),

  /* timer: snaps to an allowed value (10..60 by 5, 75/90/105/120, then 2m..7m by 30s). 0 = off. */
  timer: (def, val, onChange) => {
    const STEPS = [10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 75, 90, 105, 120, 150, 180, 210, 240, 270, 300, 330, 360, 390, 420];
    const lab = s => s < 60 ? s + 's' : Math.floor(s / 60) + 'm' + (s % 60 ? ' ' + (s % 60) + 's' : '');
    const nearest = n => STEPS.reduce((a, b) => Math.abs(b - n) < Math.abs(a - n) ? b : a, STEPS[0]);
    let v = Number(val) || 0;
    const wrap = el('div', { class: 'timerfield' });
    const seg = el('div', { class: 'seg' });
    const onBtn = el('button', { type: 'button', text: 'On' });
    const offBtn = el('button', { type: 'button', text: 'Off' });
    const sel = el('select', { class: 'tsel' });
    STEPS.forEach(s => sel.append(el('option', { value: s, text: lab(s) })));
    const paint = () => {
      const on = v > 0;
      wrap.classList.toggle('off', !on);
      onBtn.classList.toggle('on', on); offBtn.classList.toggle('on', !on);
      sel.value = String(on ? nearest(v) : 20);
    };
    const setV = nv => { v = nv > 0 ? nearest(nv) : 0; onChange(v); paint(); };
    onBtn.onclick = () => setV(Number(sel.value) || 20);
    offBtn.onclick = () => setV(0);
    sel.onchange = () => setV(Number(sel.value));
    seg.append(onBtn, offBtn);
    wrap.append(seg, sel);
    paint();
    return wrap;
  },

  boolean: (def, val, onChange) => {
    const wrap = el('div', { class: 'seg' });
    const tBtn = el('button', { type: 'button', class: val === true ? 'on' : '', text: def.trueLabel || 'True' });
    const fBtn = el('button', { type: 'button', class: val === false ? 'on' : '', text: def.falseLabel || 'False' });
    tBtn.onclick = () => { onChange(true); tBtn.classList.add('on'); fBtn.classList.remove('on'); };
    fBtn.onclick = () => { onChange(false); fBtn.classList.add('on'); tBtn.classList.remove('on'); };
    wrap.append(tBtn, fBtn); return wrap;
  },

  /* choices: array of {text, correct}. variant: 'single' | 'multi' | 'none' */
  choices: (def, val, onChange) => {
    let list = Array.isArray(val) ? val.map(o => ({ text: o.text || '', correct: !!o.correct })) : [];
    const variant = def.variant || 'single';
    const wrap = el('div', { class: 'choices' });
    const rerender = () => {
      wrap.innerHTML = '';
      list.forEach((opt, i) => {
        const row = el('div', { class: 'choice' + (opt.correct ? ' is-correct' : '') });
        if (variant !== 'none') {
          const mark = el('span', { class: 'mark' });
          const input = el('input', { type: variant === 'single' ? 'radio' : 'checkbox',
            name: 'correct_' + def.key, checked: opt.correct });
          input.onchange = () => {
            if (variant === 'single') list.forEach((o, j) => o.correct = j === i);
            else list[i].correct = input.checked;
            commit(); rerender();
          };
          mark.append(input); row.append(mark);
        }
        const tx = el('input', { type: 'text', value: opt.text, placeholder: 'Option ' + (i + 1) });
        tx.oninput = () => { list[i].text = tx.value; commit(); };
        const tag = el('span', { class: 'correct-tag', text: 'correct' });
        const del = el('button', { class: 'icon-btn', type: 'button', title: 'Remove', html: '✕' });
        del.onclick = () => { list.splice(i, 1); commit(); rerender(); };
        row.append(tx, tag, del);
        wrap.append(row);
      });
      const add = el('button', { class: 'btn add-row sm', type: 'button', text: '+ Add option' });
      add.onclick = () => { list.push({ text: '', correct: false }); commit(); rerender(); };
      wrap.append(add);
    };
    const commit = () => onChange(list.map(o => ({ text: o.text, correct: o.correct })));
    rerender(); return wrap;
  },

  /* choice: composite {options:[{text,correct}], multiple} — single OR multiple correct in one widget */
  choice: (def, val, onChange) => {
    let v = (val && typeof val === 'object')
      ? { options: (val.options || []).map(o => ({ text: o.text || '', correct: !!o.correct })), multiple: !!val.multiple }
      : { options: [], multiple: false };
    const commit = () => onChange({ options: v.options.map(o => ({ text: o.text, correct: o.correct })), multiple: v.multiple });
    const wrap = el('div');
    const seg = el('div', { class: 'seg' });
    const singleBtn = el('button', { type: 'button', text: 'Single answer' });
    const multiBtn = el('button', { type: 'button', text: 'Multiple answers' });
    const optsBox = el('div', { class: 'choices' });
    const paintSeg = () => { singleBtn.classList.toggle('on', !v.multiple); multiBtn.classList.toggle('on', v.multiple); };
    singleBtn.onclick = () => { v.multiple = false; let seen = false; v.options.forEach(o => { if (o.correct) { if (seen) o.correct = false; else seen = true; } }); commit(); paintSeg(); renderOpts(); };
    multiBtn.onclick = () => { v.multiple = true; commit(); paintSeg(); renderOpts(); };
    seg.append(singleBtn, multiBtn);
    function renderOpts() {
      optsBox.innerHTML = '';
      v.options.forEach((opt, i) => {
        const row = el('div', { class: 'choice' + (opt.correct ? ' is-correct' : '') });
        const input = el('input', { type: v.multiple ? 'checkbox' : 'radio', name: 'corr_' + def.key, checked: opt.correct });
        input.onchange = () => { if (v.multiple) v.options[i].correct = input.checked; else v.options.forEach((o, j) => o.correct = j === i); commit(); renderOpts(); };
        const tx = el('input', { type: 'text', value: opt.text, placeholder: 'Option ' + (i + 1) });
        tx.oninput = () => { v.options[i].text = tx.value; commit(); };
        const del = el('button', { class: 'icon-btn', type: 'button', html: '✕' });
        del.onclick = () => { v.options.splice(i, 1); commit(); renderOpts(); };
        row.append(el('span', { class: 'mark' }, [ input ]), tx, el('span', { class: 'correct-tag', text: 'correct' }), del);
        optsBox.append(row);
      });
      const add = el('button', { class: 'btn add-row sm', type: 'button', text: '+ Add option' });
      add.onclick = () => { v.options.push({ text: '', correct: false }); commit(); renderOpts(); };
      optsBox.append(add);
    }
    paintSeg(); renderOpts();
    wrap.append(seg, el('div', { style: 'height:10px' }), optsBox);
    return wrap;
  },

  /* pairs: array of {left, right} for matching */
  pairs: (def, val, onChange) => {
    let list = Array.isArray(val) ? val.map(p => ({ left: p.left || '', right: p.right || '' })) : [];
    const wrap = el('div', { class: 'pairs' });
    const commit = () => onChange(list.map(p => ({ left: p.left, right: p.right })));
    const rerender = () => {
      wrap.innerHTML = '';
      list.forEach((p, i) => {
        const l = el('input', { type: 'text', value: p.left, placeholder: 'Item' });
        const r = el('input', { type: 'text', value: p.right, placeholder: 'Match' });
        l.oninput = () => { list[i].left = l.value; commit(); };
        r.oninput = () => { list[i].right = r.value; commit(); };
        const del = el('button', { class: 'icon-btn', type: 'button', html: '✕' });
        del.onclick = () => { list.splice(i, 1); commit(); rerender(); };
        wrap.append(el('div', { class: 'pair' }, [l, el('span', { class: 'link', text: '↔' }), r, del]));
      });
      const add = el('button', { class: 'btn add-row sm', type: 'button', text: '+ Add pair' });
      add.onclick = () => { list.push({ left: '', right: '' }); commit(); rerender(); };
      wrap.append(add);
    };
    rerender(); return wrap;
  },

  /* image: stores a string (data-URL for offline reliability, or a pasted URL) */
  image: (def, val, onChange) => {
    const wrap = el('div', { class: 'imgfield' });
    const thumb = el('div', { class: 'thumb' });
    const paint = () => { thumb.innerHTML = ''; if (val) thumb.append(el('img', { src: val })); else thumb.textContent = 'No image'; };
    const file = el('input', { type: 'file', accept: 'image/*' });
    file.onchange = () => {
      const f = file.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = () => { val = rd.result; onChange(val); paint(); };
      rd.readAsDataURL(f);
    };
    const url = el('input', { type: 'text', placeholder: '…or paste an image URL', value: (val && !val.startsWith('data:')) ? val : '' });
    url.oninput = () => { val = url.value.trim(); onChange(val); paint(); };
    const clr = el('button', { class: 'btn sm danger', type: 'button', text: 'Clear' });
    clr.onclick = () => { val = ''; onChange(''); url.value = ''; file.value = ''; paint(); };
    paint();
    wrap.append(thumb, el('div', { class: 'ctrls' }, [file, url, clr]));
    return wrap;
  },
};

/* ================================================================
   SLIDE TYPES — the plugin registry (Open/Closed extension point).
   ================================================================ */
const SlideTypes = (() => {
  const map = new Map();
  const order = [];
  const T = 20; // default per-question timer (seconds)
  const timerField = { key: 'timer', label: 'Timer', type: 'timer', hint: 'countdown ring on the question' };
  return {
    register(def) { if (!map.has(def.type)) order.push(def.type); map.set(def.type, def); },
    get: t => map.get(t),
    all: () => order.map(t => map.get(t)),
    byGroup() {
      const g = {};
      order.forEach(t => { const d = map.get(t); (g[d.group] ||= []).push(d); });
      return g;
    },
    T, timerField,
  };
})();

/* ---------- built-in slide types ---------- */
const TF = SlideTypes.timerField, T = SlideTypes.T;

// CONTENT
SlideTypes.register({ type: 'title', label: 'Title / Section', group: 'Content', icon: '🏷️',
  desc: 'Open the quiz or mark a round',
  createDefault: () => ({ heading: '', subheading: '' }),
  fields: [ { key: 'heading', label: 'Heading', type: 'text', placeholder: 'Round 1: Warm-up' },
            { key: 'subheading', label: 'Subheading / instructions', type: 'textarea', placeholder: 'Optional — room for instructions, rules, a verse… line breaks are kept.' } ],
  summary: d => d.heading });

SlideTypes.register({ type: 'answer', label: 'Answer / Reveal', group: 'Content', icon: '💡',
  desc: 'A standalone reveal or explanation slide',
  createDefault: () => ({ heading: '', body: '' }),
  fields: [ { key: 'heading', label: 'Heading', type: 'text', placeholder: 'The answer is…' },
            { key: 'body', label: 'Body', type: 'textarea', placeholder: 'Explanation / verse text' } ],
  summary: d => d.heading || d.body });

SlideTypes.register({ type: 'leaderboard', label: 'Leaderboard', group: 'Content', icon: '🏆',
  desc: 'Show current team standings',
  createDefault: () => ({ title: 'Standings' }),
  fields: [ { key: 'title', label: 'Title', type: 'text', placeholder: 'Standings' } ],
  summary: d => d.title });

SlideTypes.register({ type: 'podium', label: 'Podium (Winners)', group: 'Content', icon: '🏅',
  desc: 'Top 3 teams on a podium — the grand finale',
  createDefault: () => ({ title: 'Winners!' }),
  fields: [ { key: 'title', label: 'Title', type: 'text', placeholder: 'Winners!' } ],
  summary: d => d.title });

SlideTypes.register({ type: 'reveal-answers', kind: 'content', label: 'Reveal Answers', group: 'Content', icon: '🗂️',
  desc: 'Browse the answers of every question before this slide (back to the previous Reveal Answers slide) — arrows, auto-advance, optional loop',
  createDefault: () => ({ title: 'Answers', auto: 10, loop: false }),
  fields: [ { key: 'title', label: 'Title', type: 'text', placeholder: 'Answers' },
            { key: 'auto', label: 'Seconds per answer', type: 'number', min: 0, placeholder: '10', hint: 'auto-shows the next answer · 0 = manual (arrows only)' },
            { key: 'loop', label: 'Loop', type: 'boolean', trueLabel: 'Yes', falseLabel: 'No', hint: 'start over from the first answer after the last' } ],
  summary: d => d.title });

// QUESTIONS (kind: 'question' — switchable formats; answer is built into each)
SlideTypes.register({ type: 'choices', kind: 'question', label: 'Choices', group: 'Questions', icon: '◆',
  desc: 'Single or multiple correct answers',
  createDefault: () => ({ question: '', media: '', choice: { options: [ { text: '', correct: true }, { text: '', correct: false } ], multiple: false }, timer: T }),
  fields: [ { key: 'question', label: 'Question', type: 'textarea' },
            { key: 'media', label: 'Image', type: 'image', hint: 'optional' },
            { key: 'choice', label: 'Answers', type: 'choice' },
            TF ],
  summary: d => d.question });

SlideTypes.register({ type: 'true-false', label: 'True / False', group: 'Questions', icon: '⊻',
  desc: 'Is the statement true?',
  createDefault: () => ({ statement: '', answer: true, timer: T }),
  fields: [ { key: 'statement', label: 'Statement', type: 'textarea' },
            { key: 'answer', label: 'Correct answer', type: 'boolean', trueLabel: 'True', falseLabel: 'False' },
            TF ],
  summary: d => d.statement });

SlideTypes.register({ type: 'short-answer', label: 'Short Answer', group: 'Questions', icon: '✏️',
  desc: 'Teams type or say the answer — no multiple choice (a word or a number)',
  createDefault: () => ({ question: '', answer: '', timer: T }),
  fields: [ { key: 'question', label: 'Question', type: 'textarea', placeholder: 'Ask anything — use ___ for a fill-in blank' },
            { key: 'answer', label: 'Answer', type: 'text', placeholder: 'a word or a number' },
            TF ],
  summary: d => d.question });

SlideTypes.register({ type: 'titled-question', label: 'Question with Title', group: 'Questions', icon: '📜',
  desc: 'A question shown under its own title/heading',
  createDefault: () => ({ title: '', question: '', answer: '', timer: T }),
  fields: [ { key: 'title', label: 'Title', type: 'text', placeholder: 'shown above the question (optional)' },
            { key: 'question', label: 'Question', type: 'textarea', placeholder: 'The question / passage to show' },
            { key: 'answer', label: 'Answer', type: 'text', placeholder: 'e.g. John 3:16' },
            TF ],
  summary: d => d.question || d.title });


SlideTypes.register({ type: 'image-question', label: 'Image Question', group: 'Questions', icon: '🖼️',
  desc: 'Identify / answer about an image',
  createDefault: () => ({ question: '', media: '', answer: '', timer: T }),
  fields: [ { key: 'question', label: 'Question', type: 'textarea' },
            { key: 'media', label: 'Image', type: 'image' },
            { key: 'answer', label: 'Answer', type: 'text' },
            TF ],
  summary: d => d.question });

SlideTypes.register({ type: 'matching', label: 'Matching', group: 'Questions', icon: '⇄',
  desc: 'Match items in two columns',
  createDefault: () => ({ instruction: '', pairs: [ { left: '', right: '' }, { left: '', right: '' } ], timer: T }),
  fields: [ { key: 'instruction', label: 'Instruction', type: 'textarea', placeholder: 'Match the person to the verse' },
            { key: 'pairs', label: 'Pairs', type: 'pairs', hint: 'shown shuffled to players' },
            TF ],
  summary: d => d.instruction });

SlideTypes.register({ type: 'poll', label: 'Poll', group: 'Questions', icon: '📊',
  desc: 'Vote — no right answer',
  createDefault: () => ({ question: '', options: [ { text: '' }, { text: '' } ], timer: T }),
  fields: [ { key: 'question', label: 'Question', type: 'textarea' },
            { key: 'options', label: 'Options', type: 'choices', variant: 'none' },
            TF ],
  summary: d => d.question });

SlideTypes.register({ type: 'buzzer', label: 'Buzzer', group: 'Questions', icon: '🔔',
  desc: 'First team to buzz answers',
  createDefault: () => ({ question: '', answer: '', timer: 0 }),
  fields: [ { key: 'question', label: 'Question', type: 'textarea' },
            { key: 'answer', label: 'Answer', type: 'text' },
            TF ],
  summary: d => d.question });

/* slide-kind helper: question | leaderboard | title (derived from a slide's type) */
function kindOf(type) {
  const d = SlideTypes.get(type);
  if (d && d.kind) return d.kind;
  return type === 'leaderboard' ? 'leaderboard' : (type === 'title' || type === 'answer' || type === 'podium') ? 'title' : 'question';
}
/* the main-prompt field key per question format — lets you switch format and keep the question text */
const PROMPT_KEY = { choices: 'question', 'true-false': 'statement', 'short-answer': 'question', 'titled-question': 'question', 'image-question': 'question', matching: 'instruction', poll: 'question', buzzer: 'question' };

/* ================================================================
   THEME DATA — offline-safe font stacks + a starter theme library.
   A theme is plain data; the Show renders entirely from these vars,
   so one theme automatically styles every slide type (reuse = free).
   ================================================================ */
const THEME_FONTS = {
  'System Sans':   '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
  'Georgia Serif': 'Georgia, "Times New Roman", serif',
  'Helvetica':     'Helvetica, Arial, sans-serif',
  'Trebuchet':     '"Trebuchet MS", Helvetica, sans-serif',
  'Palatino Serif':'"Palatino Linotype", "Book Antiqua", Palatino, serif',
  'Verdana':       'Verdana, Geneva, Tahoma, sans-serif',
};
const THEME_DEFAULTS = [
  { id:'theme-midnight',  name:'Midnight',  bgType:'radial', bg1:'#232c45', bg2:'#0a0e1d', angle:160, ink:'#ffffff', accent:'#4f46e5', correct:'#2fd39a', headingFont:'System Sans',    bodyFont:'System Sans' },
  { id:'theme-royal',     name:'Royal',     bgType:'linear', bg1:'#3b0764', bg2:'#1e1b4b', angle:160, ink:'#ffffff', accent:'#f59e0b', correct:'#34d399', headingFont:'Palatino Serif', bodyFont:'System Sans' },
  { id:'theme-parchment', name:'Parchment', bgType:'linear', bg1:'#fdf6e3', bg2:'#efe2bf', angle:160, ink:'#3a2e1f', accent:'#b45309', correct:'#15803d', headingFont:'Georgia Serif',  bodyFont:'Georgia Serif' },
  { id:'theme-sunrise',   name:'Sunrise',   bgType:'linear', bg1:'#3b1059', bg2:'#9a3412', angle:155, ink:'#ffffff', accent:'#fb923c', correct:'#34d399', headingFont:'System Sans', bodyFont:'System Sans' },
];
const cloneThemes = () => JSON.parse(JSON.stringify(THEME_DEFAULTS));

/* ================================================================
   STORE — single source of truth + persistence + pub/sub
   ================================================================ */
/* shared theme content-compare — CSV export uses it (only EDITED built-ins export) and
   mergeStreams uses it (an untouched stock built-in carries no information) */
const THEME_KEYS = ['bgType', 'bg1', 'bg2', 'angle', 'ink', 'accent', 'correct', 'headingFont', 'bodyFont'];
const sameTheme = (a, b) => THEME_KEYS.every(k => String(a[k] ?? '') === String(b[k] ?? ''));

const Store = (() => {
  const KEY = 'm_cfc-quiz-maker-v4';   // m_ = maker-owned; Display never shares a key
  const listeners = new Set();
  let state = load();

  // teamCount is a DECK-level setting: all streams share one scoreboard, so they share one team count.
  function blankProject() { return { app: 'cfc-quiz', kind: 'content', version: 2, name: 'Untitled Deck', teamCount: 20, themes: cloneThemes(), themeId: THEME_DEFAULTS[0].id, streams: [] }; }

  // first-run seed: a main quiz that shows EVERY current slide type meaningfully
  // (leaderboard in the middle, podium at the end) + a parallel "Audience Round" stream
  // + a "Quick-Fire Rounds" stream (Auto next + per-round Reveal Answers slides).
  function buildDemo() {
    const S = (type, data, options) => ({ id: uid(), type, data, options: options || {} });
    const main = { id: uid(), name: 'Main Quiz', themeId: null, slides: [
      S('title', { heading: 'CFC Quiz Night', subheading:
        'How to play\n• Each team locks in ONE answer per question.\n• Answer before the timer hits zero.\n• Points are tallied after every question — keep an eye on the scoreboard!' }),
      // multiple choice — single answer (Main Quiz questions SHOW their answer screen)
      S('choices', { question: 'Who built the ark?', media: '', timer: 20,
        choice: { multiple: false, options: [ { text: 'Noah', correct: true }, { text: 'Moses', correct: false }, { text: 'David', correct: false }, { text: 'Paul', correct: false } ] } }, { reveal: true }),
      // multiple choice — select-all
      S('choices', { question: 'Which of these are Gospels? (select all)', media: '', timer: 25,
        choice: { multiple: true, options: [ { text: 'Matthew', correct: true }, { text: 'Mark', correct: true }, { text: 'Acts', correct: false }, { text: 'John', correct: true } ] } }, { reveal: true }),
      // true / false
      S('true-false', { statement: 'Jonah was swallowed by a great fish.', answer: true, timer: 15 }, { reveal: true }),
      // short answer — a word
      S('short-answer', { question: 'Finish the verse: “The Lord is my ___.”', answer: 'shepherd', timer: 25 }, { reveal: true }),
      // short answer — a number
      S('short-answer', { question: 'How many books are in the New Testament?', answer: '27', timer: 20 }, { reveal: true }),
      // question with its own title / heading
      S('titled-question', { title: 'John 3:16', question: '“For God so loved the ___ that he gave his one and only Son.”', answer: 'world', timer: 30 }, { reveal: true }),
      // picture question
      S('image-question', { question: 'Name this symbol of the faith.', media: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjAiIGhlaWdodD0iMTUwIj48cmVjdCB3aWR0aD0iMTIwIiBoZWlnaHQ9IjE1MCIgZmlsbD0iI2ZkZjZlMyIvPjxyZWN0IHg9IjUyIiB5PSIxNSIgd2lkdGg9IjE2IiBoZWlnaHQ9IjEyMCIgcng9IjMiIGZpbGw9IiNiNDUzMDkiLz48cmVjdCB4PSIyNSIgeT0iNDUiIHdpZHRoPSI3MCIgaGVpZ2h0PSIxNiIgcng9IjMiIGZpbGw9IiNiNDUzMDkiLz48L3N2Zz4=', answer: 'The cross', timer: 20 }, { reveal: true }),
      // matching pairs
      S('matching', { instruction: 'Match each person to their role.', timer: 40,
        pairs: [ { left: 'Moses', right: 'Led the Exodus' }, { left: 'David', right: 'King of Israel' }, { left: 'Mary', right: 'Mother of Jesus' } ] }, { reveal: true }),
      // —— leaderboard in the MIDDLE ——
      S('leaderboard', { title: 'Halftime Standings' }),
      // poll (no right answer)
      S('poll', { question: 'Which round are you most excited for?', timer: 0,
        options: [ { text: 'Buzzer' }, { text: 'Verses' }, { text: 'Pictures' } ] }),
      // buzzer round
      S('buzzer', { question: 'First to buzz: name the first book of the Bible.', answer: 'Genesis', timer: 0 }, { reveal: true }),
      // a reveal / answer slide
      S('answer', { heading: 'Well done!', body: '“Well done, good and faithful servant.” — Matthew 25:23' }),
      // —— podium at the END ——
      S('podium', { title: 'Champions!' }),
    ] };
    // a parallel track played by the SAME teams — shows "Scored: No" (no scoring page),
    // the default "Show answer screen: No" (no inline answer) and the Reveal Answers catch-up slide
    const audience = { id: uid(), name: 'Audience Round', themeId: 'theme-parchment', slides: [
      S('title', { heading: 'Audience Round', subheading: 'Just for fun — these don’t affect the scoreboard.' }),
      S('short-answer', { question: 'Audience: name a fruit of the Spirit.', answer: 'love, joy, peace…', timer: 20 }, { scored: false }),
      S('true-false', { statement: 'Audience: the Bible has 66 books.', answer: true, timer: 15 }, { scored: false }),
      S('reveal-answers', { title: 'The Answers', auto: 10, loop: false }),
      S('leaderboard', { title: 'Standings' }),
    ] };
    // two ROUNDS of 2 questions, each closed by its own Reveal Answers slide (scoped to its round) —
    // shows "Auto next" (time's up → moves on by itself) with the default "Show answer screen: No"
    const rounds = { id: uid(), name: 'Quick-Fire Rounds', themeId: null, slides: [
      S('title', { heading: 'Quick-Fire Rounds', subheading: 'No answer screens during the round — when time’s up the show moves on by itself.\nEach round ends with a Reveal Answers slide that walks through its answers.' }),
      // Round 1 — scored; time's up auto-advances to the scoring page
      S('choices', { question: 'Which book comes first?', media: '', timer: 15,
        choice: { multiple: false, options: [ { text: 'Genesis', correct: true }, { text: 'Exodus', correct: false }, { text: 'Psalms', correct: false } ] } }, { autoNext: true }),
      S('true-false', { statement: 'Jesus had 12 disciples.', answer: true, timer: 15 }, { autoNext: true }),
      S('reveal-answers', { title: 'Round 1 — Answers', auto: 10, loop: false }),
      // Round 2 — not scored; time's up jumps straight to the next question
      S('short-answer', { question: 'How many days did creation take?', answer: '6 — then He rested', timer: 15 }, { autoNext: true, scored: false }),
      S('short-answer', { question: 'Name the garden where Adam and Eve lived.', answer: 'Eden', timer: 15 }, { autoNext: true, scored: false }),
      S('reveal-answers', { title: 'Round 2 — Answers', auto: 10, loop: false }),
    ] };
    const p = blankProject(); p.name = 'CFC Sample Deck'; p.streams.push(main, audience, rounds); return p;
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) { const p = JSON.parse(raw); return { project: normalize(p.project || p), selStream: p.selStream || null, selSlide: p.selSlide || null }; }
    } catch (e) { console.warn('load failed', e); }
    const p = normalize(buildDemo()); const f = p.streams[0];
    return { project: p, selStream: f.id, selSlide: f.slides[0].id };
  }

  // normalize older slide shapes to the current model (e.g. MC/MA → choices). No data migration of removed types.
  function migrateSlide(sl) {
    if (sl.type === 'multiple-choice' || sl.type === 'multiple-answer') {
      const opts = ((sl.data && sl.data.options) || []).map(o => ({ text: o.text || '', correct: !!o.correct }));
      sl.data.choice = { options: opts, multiple: sl.type === 'multiple-answer' };
      delete sl.data.options;
      sl.type = 'choices';
    }
    return sl;
  }
  function normalize(p) {
    p = p || blankProject(); p.app = 'cfc-quiz'; p.kind = 'content';
    // v2: "Show answer screen" now defaults NO. Decks saved before the flip showed an answer
    // screen on every question, so grandfather them: stamp reveal:true where it was never set.
    const legacyReveal = !p.version || p.version < 2;
    p.version = 2;
    p.name = p.name || 'Untitled Deck';
    p.themes = (Array.isArray(p.themes) && p.themes.length) ? p.themes : cloneThemes();
    // one-time refresh of built-in themes (keeps custom/renamed ones untouched) so fixes land without wiping data
    if (!p.themesVersion || p.themesVersion < 2) {
      p.themes = p.themes.map(t => { const def = THEME_DEFAULTS.find(d => d.id === t.id && d.name === t.name); return def ? Object.assign({}, t, def) : t; });
      p.themesVersion = 2;
    }
    if (!p.themes.find(t => t.id === p.themeId)) p.themeId = p.themes[0].id;
    // deck-level team count: take the deck's own value, else the first stream's (older shape), else 20
    p.teamCount = Math.max(1, Math.min(99, Math.round(p.teamCount || (p.streams && p.streams[0] && p.streams[0].teamCount) || 20)));
    p.streams = (p.streams || []).map(s => ({ id: s.id || uid(), name: s.name || 'Stream',
      teamCount: p.teamCount, themeId: s.themeId || null,   // mirror the deck count onto every stream
      defaults: s.defaults || undefined,                    // per-stream new-question defaults (preserved on import/export)
      slides: (s.slides || []).map(sl => {
        sl = migrateSlide({ id: sl.id || uid(), type: sl.type, data: sl.data || {}, options: sl.options || {} });
        if (legacyReveal && kindOf(sl.type) === 'question' && sl.type !== 'poll' && sl.options.reveal == null) sl.options.reveal = true;
        return sl;
      }) }));
    return p;
  }
  let warnedFull = false;
  // the browser tab title tracks the deck name (falls back to the app name for an unnamed deck)
  function syncTitle() {
    const nm = state.project && state.project.name;
    document.title = (nm && nm !== 'Untitled Deck') ? nm + ' · Maker' : 'CFC Quiz · Maker';
  }
  function persist() {
    syncTitle();
    try { localStorage.setItem(KEY, JSON.stringify(state)); warnedFull = false; }
    catch (e) {
      console.warn('persist failed (likely storage quota from embedded images)', e);
      if (!warnedFull && typeof toast === 'function') { warnedFull = true; toast('⚠ Local storage is full (large images). Use Export to save everything to a file.'); }
    }
  }
  function emit() { persist(); listeners.forEach(l => l(state)); }

  /* selectors */
  const curStream = () => state.project.streams.find(s => s.id === state.selStream) || null;
  const curSlide = () => { const s = curStream(); return s ? s.slides.find(x => x.id === state.selSlide) || null : null; };

  return {
    subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },
    get: () => state, project: () => state.project, curStream, curSlide,
    setDeckName(n) { state.project.name = n; persist(); },
    syncTitle,   // reflect the deck name in the browser tab title (called on init + every persist)
    // deck branding (show header logo/title + footer note) — empty/absent = hidden (old decks unchanged)
    setBranding(patch) { state.project.branding = Object.assign({}, state.project.branding, patch); persist(); },
    reset() { try { Object.keys(localStorage).filter(k => k.startsWith('m_')).forEach(k => localStorage.removeItem(k)); } catch (e) {} location.reload(); },

    /* streams */
    addStream() {
      const n = state.project.streams.length + 1;
      const s = { id: uid(), name: 'Stream ' + n, teamCount: state.project.teamCount || 20, slides: [] };
      state.project.streams.push(s); state.selStream = s.id; state.selSlide = null; emit();
    },
    selectStream(id) { state.selStream = id; const s = curStream(); state.selSlide = s && s.slides[0] ? s.slides[0].id : null; emit(); },
    renameStream(id, name) { const s = state.project.streams.find(x => x.id === id); if (s) { s.name = name; emit(); } },
    moveStream(id, dir) { const a = state.project.streams; const i = a.findIndex(x => x.id === id); const j = i + dir;
      if (i < 0 || j < 0 || j >= a.length) return; [a[i], a[j]] = [a[j], a[i]]; emit(); },
    // deck-level: one team count for the whole deck (shared scoreboard), mirrored onto every stream
    setTeamCount(n) { const v = Math.max(1, Math.min(99, Math.round(n || 1))); state.project.teamCount = v; state.project.streams.forEach(s => s.teamCount = v); emit(); },
    deleteStream(id) {
      state.project.streams = state.project.streams.filter(s => s.id !== id);
      if (state.selStream === id) { const f = state.project.streams[0]; state.selStream = f ? f.id : null; state.selSlide = f && f.slides[0] ? f.slides[0].id : null; }
      emit();
    },

    /* slides */
    addSlide(type) {
      const s = curStream(); if (!s) return;
      const def = SlideTypes.get(type); if (!def) return;
      const sl = { id: uid(), type, data: def.createDefault(), options: {} };
      // a new QUESTION inherits the stream's default timer / start / points / reveal / scored / auto-next (where applicable)
      if (kindOf(type) === 'question' && s.defaults) {
        const d = s.defaults;
        if (d.timer != null && 'timer' in sl.data && sl.data.timer !== 0) sl.data.timer = d.timer;   // buzzer ships timer:0 by design — don't clobber (poll ships 20, a voting window, and inherits)
        if (d.points != null) sl.data.points = d.points;
        if (d.autoStart === false) sl.options.autoStart = false;
        if (d.reveal === true) sl.options.reveal = true;       // "Show answer screen" defaults NO — only Yes is a deviation
        if (d.scored === false) sl.options.scored = false;
        if (d.autoNext === true) sl.options.autoNext = true;
      }
      const idx = s.slides.findIndex(x => x.id === state.selSlide);
      if (idx >= 0) s.slides.splice(idx + 1, 0, sl); else s.slides.push(sl);
      state.selSlide = sl.id; emit();
    },
    setStreamDefaults(id, defaults) {
      const s = state.project.streams.find(x => x.id === id); if (!s) return;
      const d = Object.assign({ timer: 20, autoStart: true, points: 1, reveal: false, scored: true, autoNext: false }, s.defaults, defaults);
      d.timer = Math.max(0, Math.round(Number(d.timer) || 0));            // same clamping as per-slide values
      d.points = Math.max(0, Math.round(Number(d.points) || 0));
      s.defaults = d; emit();
    },
    selectSlide(id) { state.selSlide = id; emit(); },
    // switch a question's format, preserving the question text + image + timer
    changeType(id, newType) {
      const s = curStream(); if (!s) return; const sl = s.slides.find(x => x.id === id); if (!sl || sl.type === newType) return;
      const def = SlideTypes.get(newType); if (!def) return;
      const ok = PROMPT_KEY[sl.type], nk = PROMPT_KEY[newType];
      const prompt = ok ? sl.data[ok] : '';
      const media = sl.data.media, timer = sl.data.timer, points = sl.data.points;
      const nd = def.createDefault();
      if (nk && prompt) nd[nk] = prompt;
      if ('media' in nd && media != null) nd.media = media;
      if ('timer' in nd && timer != null) nd.timer = timer;
      if (points != null) nd.points = points;   // keep the points when switching question format
      sl.type = newType; sl.data = nd; emit();
    },
    updateSlideData(id, key, value) { const s = curStream(); if (!s) return; const sl = s.slides.find(x => x.id === id); if (sl) { if ((key === 'points' || key === 'auto') && value !== '' && value != null) value = Math.max(0, Math.round(Number(value) || 0)); sl.data[key] = value; persist(); refreshList(); } },
    moveSlide(id, dir) { const s = curStream(); if (!s) return; const i = s.slides.findIndex(x => x.id === id); const j = i + dir;
      if (i < 0 || j < 0 || j >= s.slides.length) return; [s.slides[i], s.slides[j]] = [s.slides[j], s.slides[i]]; emit(); },
    duplicateSlide(id) { const s = curStream(); if (!s) return; const i = s.slides.findIndex(x => x.id === id); if (i < 0) return;
      const src = s.slides[i];
      const copy = { id: uid(), type: src.type, data: JSON.parse(JSON.stringify(src.data)), options: JSON.parse(JSON.stringify(src.options || {})) };   // keep timer-start / reveal / scored
      s.slides.splice(i + 1, 0, copy); state.selSlide = copy.id; emit(); },
    deleteSlide(id) { const s = curStream(); if (!s) return; const i = s.slides.findIndex(x => x.id === id);
      s.slides = s.slides.filter(x => x.id !== id); if (state.selSlide === id) { const n = s.slides[Math.max(0, i - 1)]; state.selSlide = n ? n.id : null; } emit(); },

    /* drag & drop reorder */
    reorderSlide(dragId, targetId) {
      const s = curStream(); if (!s || dragId === targetId) return;
      const from = s.slides.findIndex(x => x.id === dragId), to = s.slides.findIndex(x => x.id === targetId);
      if (from < 0 || to < 0) return; const [m] = s.slides.splice(from, 1); s.slides.splice(to, 0, m); emit();
    },

    /* per-slide options (transition / reveal gesture — used by Present) */
    updateSlideOption(id, key, value) { const s = curStream(); if (!s) return; const sl = s.slides.find(x => x.id === id); if (sl) { sl.options = sl.options || {}; sl.options[key] = value; persist(); } },

    /* themes */
    themes: () => state.project.themes,
    projectThemeId: () => state.project.themeId,
    resolveThemeFor(stream) {
      const id = (stream && stream.themeId) || state.project.themeId;
      return state.project.themes.find(t => t.id === id) || state.project.themes[0];
    },
    setProjectTheme(id) { state.project.themeId = id; emit(); },
    setStreamTheme(streamId, themeId) { const s = state.project.streams.find(x => x.id === streamId); if (s) { s.themeId = themeId || null; emit(); } },
    addTheme() { const t = { id: 'theme-' + uid(), name: 'New Theme', bgType: 'linear', bg1: '#1f2937', bg2: '#0b1220', angle: 160, ink: '#ffffff', accent: '#6366f1', correct: '#34d399', headingFont: 'System Sans', bodyFont: 'System Sans' }; state.project.themes.push(t); emit(); return t.id; },
    duplicateTheme(id) { const t = state.project.themes.find(x => x.id === id); if (!t) return; const c = JSON.parse(JSON.stringify(t)); c.id = 'theme-' + uid(); c.name = t.name + ' copy'; state.project.themes.push(c); emit(); return c.id; },
    updateTheme(id, patch) { const t = state.project.themes.find(x => x.id === id); if (t) { Object.assign(t, patch); persist(); listeners.forEach(l => l(state)); } },
    deleteTheme(id) { if (state.project.themes.length <= 1) return; state.project.themes = state.project.themes.filter(t => t.id !== id); if (state.project.themeId === id) state.project.themeId = state.project.themes[0].id; state.project.streams.forEach(s => { if (s.themeId === id) s.themeId = null; }); emit(); },
    importTheme(theme) { const t = JSON.parse(JSON.stringify(theme)); t.id = 'theme-' + uid(); if (!t.name) t.name = 'Imported'; state.project.themes.push(t); emit(); return t.id; },

    /* import */
    replaceProject(p) { state.project = normalize(p); const f = state.project.streams[0]; state.selStream = f ? f.id : null; state.selSlide = f && f.slides[0] ? f.slides[0].id : null; emit(); },
    mergeStreams(p) {
      const inc = normalize(p);
      // bring the incoming streams' themes along. Same id (built-in / re-import) → UPSERT content, so an
      // edited built-in from the file wins. Same NAME with a fresh id (CSV parse mints ids) → reuse the
      // existing theme's id and remap the incoming references — re-importing never duplicates a theme.
      (inc.themes || []).forEach(t => {
        // CSV parse and per-stream exports always carry STOCK copies of every built-in. An
        // untouched built-in holds no information — upserting it would silently factory-reset
        // a locally EDITED built-in (the inverse of the data loss the upsert exists to prevent).
        // It is only (re)added when the deck doesn't have it (e.g. deleted locally but referenced).
        const stock = THEME_DEFAULTS.find(d => d.id === t.id && d.name === t.name);
        if (stock && sameTheme(stock, t) && state.project.themes.some(x => x.id === t.id)) return;
        const byId = state.project.themes.findIndex(x => x.id === t.id);
        if (byId >= 0) { state.project.themes[byId] = t; return; }
        const byName = state.project.themes.findIndex(x => x.name.trim().toLowerCase() === t.name.trim().toLowerCase());
        if (byName >= 0) {
          const keepId = state.project.themes[byName].id;
          inc.streams.forEach(s => { if (s.themeId === t.id) s.themeId = keepId; });
          state.project.themes[byName] = Object.assign({}, t, { id: keepId });
        } else state.project.themes.push(t);
      });
      // UPSERT by stream name: same name → replace that stream in place (keeps its position); new name → append.
      // Lets a deck be built from several CSVs and any of them re-imported after edits without duplicating.
      inc.streams.forEach(s => {
        s.teamCount = state.project.teamCount;   // merged streams share THIS deck's team count
        const at = state.project.streams.findIndex(x => x.name.trim() === s.name.trim());
        if (at >= 0) { s.id = state.project.streams[at].id; state.project.streams[at] = s; }
        else { s.id = uid(); state.project.streams.push(s); }
      });
      // if the selected stream was replaced, its old slide ids are gone — re-point the selection
      const cs = state.project.streams.find(x => x.id === state.selStream);
      if (!cs) { const f = state.project.streams[0]; state.selStream = f ? f.id : null; state.selSlide = f && f.slides[0] ? f.slides[0].id : null; }
      else if (!cs.slides.find(sl => sl.id === state.selSlide)) state.selSlide = cs.slides[0] ? cs.slides[0].id : null;
      emit();
    },
  };
})();

/* light helper so updateSlideData can refresh just the list snippet without rebuilding the editor (keeps input focus) */
function refreshList() { Views.renderSlides(Store.get()); }

/* ================================================================
   FORM RENDERER — generic; builds a form from a slide type's fields
   ================================================================ */
function renderForm(slide) {
  const def = SlideTypes.get(slide.type);
  const form = el('div');
  if (!def) { form.append(el('div', { class: 'empty', text: 'Unknown slide type “' + slide.type + '”. Use 🗑 Reset to load the fresh sample deck.' })); return form; }
  def.fields.forEach(f => {
    const field = el('div', { class: 'field' });
    const lab = el('label', {}, [ f.label ]);
    if (f.hint) lab.append(el('span', { class: 'hint', text: f.hint }));
    field.append(lab);
    const render = FieldRenderers[f.type];
    const widget = render
      ? render(f, slide.data[f.key], v => Store.updateSlideData(slide.id, f.key, v))
      : el('div', { class: 'empty', text: 'Unknown field type: ' + f.type });
    field.append(widget);
    form.append(field);
  });
  return form;
}

/* ================================================================
   VIEWS
   ================================================================ */
const Views = (() => {
  const $ = id => document.getElementById(id);
  let dragId = null;

  // ✎ Stream settings — rename + the defaults a NEW question inherits (live-applied)
  function openStreamSettings(id) {

/* ================================================================
   CRYPTO — password-based AES-GCM encryption for exported files.
   (display.html reuses this to decrypt before playing.)
   ================================================================ */
const CryptoBox = (() => {
  const enc = new TextEncoder(), dec = new TextDecoder();
  const subtle = (window.crypto && window.crypto.subtle) ? window.crypto.subtle : null;
  const ab2b64 = buf => { const b = new Uint8Array(buf); let s = ''; for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]); return btoa(s); };
  const b642ab = b64 => { const s = atob(b64); const b = new Uint8Array(s.length); for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i); return b.buffer; };
  async function deriveKey(password, salt) {
    const base = await subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 150000, hash: 'SHA-256' }, base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
  }
  async function encrypt(obj, password) {
    if (!subtle) throw new Error('Web Crypto unavailable');
    const salt = window.crypto.getRandomValues(new Uint8Array(16));
    const iv = window.crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(password, salt);
    const ct = await subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(obj)));
    return { app: 'cfc-quiz', kind: 'encrypted', version: 1, salt: ab2b64(salt), iv: ab2b64(iv), data: ab2b64(ct) };
  }
  async function decrypt(file, password) {
    if (!subtle) throw new Error('Web Crypto unavailable');
    const salt = new Uint8Array(b642ab(file.salt)), iv = new Uint8Array(b642ab(file.iv));
    const key = await deriveKey(password, salt);
    const pt = await subtle.decrypt({ name: 'AES-GCM', iv }, key, b642ab(file.data));
    return JSON.parse(dec.decode(pt));
  }
  return { encrypt, decrypt, available: !!subtle };
})();

/* download any image-by-URL and embed it as a data-URL so exports are fully self-contained */
async function embedImages(project) {
  const p = JSON.parse(JSON.stringify(project));
  let failed = 0;
  for (const s of (p.streams || [])) for (const sl of (s.slides || [])) {
    const m = sl.data && sl.data.media;
    if (m && typeof m === 'string' && /^https?:/i.test(m)) {
      try {
        const resp = await fetch(m); const blob = await resp.blob();
        sl.data.media = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob); });
      } catch (e) { failed++; }
    }
  }
  if (failed) toast('⚠ ' + failed + ' image URL(s) could not be downloaded (kept as links)');
  return p;
}

/* ================================================================
   IO — export / import (with image-embedding + encryption)
   ================================================================ */
const IO = (() => {
  function download(filename, obj) { downloadBlob(filename, new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' })); }
  function downloadText(filename, text) { downloadBlob(filename, new Blob(['﻿' + text], { type: 'text/csv;charset=utf-8' })); }   // BOM → Excel/Sheets read it as UTF-8 (curly quotes don't garble)
  function downloadBlob(filename, blob) {
    const url = URL.createObjectURL(blob);
    const a = el('a', { href: url, download: filename }); document.body.append(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  // shared ingest path for ALL imports (JSON / encrypted / CSV) — abortable merge/replace
  function ingest(data) {
    if (Store.project().streams.length) {
      // name exactly what a merge would destroy — a coincidental name match replaces a hand-built stream
      const mine = Store.project().streams.map(s => s.name.trim());
      const hit = data.streams.map(s => (s.name || '').trim()).filter(n => mine.includes(n));
      const warn = hit.length ? '\n\n⚠ MERGE will REPLACE your existing stream(s): ' + hit.join(', ') : '';
      const choice = (prompt('Import ' + data.streams.length + ' stream(s):\n\n• type  M  to MERGE into your current deck (a stream with the SAME NAME is replaced, new names are added)\n• type  R  to REPLACE the whole deck (deletes it)\n• Cancel to abort' + warn, 'M') || '').trim().toLowerCase();
      if (choice === 'r') Store.replaceProject(data);
      else if (choice === 'm') Store.mergeStreams(data);
      else { toast('Import cancelled'); return; }
    } else Store.replaceProject(data);
    const di = document.getElementById('deckName'); if (di) di.value = Store.project().name || '';
    toast('Imported', 'ok');
  }
  const safe = s => ((s || 'deck').replace(/[^\w-]+/g, '-').replace(/^-+|-+$/g, '').toLowerCase() || 'deck');
  const dt = () => { const d = new Date(), p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + '_' + p(d.getHours()) + '-' + p(d.getMinutes()); };
  // filename: deckname_date_time(.json) ; per-stream inserts the stream name
  const fname = (streamName, ext) => safe(Store.project().name) + (streamName ? '_' + safe(streamName) : '') + '_' + dt() + ext;

  // make sure the deck has a real name before exporting (asks once)
  function ensureName() {
    let n = Store.project().name;
    if (!n || n === 'Untitled Deck') {
      n = prompt('Name this deck (used for the exported file name):', '');
      if (!n) return null;
      Store.setDeckName(n);
      const inp = document.getElementById('deckName'); if (inp) inp.value = n;
    }
    return Store.project().name;
  }
  const streamProject = s => ({ app: 'cfc-quiz', kind: 'content', version: 2, branding: Store.project().branding, themesVersion: Store.project().themesVersion || 2, name: Store.project().name, teamCount: Store.project().teamCount, themes: Store.themes(), themeId: Store.projectThemeId(), streams: [ s ] });
  // every export carries its creation timestamp — Display tags scores/session per deck with it
  const stamped = p => { p.exportedAt = Date.now(); return p; };

  return {
    downloadObj: download,
    async exportContent() { if (!ensureName()) return; const p = stamped(await embedImages(Store.project())); download(fname('', '.json'), p); toast('Exported deck (all streams)', 'ok'); },
    async exportStream() {
      if (!ensureName()) return;

   with one empty cell); lists (options/pairs) stack one item per row, "*"

    IMAGE: 'image-question', PICTURE: 'image-question', MATCHING: 'matching', MATCH: 'matching',
    POLL: 'poll', BUZZER: 'buzzer', ANSWER: 'answer', LEADERBOARD: 'leaderboard', PODIUM: 'podium',
