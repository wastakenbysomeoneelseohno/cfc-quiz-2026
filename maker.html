/* ================================================================
   STORE — single source of truth + persistence + pub/sub
   ================================================================ */
const Store = (() => {
  const KEY = 'm_cfc-quiz-maker-v4';   // m_ = maker-owned; Display never shares a key
  const listeners = new Set();
  let state = load();

  // teamCount is a DECK-level setting: all streams share one scoreboard, so they share one team count.
  function blankProject() { return { app: 'cfc-quiz', kind: 'content', version: 1, name: 'Untitled Deck', teamCount: 20, themes: cloneThemes(), themeId: THEME_DEFAULTS[0].id, streams: [] }; }

  // first-run seed: a main quiz that shows EVERY current slide type meaningfully
  // (leaderboard in the middle, podium at the end) + a parallel "Audience Round" stream.
  function buildDemo() {
    const S = (type, data, options) => ({ id: uid(), type, data, options: options || {} });
    const main = { id: uid(), name: 'Main Quiz', themeId: null, slides: [
      S('title', { heading: 'CFC Quiz Night', subheading:
        'How to play\n• Each team locks in ONE answer per question.\n• Answer before the timer hits zero.\n• Points are tallied after every question — keep an eye on the scoreboard!' }),
      // multiple choice — single answer
      S('choices', { question: 'Who built the ark?', media: '', timer: 20,
        choice: { multiple: false, options: [ { text: 'Noah', correct: true }, { text: 'Moses', correct: false }, { text: 'David', correct: false }, { text: 'Paul', correct: false } ] } }),
      // multiple choice — select-all
      S('choices', { question: 'Which of these are Gospels? (select all)', media: '', timer: 25,
        choice: { multiple: true, options: [ { text: 'Matthew', correct: true }, { text: 'Mark', correct: true }, { text: 'Acts', correct: false }, { text: 'John', correct: true } ] } }),
      // true / false
      S('true-false', { statement: 'Jonah was swallowed by a great fish.', answer: true, timer: 15 }),
      // short answer — a word
      S('short-answer', { question: 'Finish the verse: “The Lord is my ___.”', answer: 'shepherd', timer: 25 }),
      // short answer — a number
      S('short-answer', { question: 'How many books are in the New Testament?', answer: '27', timer: 20 }),
      // question with its own title / heading
      S('titled-question', { title: 'John 3:16', question: '“For God so loved the ___ that he gave his one and only Son.”', answer: 'world', timer: 30 }),
      // picture question
      S('image-question', { question: 'Name this symbol of the faith.', media: '', answer: 'The cross', timer: 20 }),
      // matching pairs
      S('matching', { instruction: 'Match each person to their role.', timer: 40,
        pairs: [ { left: 'Moses', right: 'Led the Exodus' }, { left: 'David', right: 'King of Israel' }, { left: 'Mary', right: 'Mother of Jesus' } ] }),
      // —— leaderboard in the MIDDLE ——
      S('leaderboard', { title: 'Halftime Standings' }),
      // poll (no right answer)
      S('poll', { question: 'Which round are you most excited for?', timer: 0,
        options: [ { text: 'Buzzer' }, { text: 'Verses' }, { text: 'Pictures' } ] }),
      // buzzer round
      S('buzzer', { question: 'First to buzz: name the first book of the Bible.', answer: 'Genesis', timer: 0 }),
      // a reveal / answer slide
      S('answer', { heading: 'Well done!', body: '“Well done, good and faithful servant.” — Matthew 25:23' }),
      // —— podium at the END ——
      S('podium', { title: 'Champions!' }),
    ] };
    // a parallel track played by the SAME teams — shows the "Scored: No" option (no scoring page)
    const audience = { id: uid(), name: 'Audience Round', themeId: 'theme-parchment', slides: [
      S('title', { heading: 'Audience Round', subheading: 'Just for fun — these don’t affect the scoreboard.' }),
      S('short-answer', { question: 'Audience: name a fruit of the Spirit.', answer: 'love, joy, peace…', timer: 20 }, { scored: false }),
      S('true-false', { statement: 'Audience: the Bible has 66 books.', answer: true, timer: 15 }, { scored: false }),
      S('leaderboard', { title: 'Standings' }),
    ] };
    const p = blankProject(); p.name = 'CFC Sample Deck'; p.streams.push(main, audience); return p;
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) { const p = JSON.parse(raw); return { project: normalize(p.project || p), selStream: p.selStream || null, selSlide: p.selSlide || null }; }
    } catch (e) { console.warn('load failed', e); }
    const p = normalize(buildDemo()); const f = p.streams[0];
    return { project: p, selStream: f.id, selSlide: f.slides[0].id };
  }

  // normalize older slide shapes to the current model (e.g. MC/MA → choices). No data migration of removed types.
  function migrateSlide(sl) {
    if (sl.type === 'multiple-choice' || sl.type === 'multiple-answer') {
      const opts = ((sl.data && sl.data.options) || []).map(o => ({ text: o.text || '', correct: !!o.correct }));
      sl.data.choice = { options: opts, multiple: sl.type === 'multiple-answer' };
      delete sl.data.options;
      sl.type = 'choices';
    }
    return sl;
  }
  function normalize(p) {
    p = p || blankProject(); p.app = 'cfc-quiz'; p.kind = 'content'; p.version = 1;
    p.name = p.name || 'Untitled Deck';
    p.themes = (Array.isArray(p.themes) && p.themes.length) ? p.themes : cloneThemes();
    // one-time refresh of built-in themes (keeps custom/renamed ones untouched) so fixes land without wiping data
    if (!p.themesVersion || p.themesVersion < 2) {
      p.themes = p.themes.map(t => { const def = THEME_DEFAULTS.find(d => d.id === t.id && d.name === t.name); return def ? Object.assign({}, t, def) : t; });
      p.themesVersion = 2;
    }
    if (!p.themes.find(t => t.id === p.themeId)) p.themeId = p.themes[0].id;
    // deck-level team count: take the deck's own value, else the first stream's (older shape), else 20
    p.teamCount = Math.max(1, Math.min(99, Math.round(p.teamCount || (p.streams && p.streams[0] && p.streams[0].teamCount) || 20)));
    p.streams = (p.streams || []).map(s => ({ id: s.id || uid(), name: s.name || 'Stream',
      teamCount: p.teamCount, themeId: s.themeId || null,   // mirror the deck count onto every stream
      defaults: s.defaults || undefined,                    // per-stream new-question defaults (preserved on import/export)
      slides: (s.slides || []).map(sl => migrateSlide({ id: sl.id || uid(), type: sl.type, data: sl.data || {}, options: sl.options || {} })) }));
    return p;
  }
  let warnedFull = false;
  function persist() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); warnedFull = false; }
    catch (e) {
      console.warn('persist failed (likely storage quota from embedded images)', e);
      if (!warnedFull && typeof toast === 'function') { warnedFull = true; toast('⚠ Local storage is full (large images). Use Export to save everything to a file.'); }
    }
  }
  function emit() { persist(); listeners.forEach(l => l(state)); }

  /* selectors */
  const curStream = () => state.project.streams.find(s => s.id === state.selStream) || null;
  const curSlide = () => { const s = curStream(); return s ? s.slides.find(x => x.id === state.selSlide) || null : null; };

  return {
    subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },
    get: () => state, project: () => state.project, curStream, curSlide,
    setDeckName(n) { state.project.name = n; persist(); },
    reset() { try { Object.keys(localStorage).filter(k => k.startsWith('m_')).forEach(k => localStorage.removeItem(k)); } catch (e) {} location.reload(); },

    /* streams */
    addStream() {
      const n = state.project.streams.length + 1;
      const s = { id: uid(), name: 'Stream ' + n, teamCount: state.project.teamCount || 20, slides: [] };
      state.project.streams.push(s); state.selStream = s.id; state.selSlide = null; emit();
    },
    selectStream(id) { state.selStream = id; const s = curStream(); state.selSlide = s && s.slides[0] ? s.slides[0].id : null; emit(); },
    renameStream(id, name) { const s = state.project.streams.find(x => x.id === id); if (s) { s.name = name; emit(); } },
    // deck-level: one team count for the whole deck (shared scoreboard), mirrored onto every stream
    setTeamCount(n) { const v = Math.max(1, Math.min(99, Math.round(n || 1))); state.project.teamCount = v; state.project.streams.forEach(s => s.teamCount = v); emit(); },
    deleteStream(id) {
      state.project.streams = state.project.streams.filter(s => s.id !== id);
      if (state.selStream === id) { const f = state.project.streams[0]; state.selStream = f ? f.id : null; state.selSlide = f && f.slides[0] ? f.slides[0].id : null; }
      emit();
    },

    /* slides */
    addSlide(type) {
      const s = curStream(); if (!s) return;
      const def = SlideTypes.get(type); if (!def) return;
      const sl = { id: uid(), type, data: def.createDefault(), options: {} };
      // a new QUESTION inherits the stream's default timer / start / points / reveal / scored (where applicable)
      if (kindOf(type) === 'question' && s.defaults) {
        const d = s.defaults;
        if (d.timer != null && 'timer' in sl.data) sl.data.timer = d.timer;
        if (d.points != null) sl.data.points = d.points;
        if (d.autoStart === false) sl.options.autoStart = false;
        if (d.reveal === false) sl.options.reveal = false;
        if (d.scored === false) sl.options.scored = false;
      }
      const idx = s.slides.findIndex(x => x.id === state.selSlide);
      if (idx >= 0) s.slides.splice(idx + 1, 0, sl); else s.slides.push(sl);
      state.selSlide = sl.id; emit();
    },
    setStreamDefaults(id, defaults) { const s = state.project.streams.find(x => x.id === id); if (s) { s.defaults = Object.assign({ timer: 20, autoStart: true, points: 1, reveal: true, scored: true }, s.defaults, defaults); emit(); } },
    selectSlide(id) { state.selSlide = id; emit(); },
    // switch a question's format, preserving the question text + image + timer
    changeType(id, newType) {
      const s = curStream(); if (!s) return; const sl = s.slides.find(x => x.id === id); if (!sl || sl.type === newType) return;
      const def = SlideTypes.get(newType); if (!def) return;
      const ok = PROMPT_KEY[sl.type], nk = PROMPT_KEY[newType];
      const prompt = ok ? sl.data[ok] : '';
      const media = sl.data.media, timer = sl.data.timer, points = sl.data.points;
      const nd = def.createDefault();
      if (nk && prompt) nd[nk] = prompt;
      if ('media' in nd && media != null) nd.media = media;
      if ('timer' in nd && timer != null) nd.timer = timer;
      if (points != null) nd.points = points;   // keep the points when switching question format
      sl.type = newType; sl.data = nd; emit();
    },
    updateSlideData(id, key, value) { const s = curStream(); if (!s) return; const sl = s.slides.find(x => x.id === id); if (sl) { if (key === 'points' && value !== '' && value != null) value = Math.max(0, Math.round(Number(value) || 0)); sl.data[key] = value; persist(); refreshList(); } },
    moveSlide(id, dir) { const s = curStream(); if (!s) return; const i = s.slides.findIndex(x => x.id === id); const j = i + dir;
      if (i < 0 || j < 0 || j >= s.slides.length) return; [s.slides[i], s.slides[j]] = [s.slides[j], s.slides[i]]; emit(); },
    duplicateSlide(id) { const s = curStream(); if (!s) return; const i = s.slides.findIndex(x => x.id === id); if (i < 0) return;
      const copy = { id: uid(), type: s.slides[i].type, data: JSON.parse(JSON.stringify(s.slides[i].data)) };
      s.slides.splice(i + 1, 0, copy); state.selSlide = copy.id; emit(); },
    deleteSlide(id) { const s = curStream(); if (!s) return; const i = s.slides.findIndex(x => x.id === id);
      s.slides = s.slides.filter(x => x.id !== id); if (state.selSlide === id) { const n = s.slides[Math.max(0, i - 1)]; state.selSlide = n ? n.id : null; } emit(); },

    /* drag & drop reorder */
    reorderSlide(dragId, targetId) {
      const s = curStream(); if (!s || dragId === targetId) return;
      const from = s.slides.findIndex(x => x.id === dragId), to = s.slides.findIndex(x => x.id === targetId);
      if (from < 0 || to < 0) return; const [m] = s.slides.splice(from, 1); s.slides.splice(to, 0, m); emit();
    },

    /* per-slide options (transition / reveal gesture — used by Present) */
    updateSlideOption(id, key, value) { const s = curStream(); if (!s) return; const sl = s.slides.find(x => x.id === id); if (sl) { sl.options = sl.options || {}; sl.options[key] = value; persist(); } },

    /* themes */
    themes: () => state.project.themes,
    projectThemeId: () => state.project.themeId,
    resolveThemeFor(stream) {
      const id = (stream && stream.themeId) || state.project.themeId;
      return state.project.themes.find(t => t.id === id) || state.project.themes[0];
    },
    setProjectTheme(id) { state.project.themeId = id; emit(); },
    setStreamTheme(streamId, themeId) { const s = state.project.streams.find(x => x.id === streamId); if (s) { s.themeId = themeId || null; emit(); } },
    addTheme() { const t = { id: 'theme-' + uid(), name: 'New Theme', bgType: 'linear', bg1: '#1f2937', bg2: '#0b1220', angle: 160, ink: '#ffffff', accent: '#6366f1', correct: '#34d399', headingFont: 'System Sans', bodyFont: 'System Sans' }; state.project.themes.push(t); emit(); return t.id; },
    duplicateTheme(id) { const t = state.project.themes.find(x => x.id === id); if (!t) return; const c = JSON.parse(JSON.stringify(t)); c.id = 'theme-' + uid(); c.name = t.name + ' copy'; state.project.themes.push(c); emit(); return c.id; },
    updateTheme(id, patch) { const t = state.project.themes.find(x => x.id === id); if (t) { Object.assign(t, patch); persist(); listeners.forEach(l => l(state)); } },
    deleteTheme(id) { if (state.project.themes.length <= 1) return; state.project.themes = state.project.themes.filter(t => t.id !== id); if (state.project.themeId === id) state.project.themeId = state.project.themes[0].id; state.project.streams.forEach(s => { if (s.themeId === id) s.themeId = null; }); emit(); },
    importTheme(theme) { const t = JSON.parse(JSON.stringify(theme)); t.id = 'theme-' + uid(); if (!t.name) t.name = 'Imported'; state.project.themes.push(t); emit(); return t.id; },

    /* import */
    replaceProject(p) { state.project = normalize(p); const f = state.project.streams[0]; state.selStream = f ? f.id : null; state.selSlide = f && f.slides[0] ? f.slides[0].id : null; emit(); },
    mergeStreams(p) { const inc = normalize(p); inc.streams.forEach(s => { s.id = uid(); state.project.streams.push(s); }); emit(); },
  };
})();

/* light helper so updateSlideData can refresh just the list snippet without rebuilding the editor (keeps input focus) */
function refreshList() { Views.renderSlides(Store.get()); }

/* ================================================================
   FORM RENDERER — generic; builds a form from a slide type's fields
   ================================================================ */
function renderForm(slide) {
  const def = SlideTypes.get(slide.type);
  const form = el('div');
  if (!def) { form.append(el('div', { class: 'empty', text: 'Unknown slide type “' + slide.type + '”. Use 🗑 Reset to load the fresh sample deck.' })); return form; }
  def.fields.forEach(f => {
    const field = el('div', { class: 'field' });
    const lab = el('label', {}, [ f.label ]);
    if (f.hint) lab.append(el('span', { class: 'hint', text: f.hint }));
    field.append(lab);
    const render = FieldRenderers[f.type];
    const widget = render
      ? render(f, slide.data[f.key], v => Store.updateSlideData(slide.id, f.key, v))
      : el('div', { class: 'empty', text: 'Unknown field type: ' + f.type });
    field.append(widget);
    form.append(field);
  });
  return form;
}

/* ================================================================
   VIEWS
   ================================================================ */
const Views = (() => {
  const $ = id => document.getElementById(id);
  let dragId = null;

  // ✎ Stream settings — rename + the defaults a NEW question inherits (live-applied)
  function openStreamSettings(id) {
    const s = Store.get().project.streams.find(x => x.id === id); if (!s) return;
    const d = () => Object.assign({ timer: 20, autoStart: true, points: 1, reveal: true, scored: true }, s.defaults);
    const field = (label, hint, widget) => { const f = el('div', { class: 'field' }); const lab = el('label', {}, [label]); if (hint) lab.append(el('span', { class: 'hint', text: hint })); f.append(lab, widget); return f; };
    const sheet = el('div', { class: 'sheet' });
    sheet.append(el('h3', { text: 'Stream settings' }));
    sheet.append(el('p', { class: 'muted', text: 'Name this track and set the defaults a NEW question starts with (existing questions are left as-is).' }));
    const nameInp = el('input', { type: 'text', value: s.name });
    nameInp.oninput = () => Store.renameStream(id, nameInp.value.trim() || s.name);
    sheet.append(field('Name', '', nameInp));
    sheet.append(el('p', { class: 'muted', text: 'New-question defaults', style: 'margin:8px 0 4px' }));
    sheet.append(field('Default timer', '', FieldRenderers.timer({}, d().timer, v => Store.setStreamDefaults(id, { timer: v }))));
    sheet.append(field('Timer start', '"On button" = press ▶ Start in the show', FieldRenderers.boolean({ trueLabel: 'Auto', falseLabel: 'On button' }, d().autoStart !== false, v => Store.setStreamDefaults(id, { autoStart: v }))));
    sheet.append(field('Default points', '', FieldRenderers.number({ min: 0, placeholder: '1' }, d().points, v => Store.setStreamDefaults(id, { points: (v == null || v === '') ? 1 : v }))));
    sheet.append(field('Default reveal answer', 'No = skip the “hold to show answer” step', FieldRenderers.boolean({ trueLabel: 'Yes', falseLabel: 'No' }, d().reveal !== false, v => Store.setStreamDefaults(id, { reveal: v }))));
    sheet.append(field('Default scored', 'No = no scoring page', FieldRenderers.boolean({ trueLabel: 'Yes', falseLabel: 'No' }, d().scored !== false, v => Store.setStreamDefaults(id, { scored: v }))));
    const done = el('button', { class: 'btn primary', text: 'Done', style: 'margin-top:6px' });
    const ov = el('div', { class: 'picker open', id: 'streamDlg' }, [ sheet ]);
    done.onclick = () => ov.remove(); sheet.append(done);
    ov.onclick = e => { if (e.target === ov) ov.remove(); };
    document.body.append(ov);
  }

  function renderStreams(state) {
    const wrap = $('streamList');
    // deck-level team count: one shared scoreboard → ONE team count for every stream
    const oldBar = $('deckTeams'); if (oldBar) oldBar.remove();
    const bar = el('div', { class: 'theme-pick', id: 'deckTeams' });
    const teams = el('input', { type: 'number', min: 1, max: 99, value: state.project.teamCount || 20, class: 'teams-input',
      title: 'Teams playing this whole deck — they share one scoreboard across every stream' });
    teams.onchange = () => Store.setTeamCount(Number(teams.value));
    bar.append(el('span', { class: 'theme-pick-label', text: '👥 Teams' }), teams,
               el('span', { class: 'theme-pick-note', text: 'shared by all streams' }));
    wrap.parentElement.insertBefore(bar, wrap);
    wrap.innerHTML = '';
    if (!state.project.streams.length) { wrap.append(el('div', { class: 'empty', text: 'No streams yet. Add one →' })); return; }
    state.project.streams.forEach(s => {
      const active = s.id === state.selStream;
      const row = el('div', { class: 'row' + (active ? ' active' : ''), onclick: () => Store.selectStream(s.id) });
      const grow = el('div', { class: 'grow' });
      const title = el('div', { class: 'title', text: s.name });
      grow.append(title);
      grow.append(el('div', { class: 'sub', text: s.slides.length + ' slide' + (s.slides.length === 1 ? '' : 's') }));
      const tools = el('div', { class: 'tools' });
      const beginRename = () => {
        const inp = el('input', { class: 'stream-rename', value: s.name });
        const commit = () => { const v = inp.value.trim(); if (v && v !== s.name) Store.renameStream(s.id, v); else renderStreams(Store.get()); };
        inp.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); inp.blur(); } else if (e.key === 'Escape') { e.preventDefault(); inp.value = s.name; inp.blur(); } };
        inp.onblur = commit;
        inp.onclick = e => e.stopPropagation();
        title.replaceWith(inp); inp.focus(); inp.select();
      };
      const ren = el('button', { class: 'icon-btn', title: 'Stream settings — name & new-question defaults', html: '✎' });
      ren.onclick = e => { e.stopPropagation(); openStreamSettings(s.id); };
      title.ondblclick = e => { e.stopPropagation(); beginRename(); };   // double-click name = quick inline rename
      const del = el('button', { class: 'icon-btn', title: 'Delete stream', html: '🗑' });
      del.onclick = e => { e.stopPropagation(); if (confirm('Delete stream “' + s.name + '” and all its slides?')) Store.deleteStream(s.id); };
      tools.append(ren, del);
      row.append(grow, tools);
      wrap.append(row);
    });
  }

  function renderThemePicker(s) { // per-stream settings bar: which theme THIS stream uses (teams are deck-level, set on the Streams panel)
    const old = document.getElementById('streamThemePick'); if (old) old.remove();
    if (!s) return;
    const slideList = $('slideList');
    const bar = el('div', { class: 'theme-pick', id: 'streamThemePick' });
    const sel = el('select');
    const defName = (Store.themes().find(t => t.id === Store.projectThemeId()) || {}).name || 'default';
    sel.append(el('option', { value: '', text: 'Project default (' + defName + ')', selected: !s.themeId }));
    Store.themes().forEach(t => sel.append(el('option', { value: t.id, text: t.name, selected: s.themeId === t.id })));
    sel.onchange = () => Store.setStreamTheme(s.id, sel.value || null);
    bar.append(el('span', { class: 'theme-pick-label', text: '🎨 Theme' }), sel);
    slideList.parentElement.insertBefore(bar, slideList);
  }

  function renderSlides(state) {
    const wrap = $('slideList'); wrap.innerHTML = '';
    const s = Store.curStream();
    $('slidesHead').textContent = s ? 'Slides — ' + s.name : 'Slides';
    renderThemePicker(s);
    if (!s) { wrap.append(el('div', { class: 'empty', text: 'Select a stream first.' })); return; }
    if (!s.slides.length) { wrap.append(el('div', { class: 'empty', text: 'No slides yet. Add one →' })); return; }
    s.slides.forEach((sl, i) => {
      const def = SlideTypes.get(sl.type) || { label: sl.type, icon: '?', summary: () => '' };
      const active = sl.id === state.selSlide;
      const row = el('div', { class: 'row' + (active ? ' active' : ''), draggable: 'true', onclick: () => Store.selectSlide(sl.id) });
      row.dataset.id = sl.id;
      const handle = el('span', { class: 'drag-handle', html: '⠿', title: 'Drag to reorder' });
      const grow = el('div', { class: 'grow' });
      grow.append(el('div', { class: 'title q3', text: (i + 1) + '. ' + (def.summary(sl.data) || def.label) }));
      grow.append(el('div', { class: 'sub' }, [ el('span', { class: 'badge', text: def.label }) ]));
      const tools = el('div', { class: 'tools' });
      const up = el('button', { class: 'icon-btn', title: 'Move up', html: '↑' }); up.onclick = e => { e.stopPropagation(); Store.moveSlide(sl.id, -1); };
      const dn = el('button', { class: 'icon-btn', title: 'Move down', html: '↓' }); dn.onclick = e => { e.stopPropagation(); Store.moveSlide(sl.id, 1); };
      const dup = el('button', { class: 'icon-btn', title: 'Duplicate', html: '⧉' }); dup.onclick = e => { e.stopPropagation(); Store.duplicateSlide(sl.id); };
      const del = el('button', { class: 'icon-btn', title: 'Delete', html: '✕' }); del.onclick = e => { e.stopPropagation(); Store.deleteSlide(sl.id); };
      tools.append(up, dn, dup, del);
      // drag & drop reorder
      row.addEventListener('dragstart', e => { dragId = sl.id; row.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
      row.addEventListener('dragend', () => { dragId = null; wrap.querySelectorAll('.row').forEach(r => r.classList.remove('dragging', 'drop-before', 'drop-after')); });
      row.addEventListener('dragover', e => { e.preventDefault(); if (!dragId || dragId === sl.id) return; const before = e.offsetY < row.offsetHeight / 2; row.classList.toggle('drop-before', before); row.classList.toggle('drop-after', !before); });
      row.addEventListener('dragleave', () => row.classList.remove('drop-before', 'drop-after'));
      row.addEventListener('drop', e => { e.preventDefault(); if (dragId && dragId !== sl.id) Store.reorderSlide(dragId, sl.id); });
      row.append(handle, grow, tools);
      wrap.append(row);
    });
  }

  function renderEditor(state) {
    const ed = $('editor'); ed.innerHTML = '';
    // mobile drill-down: a back button to return from "edit slide" to the questions list
    const back = el('button', { class: 'm-back btn ghost', html: '← Questions' });
    back.onclick = () => { const nav = window.__makerNav; if (nav) nav.setMView('slides'); };
    ed.append(back);
    const slide = Store.curSlide();
    if (!slide) {
      ed.append(el('div', { class: 'empty-editor' }, [
        el('div', { class: 'big', text: '✦' }),
        el('div', { text: Store.curStream() ? 'Add or select a slide to edit it.' : 'Add a stream to begin.' }),
      ]));
      return;
    }
    const def = SlideTypes.get(slide.type) || { icon: '?', label: slide.type, desc: 'Unknown slide type — use 🗑 Reset to load the fresh sample deck.' };
    const isQuestion = kindOf(slide.type) === 'question';
    const head = el('div', { class: 'ed-head' }, [
      el('span', { class: 'type-chip', text: (isQuestion ? '❓ Question' : def.icon + ' ' + def.label) }),
    ]);
    if (isQuestion) {
      const sel = el('select', { class: 'fmt-select' });
      SlideTypes.all().filter(d => kindOf(d.type) === 'question').forEach(d => sel.append(el('option', { value: d.type, text: d.label, selected: d.type === slide.type })));
      sel.onchange = () => Store.changeType(slide.id, sel.value);
      head.append(el('span', { class: 'fmt-label', text: 'Format' }), sel);
    }
    ed.append(head);
    ed.append(el('p', { class: 'ed-sub', text: def.desc }));
    const card = el('div', { class: 'card' });
    card.append(renderForm(slide));
    if (isQuestion) {
      const field = el('div', { class: 'field' });
      field.append(el('label', {}, [ 'Timer start', el('span', { class: 'hint', text: 'applies when a timer is set · "On button" = press ▶ Start in the show' }) ]));
      const auto = !(slide.options && slide.options.autoStart === false);
      field.append(FieldRenderers.boolean({ trueLabel: 'Auto', falseLabel: 'On button' }, auto, v => Store.updateSlideOption(slide.id, 'autoStart', v)));
      card.append(field);

      // a poll has only a 'question' phase — Points / Reveal / Scored are meaningless there, so hide them
      if (slide.type !== 'poll') {
        const pField = el('div', { class: 'field' });
        pField.append(el('label', {}, [ 'Points', el('span', { class: 'hint', text: 'awarded for ✓ in scoring (✗ subtracts the same)' }) ]));
        const pVal = (slide.data.points == null || slide.data.points === '') ? 1 : slide.data.points;
        pField.append(FieldRenderers.number({ min: 0, placeholder: '1' }, pVal, v => Store.updateSlideData(slide.id, 'points', (v == null || v === '') ? 1 : Math.max(0, Math.round(v)))));
        card.append(pField);

        const rField = el('div', { class: 'field' });
        rField.append(el('label', {}, [ 'Reveal answer', el('span', { class: 'hint', text: 'No = skip the answer slide — the answer is never shown to anyone' }) ]));
        rField.append(FieldRenderers.boolean({ trueLabel: 'Yes', falseLabel: 'No' }, !(slide.options && slide.options.reveal === false), v => Store.updateSlideOption(slide.id, 'reveal', v)));
        card.append(rField);

        const aField = el('div', { class: 'field' });
        aField.append(el('label', {}, [ 'Scored', el('span', { class: 'hint', text: 'No = no scoring page (warm-ups, audience questions, tie-breakers)' }) ]));
        aField.append(FieldRenderers.boolean({ trueLabel: 'Yes', falseLabel: 'No' }, !(slide.options && slide.options.scored === false), v => Store.updateSlideOption(slide.id, 'scored', v)));
        card.append(aField);
      }
    }
    ed.append(card);
  }

  function renderAll(state) { renderStreams(state); renderSlides(state); renderEditor(state); }
  return { renderStreams, renderSlides, renderEditor, renderAll, openStreamSettings };
})();

/* ================================================================
   CRYPTO — password-based AES-GCM encryption for exported files.
   (display.html reuses this to decrypt before playing.)
   ================================================================ */
const CryptoBox = (() => {
  const enc = new TextEncoder(), dec = new TextDecoder();
  const subtle = (window.crypto && window.crypto.subtle) ? window.crypto.subtle : null;
  const ab2b64 = buf => { const b = new Uint8Array(buf); let s = ''; for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]); return btoa(s); };
  const b642ab = b64 => { const s = atob(b64); const b = new Uint8Array(s.length); for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i); return b.buffer; };
  async function deriveKey(password, salt) {
    const base = await subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 150000, hash: 'SHA-256' }, base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
  }
  async function encrypt(obj, password) {
    if (!subtle) throw new Error('Web Crypto unavailable');
    const salt = window.crypto.getRandomValues(new Uint8Array(16));
    const iv = window.crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(password, salt);
    const ct = await subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(obj)));
    return { app: 'cfc-quiz', kind: 'encrypted', version: 1, salt: ab2b64(salt), iv: ab2b64(iv), data: ab2b64(ct) };
  }
  async function decrypt(file, password) {
    if (!subtle) throw new Error('Web Crypto unavailable');
    const salt = new Uint8Array(b642ab(file.salt)), iv = new Uint8Array(b642ab(file.iv));
    const key = await deriveKey(password, salt);
    const pt = await subtle.decrypt({ name: 'AES-GCM', iv }, key, b642ab(file.data));
    return JSON.parse(dec.decode(pt));
  }
  return { encrypt, decrypt, available: !!subtle };
})();

/* download any image-by-URL and embed it as a data-URL so exports are fully self-contained */
async function embedImages(project) {
  const p = JSON.parse(JSON.stringify(project));
  let failed = 0;
  for (const s of (p.streams || [])) for (const sl of (s.slides || [])) {
    const m = sl.data && sl.data.media;
    if (m && typeof m === 'string' && /^https?:/i.test(m)) {
      try {
        const resp = await fetch(m); const blob = await resp.blob();
        sl.data.media = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(blob); });
      } catch (e) { failed++; }
    }
  }
  if (failed) toast('⚠ ' + failed + ' image URL(s) could not be downloaded (kept as links)');
  return p;
}

/* ================================================================
   IO — export / import (with image-embedding + encryption)
   ================================================================ */
const IO = (() => {
  function download(filename, obj) {
    const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = el('a', { href: url, download: filename }); document.body.append(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  const safe = s => ((s || 'deck').replace(/[^\w-]+/g, '-').replace(/^-+|-+$/g, '').toLowerCase() || 'deck');
  const dt = () => { const d = new Date(), p = n => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + '_' + p(d.getHours()) + '-' + p(d.getMinutes()); };
  // filename: deckname_date_time(.json) ; per-stream inserts the stream name
  const fname = (streamName, ext) => safe(Store.project().name) + (streamName ? '_' + safe(streamName) : '') + '_' + dt() + ext;

  // make sure the deck has a real name before exporting (asks once)
  function ensureName() {
    let n = Store.project().name;
    if (!n || n === 'Untitled Deck') {
      n = prompt('Name this deck (used for the exported file name):', '');
      if (!n) return null;
      Store.setDeckName(n);
      const inp = document.getElementById('deckName'); if (inp) inp.value = n;
    }
    return Store.project().name;
  }
  const streamProject = s => ({ app: 'cfc-quiz', kind: 'content', version: 1, name: Store.project().name, teamCount: Store.project().teamCount, themes: Store.themes(), themeId: Store.projectThemeId(), streams: [ s ] });
  // every export carries its creation timestamp — Display tags scores/session per deck with it
  const stamped = p => { p.exportedAt = Date.now(); return p; };

  return {
    downloadObj: download,
    async exportContent() { if (!ensureName()) return; const p = stamped(await embedImages(Store.project())); download(fname('', '.json'), p); toast('Exported deck (all streams)', 'ok'); },
    async exportStream() {
      if (!ensureName()) return;
      const s = Store.curStream(); if (!s) { toast('No stream selected'); return; }
      const p = stamped(await embedImages(streamProject(s)));
      download(fname(s.name, '.json'), p);
      toast('Exported “' + s.name + '” — note: a per-stream file gets its OWN scoreboard in Display. Export the whole deck to carry scores across streams.', 'ok');
    },
    async exportEncrypted() {
      if (!CryptoBox.available) { toast('Encryption not supported by this browser'); return; }
      if (!ensureName()) return;
      const pw = prompt('Set a password to encrypt the whole deck.\nThe Display will need it to open the show:');
      if (!pw) return;
      toast('Encrypting…');
      const p = stamped(await embedImages(Store.project()));
      try { const encd = await CryptoBox.encrypt(p, pw); download(fname('', '.cfcq.json'), encd); toast('🔒 Encrypted deck saved', 'ok'); }
      catch (e) { console.error(e); toast('Encryption failed'); }
    },
    async exportEncryptedStream() {
      if (!CryptoBox.available) { toast('Encryption not supported by this browser'); return; }
      if (!ensureName()) return;
      const s = Store.curStream(); if (!s) { toast('No stream selected'); return; }
      const pw = prompt('Set a password to encrypt this stream:'); if (!pw) return;
      toast('Encrypting…');
      const p = stamped(await embedImages(streamProject(s)));
      try { const encd = await CryptoBox.encrypt(p, pw); download(fname(s.name, '.cfcq.json'), encd); toast('🔒 Encrypted stream saved — note: a per-stream file gets its OWN scoreboard in Display. Export the whole deck to carry scores across streams.', 'ok'); }
      catch (e) { console.error(e); toast('Encryption failed'); }
    },
    importFile(file) {
      const rd = new FileReader();
      rd.onload = async () => {
        let data; try { data = JSON.parse(rd.result); } catch { toast('Not a valid JSON file'); return; }
        if (data.kind === 'encrypted') {
          const pw = prompt('This file is encrypted. Enter its password:'); if (!pw) return;
          try { data = await CryptoBox.decrypt(data, pw); } catch (e) { toast('Wrong password or corrupted file'); return; }
        }
        if (data.app !== 'cfc-quiz' || !Array.isArray(data.streams)) { toast('Not a CFC Quiz content file'); return; }
        if (Store.project().streams.length) {
          // explicit, abortable choice — the destructive REPLACE is never the accidental default
          const choice = (prompt('Import ' + data.streams.length + ' stream(s):\n\n• type  M  to MERGE them into your current deck\n• type  R  to REPLACE the whole deck (deletes it)\n• Cancel to abort', 'M') || '').trim().toLowerCase();
          if (choice === 'r') Store.replaceProject(data);
          else if (choice === 'm') Store.mergeStreams(data);
          else { toast('Import cancelled'); return; }
        } else {
          Store.replaceProject(data);
        }
        const di = document.getElementById('deckName'); if (di) di.value = Store.project().name || '';
        toast('Imported', 'ok');
      };
      rd.readAsText(file);
    },
  };
})();

/* ================================================================
   SCORES — ONE shared scoreboard, persisted (separate from content).
   Streams are parallel tracks of the same event played by the SAME
   teams, so scores carry forward from stream to stream. The streamId
   argument is kept on the API so call sites don't care.
   ================================================================ */
const Scores = (() => {
  // Maker preview scoring is a dry run; it only ever uses its own 'shared'
  // bucket. Nothing here is shared with Display — Display keeps a d_ store.
  const KEY = 'm_cfc-quiz-scores-v1';   // m_ = maker preview scores only
  const BUCKET = 'shared';
  const read = () => { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch (e) { return {}; } };
  let data = read();
  const save = () => { try { const cur = read(); if (data[BUCKET] === undefined) delete cur[BUCKET]; else cur[BUCKET] = data[BUCKET]; data = cur; localStorage.setItem(KEY, JSON.stringify(cur)); } catch (e) {} };
  function get(streamId, n) { const src = data[BUCKET] || []; const a = []; for (let i = 0; i < n; i++) a.push(src[i] || 0); return a; }
  function add(streamId, i, delta) { const a = data[BUCKET] || (data[BUCKET] = []); a[i] = (a[i] || 0) + delta; save(); } // negatives allowed
  function set(streamId, i, value) { const a = data[BUCKET] || (data[BUCKET] = []); a[i] = value | 0; save(); }
  function reset(streamId) { delete data[BUCKET]; save(); }
  function standings(streamId, n) { return get(streamId, n).map((score, i) => ({ name: 'Team ' + (i + 1), score, idx: i })).sort((a, b) => b.score - a.score); }
  return { get, add, set, reset, standings };
})();

/* ================================================================
   PRESENT — the presentation engine (preview/debug here; this exact
   module is what display.html will reuse).

   Present.renderers is the "Display half" of each slide type:
     renderers[type] = { phases:[...], render(data, ctx) -> DOM }
   (Maker uses SlideTypes.fields; Display uses Present.renderers.)
   ================================================================ */
const Present = (() => {
  /* ---- small presentation builders ---- */
  const stage = (kids) => el('div', { class: 'pv-stage' }, kids);
  const badge = (t) => el('div', { class: 'pv-badge', text: t });
  const q = (t) => el('div', { class: 'pv-q', text: t || '' });
  const media = (src) => src ? el('div', { class: 'pv-media' }, [ el('img', { src }) ]) : null;
  const answer = (t) => el('div', { class: 'pv-answer', text: t });
  const pointsOf = d => { const p = d && d.points; return (p == null || p === '') ? 1 : Number(p); };
  const ocap = parts => { const ps = parts.filter(Boolean); return ps.length ? el('div', { class: 'pv-ocap' }, ps.map(t => el('span', { class: 'pv-ocap-pill', text: t }))) : null; };
  function fitStage(main) {
    if (!main) return;
    const st = main.querySelector('.pv-stage'); if (!st) return;
    st.style.transform = ''; st.style.animation = '';
    const cs = getComputedStyle(main);
    const availH = main.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
    const availW = main.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
    const k = Math.min(1, availH / st.scrollHeight, availW / st.scrollWidth);
    if (k < 1) { st.style.animation = 'none'; st.style.transform = 'scale(' + k + ')'; }
  }
  function buildPodium(all) {
    const top = all.slice(0, 3), rest = all.slice(3);
    const wrap = el('div', { class: 'pv-podium-wrap' });
    const podium = el('div', { class: 'pv-podium' });
    const meta = [ { medal: '🥇', cls: 'gold', h: '34vh' }, { medal: '🥈', cls: 'silver', h: '24vh' }, { medal: '🥉', cls: 'bronze', h: '17vh' } ];
    [1, 0, 2].forEach(r => {           // render order 2nd–1st–3rd so the winner stands in the centre
      const t = top[r]; if (!t) return; const m = meta[r];
      const pod = el('div', { class: 'pv-pod' });
      if (r === 0) pod.append(el('div', { class: 'pv-pod-crown', text: '👑' }));
      pod.append(el('div', { class: 'pv-pod-medal', text: m.medal }), el('div', { class: 'pv-pod-name', text: t.name }));
      const block = el('div', { class: 'pv-pod-block ' + m.cls }, [
        el('div', { class: 'pv-pod-place', text: (r + 1) }),
        el('div', { class: 'pv-pod-score', text: t.score }) ]);
      pod.append(block); podium.append(pod);
      setTimeout(() => { block.style.height = m.h; }, 90);
    });
    wrap.append(podium);
    if (rest.length) {                 // everyone below 3rd, as a side scoreboard table
      const side = el('div', { class: 'pv-pod-rest' }, [ el('div', { class: 'pv-pod-rest-head', text: 'The rest of the field' }) ]);
      side.append(scoreTable(rest, 4)); wrap.append(side);
    }
    return wrap;
  }
  // a ranked rank/name/score table that lays itself out across columns to fit the space (every team shows)
  function scoreTable(teams, startRank) {
    startRank = startRank || 1;
    const list = el('div', { class: 'pv-pod-rest-list' });
    list.dataset.count = teams.length;
    teams.forEach((t, i) => {
      const row = el('div', { class: 'pv-pod-rest-row' + (startRank === 1 && i < 3 ? ' top' : '') }, [
        el('span', { class: 'pv-pod-rest-rank', text: (i + startRank) }),
        el('span', { class: 'pv-pod-rest-name', text: t.name }),
        el('span', { class: 'pv-pod-rest-score', text: t.score }) ]);
      row.style.animationDelay = (i * 0.04) + 's';
      list.append(row);
    });
    layoutRest(list, teams.length);
    return list;
  }
  // adapt a score table: more vertical space → more rows (fewer, wider columns). Recomputed on resize.
  function layoutRest(list, count) {
    if (!list || !count) return;
    const vh = window.innerHeight || 720;
    const rows = Math.max(2, Math.min(count, Math.floor((vh * 0.46) / 46)));
    list.style.gridTemplateRows = 'repeat(' + rows + ', auto)';
  }

  function optionsGrid(options, { reveal = false } = {}) {
    const opts = Array.isArray(options) ? options : [];
    const grid = el('div', { class: 'pv-options' + (opts.length <= 1 ? ' n1' : '') });
    opts.forEach((o, i) => {
      const correct = !!o.correct;
      const tile = el('div', { class: 'pv-opt' + (reveal && correct ? ' correct' : '') + (reveal && !correct ? ' dim' : '') });
      tile.style.animationDelay = (i * 0.08) + 's';
      tile.append(el('span', { class: 'pv-letter', text: String.fromCharCode(65 + i) }),
                  el('span', { class: 'pv-opt-text', text: o.text || '' }));
      if (reveal && correct) tile.append(el('span', { class: 'pv-check', text: '✓' }));
      grid.append(tile);
    });
    return grid;
  }
  const shuffle = (a) => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

  /* ---- the renderers (Display half of each type) ---- */
  const Q2 = ['question', 'reveal', 'score'], SOLO = ['solo'];
  const renderers = {
    title: { phases: SOLO, render: d => stage([
      el('div', { class: 'pv-title-huge', text: d.heading || 'Title' }),
      d.subheading ? el('div', { class: 'pv-sub', text: d.subheading }) : null ]) },

    answer: { phases: SOLO, render: d => stage([
      badge('Answer'), el('div', { class: 'pv-q', text: d.heading || '' }),
      d.body ? el('div', { class: 'pv-passage', text: d.body }) : null ]) },

    leaderboard: { phases: SOLO, render: (d, ctx) => {
      const n = (ctx.stream && ctx.stream.teamCount) || 8;
      const real = (ctx.stream && Scores) ? Scores.standings(ctx.stream.id, n) : null;
      const teams = (real && real.some(t => t.score > 0)) ? real : demoStandings(n);   // ALL teams, ranked
      return stage([ el('div', { class: 'pv-q', text: d.title || 'Standings' }), scoreTable(teams, 1) ]);
    } },

    podium: { phases: SOLO, render: (d, ctx) => {
      const n = (ctx.stream && ctx.stream.teamCount) || 8;
      const real = (ctx.stream && Scores) ? Scores.standings(ctx.stream.id, n) : null;
      const teams = (real && real.some(t => t.score !== 0)) ? real : demoStandings(n);
      return stage([ el('div', { class: 'pv-q', text: d.title || 'Winners!' }), buildPodium(teams) ]);
    } },

    'choices': { phases: Q2, render: (d, ctx) => stage([
      media(d.media), q(d.question),
      ctx.phase === 'question' ? ocap([ d.choice && d.choice.multiple ? 'Select all that apply' : null ]) : null,
      optionsGrid((d.choice && d.choice.options) || [], { reveal: ctx.phase === 'reveal' }) ]) },

    'true-false': { phases: Q2, render: (d, ctx) => {
      const opts = [ { text: 'True', correct: d.answer === true }, { text: 'False', correct: d.answer === false } ];
      return stage([ q(d.statement), optionsGrid(opts, { reveal: ctx.phase === 'reveal' }) ]);
    } },

    'short-answer': { phases: Q2, render: (d, ctx) => stage([
      q(d.question), ctx.phase === 'reveal' ? answer(d.answer) : null ]) },

    'titled-question': { phases: Q2, render: (d, ctx) => stage([
      d.title ? badge(d.title) : null,
      q(d.question),
      ctx.phase === 'reveal' ? answer(d.answer) : null ]) },

    'image-question': { phases: Q2, render: (d, ctx) => stage([
      media(d.media), q(d.question), ctx.phase === 'reveal' ? answer(d.answer) : null ]) },

    matching: { phases: Q2, render: (d, ctx) => {
      const pairs = Array.isArray(d.pairs) ? d.pairs : [];
      if (ctx.phase === 'reveal') {
        const list = el('div', { class: 'pv-pairlist' });
        pairs.forEach((p, i) => { const row = el('div', { class: 'pv-pair-row' }, [
          el('span', { text: p.left }), el('span', { class: 'ar', text: '↔' }), el('span', { text: p.right }) ]);
          row.style.animationDelay = (i * 0.07) + 's'; list.append(row); });
        return stage([ q(d.instruction), list ]);
      }
      const lefts = el('div', { class: 'pv-col' }), rights = el('div', { class: 'pv-col' });
      pairs.forEach(p => lefts.append(el('div', { class: 'pv-mitem', text: p.left })));
      stableShuffle(ctx.slideId, pairs).forEach(p => rights.append(el('div', { class: 'pv-mitem', text: p.right })));   // fixed order for the run — re-render (← Back) keeps it
      return stage([ q(d.instruction), el('div', { class: 'pv-cols' }, [ lefts, rights ]) ]);
    } },

    poll: { phases: ['question'], render: d => stage([
      badge('Poll'), q(d.question), optionsGrid((d.options || []).map(o => ({ text: o.text })), { reveal: false }) ]) },

    buzzer: { phases: Q2, render: (d, ctx) => stage([
      q(d.question),
      ctx.phase === 'question' ? el('div', { class: 'pv-buzz', text: '🔔 BUZZ!' }) : answer(d.answer) ]) },
  };

  function demoStandings(n) {
    const t = []; for (let i = 1; i <= n; i++) t.push({ name: 'Team ' + i, score: (i * 37 + 13) % 100 });
    return t.sort((a, b) => b.score - a.score);
  }

  /* ---- timer ring ---- */
  // long countdowns read as minutes (2:30); under a minute stays a big plain number
  const fmtClock = s => { s = Math.ceil(Math.max(0, s)); return s >= 60 ? Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0') : String(s); };
  // a controllable countdown: start(), addTime(±s), stop(); fires onDone at 0
  function makeTimer(host, seconds, onDone, autoStart) {
    const size = 230, r = 104, C = 2 * Math.PI * r;
    const wrap = el('div', { class: 'pv-timer' });
    wrap.innerHTML =
      '<svg width="' + size + '" height="' + size + '">' +
      '<circle cx="115" cy="115" r="' + r + '" stroke="rgba(255,255,255,.12)" stroke-width="13" fill="none"/>' +
      '<circle class="prog" cx="115" cy="115" r="' + r + '" stroke="#fff" stroke-width="13" fill="none" stroke-linecap="round" ' +
      'stroke-dasharray="' + C + '" stroke-dashoffset="0" transform="rotate(-90 115 115)"/></svg>' +
      '<div class="num"></div>';
    host.append(wrap);
    const prog = wrap.querySelector('.prog'), num = wrap.querySelector('.num');
    // DEADLINE-based clock (wall-clock, not frame deltas) + setInterval fallback, so an occluded
    // window (rAF suspended — e.g. the score-console popup covering the show) can't freeze it,
    // make it jump on uncover, or skip Time's-up. Kept in sync with display.html.
    const now = () => performance.now();
    let remaining = seconds, displayMax = seconds, running = false, fired = false, endAt = 0, raf = null, iv = null;
    function compute() { if (running) remaining = Math.max(0, (endAt - now()) / 1000); return remaining; }
    function paint() {
      const txt = fmtClock(remaining);
      num.textContent = txt; num.classList.toggle('long', txt.length > 3);
      prog.style.strokeDashoffset = (C * (displayMax > 0 ? 1 - Math.max(0, remaining) / displayMax : 1)).toString();
      wrap.classList.toggle('warn', remaining <= 5 && running);
    }
    function stopLoops() { if (raf) { cancelAnimationFrame(raf); raf = null; } if (iv) { clearInterval(iv); iv = null; } }
    function fire() { running = false; remaining = 0; stopLoops(); paint(); if (!fired) { fired = true; wrap.classList.add('ended'); host.append(el('div', { class: 'pv-timesup', text: '⏰ Time’s up!' })); if (onDone) onDone(); } }
    function step() { if (!running) return; compute(); if (remaining <= 0) { fire(); return; } paint(); }
    function frame() { if (!running) return; step(); if (running) raf = requestAnimationFrame(frame); }
    function loops() { if (raf == null) raf = requestAnimationFrame(frame); if (iv == null) iv = setInterval(step, 500); }
    function start() { if (fired || running) return; running = true; endAt = now() + remaining * 1000; loops(); }
    function addTime(d) {
      if (fired) { if (d <= 0) return; fired = false; const tu = host.querySelector('.pv-timesup'); if (tu) tu.remove(); wrap.classList.remove('ended'); running = true; remaining = 0; endAt = now(); }
      if (running) { compute(); remaining = Math.max(0, remaining + d); endAt = now() + remaining * 1000; }
      else remaining = Math.max(0, remaining + d);

  /* ---- confetti burst ---- */

  // pending score marks are committed only when you LEAVE the scoring slide (advance / switch / board / exit)

  /* press-and-hold control — fills over DURATION; releasing early cancels. NO plain click advances. */
  function holdControl(label, onDone) {
    const DURATION = 800;   // deliberate press-and-hold (~0.8s) so advancing is never accidental, but snappy
    const btn = el('button', { class: 'pv-hold' });
    const fill = el('span', { class: 'pv-hold-fill' });
    btn.append(fill, el('span', { class: 'pv-hold-label', text: label }));
    let raf = null, start = null, done = false;
    function frame(ts) {
      if (start == null) start = ts;

  /* the hold label always names the page you are about to land on — no surprises */

/* ================================================================

  function inkContrast(t) { const a = contrast(t.ink, t.bg1); return t.bgType === 'solid' ? a : Math.min(a, contrast(t.ink, t.bg2)); }
  function apply(elm, t) {
    if (!elm || !t) return;
    const set = (k, v) => elm.style.setProperty(k, v);
    set('--pv-bg', bgCss(t)); set('--pv-ink', t.ink); set('--pv-ink-soft', hexToRgba(t.ink, .62));
    set('--pv-accent', t.accent); set('--pv-accent2', t.accent);
    set('--pv-correct', t.correct); set('--pv-correct-soft', hexToRgba(t.correct, .18));
    set('--pv-on-accent', readableOn(t.accent)); set('--pv-on-correct', readableOn(t.correct));
    set('--pv-tile', hexToRgba(t.ink, .07)); set('--pv-tile-border', hexToRgba(t.ink, .16));
    set('--pv-heading-font', fam(t.headingFont)); set('--pv-body-font', fam(t.bodyFont));
  }

  /* ---- editor drawer ---- */
  let drawer, bg, editId;
  function ensure() {
    if (drawer) return;
    bg = el('div', { class: 'drawer-bg' }); drawer = el('div', { class: 'drawer' });
    document.body.append(bg, drawer); bg.onclick = close;
  }
  function open() { ensure(); render(); bg.classList.add('open'); drawer.classList.add('open'); }
  function close() { if (bg) { bg.classList.remove('open'); drawer.classList.remove('open'); } }

  function render() {
    const themes = Store.themes();
    if (!editId || !themes.find(t => t.id === editId)) editId = Store.projectThemeId();
    const t = themes.find(x => x.id === editId);
    drawer.innerHTML = '';
    drawer.append(
      el('div', { class: 'drawer-head' }, [
        el('h2', { text: '🎨 Themes' }), el('div', { style: 'flex:1' }),
        el('button', { class: 'btn sm', text: '+ New', onclick: () => { editId = Store.addTheme(); render(); } }),
        el('button', { class: 'btn sm', text: '✕ Close', onclick: close }),
      ]),
      el('div', { class: 'drawer-body' }, [ themeList(themes), el('div', { class: 'theme-edit' }, [ buildPreview(t), controls(t) ]) ]),
    );
  }
  function themeList(themes) {
    const list = el('div', { class: 'theme-list' });
    themes.forEach(t => {
      const item = el('div', { class: 'theme-item' + (t.id === editId ? ' active' : ''), onclick: () => { editId = t.id; render(); } });
      const sw = el('span', { class: 'sw' }); sw.style.background = bgCss(t);
      item.append(sw, el('span', { class: 'nm', text: t.name }));
      if (t.id === Store.projectThemeId()) item.append(el('span', { class: 'def', text: 'DEFAULT' }));
      list.append(item);
    });
    return list;
  }
  function buildPreview(t) {
    const p = el('div', { class: 'theme-preview' });
    p.style.background = bgCss(t); p.style.color = t.ink; p.style.fontFamily = fam(t.bodyFont);
    const q = el('div', { class: 'tp-q', text: 'Sample question?' }); q.style.fontFamily = fam(t.headingFont); q.style.color = t.ink;
    const mk = (letter, txt, correct) => {
      const o = el('div', { class: 'tp-opt' });
      o.style.borderColor = correct ? t.correct : hexToRgba(t.ink, .18);
      o.style.background = correct ? hexToRgba(t.correct, .18) : hexToRgba(t.ink, .07);
      o.style.color = t.ink;
      const L = el('span', { class: 'tp-letter', text: letter }); L.style.background = correct ? t.correct : t.accent;
      o.append(L, el('span', { text: txt })); return o;
    };
    p.append(q, el('div', { class: 'tp-opts' }, [ mk('A', 'Right answer ✓', true), mk('B', 'Another option', false) ]));
    const cr = inkContrast(t);
    p.append(el('div', { class: 'tp-contrast ' + (cr >= 4.5 ? 'ok' : cr >= 3 ? 'warn' : 'bad'),
      text: 'Text contrast ' + cr.toFixed(1) + (cr >= 4.5 ? '  ✓ great' : cr >= 3 ? '  ⚠ ok for big text only' : '  ✕ too low — adjust colors') }));
    return p;
  }
  function controls(t) {
    const wrap = el('div');
    const row = (label, node) => el('div', { class: 'trow' }, [ el('label', { text: label }), node ]);
    const color = key => { const i = el('input', { type: 'color', value: t[key] }); i.oninput = () => { Store.updateTheme(t.id, { [key]: i.value }); soft(); }; return i; };
    const name = el('input', { type: 'text', value: t.name }); name.oninput = () => { Store.updateTheme(t.id, { name: name.value }); listOnly(); };
    const bgSel = el('select'); ['solid', 'linear', 'radial'].forEach(o => bgSel.append(el('option', { value: o, text: o[0].toUpperCase() + o.slice(1), selected: t.bgType === o })));
    bgSel.onchange = () => { Store.updateTheme(t.id, { bgType: bgSel.value }); render(); };
    const angle = el('input', { type: 'range', min: 0, max: 360, value: t.angle || 160 }); angle.oninput = () => { Store.updateTheme(t.id, { angle: Number(angle.value) }); soft(); };
    const fontSel = key => { const s = el('select'); Object.keys(THEME_FONTS).forEach(f => s.append(el('option', { value: f, text: f, selected: t[key] === f }))); s.onchange = () => { Store.updateTheme(t.id, { [key]: s.value }); soft(); }; return s; };

    wrap.append(row('Name', name), row('Background', bgSel), row(t.bgType === 'solid' ? 'Color' : 'Color 1', color('bg1')));
    if (t.bgType !== 'solid') wrap.append(row('Color 2', color('bg2')));
    if (t.bgType === 'linear') wrap.append(row('Angle', angle));
    wrap.append(row('Text', color('ink')), row('Accent', color('accent')), row('Correct', color('correct')),
                row('Heading font', fontSel('headingFont')), row('Body font', fontSel('bodyFont')));
    wrap.append(el('div', { class: 'trow', style: 'margin-top:18px;gap:8px;flex-wrap:wrap;' }, [
      el('button', { class: 'btn sm primary', text: '★ Set as project default', onclick: () => { Store.setProjectTheme(t.id); render(); toast('Default theme set', 'ok'); } }),
      el('button', { class: 'btn sm', text: 'Duplicate', onclick: () => { editId = Store.duplicateTheme(t.id); render(); } }),
      el('button', { class: 'btn sm', text: '⬇ Export', onclick: () => exportTheme(t) }),
      el('button', { class: 'btn sm', text: '⬆ Import', onclick: importTheme }),
      el('button', { class: 'btn sm danger', text: 'Delete', onclick: () => { if (confirm('Delete theme “' + t.name + '”?')) { Store.deleteTheme(t.id); editId = null; render(); } } }),
    ]));
    return wrap;
  }
  function soft() { const t = Store.themes().find(x => x.id === editId); if (!t) return;
    const old = drawer.querySelector('.theme-preview'); if (old) old.replaceWith(buildPreview(t)); listOnly(); }
  function listOnly() { drawer.querySelectorAll('.theme-item').forEach((it, i) => { const th = Store.themes()[i]; if (th) {
    const sw = it.querySelector('.sw'); if (sw) sw.style.background = bgCss(th);
    const nm = it.querySelector('.nm'); if (nm) nm.textContent = th.name; } }); }
  function exportTheme(t) { IO.downloadObj('cfc-theme-' + (t.name || 'theme').replace(/[^\w-]+/g, '-').toLowerCase() + '.json', { app: 'cfc-quiz', kind: 'theme', version: 1, theme: t }); toast('Theme exported', 'ok'); }
  function importTheme() {
    const inp = el('input', { type: 'file', accept: 'application/json,.json' });
    inp.onchange = () => { const f = inp.files[0]; if (!f) return; const rd = new FileReader();
      rd.onload = () => { let d; try { d = JSON.parse(rd.result); } catch { toast('Bad file'); return; }
        const th = d.kind === 'theme' ? d.theme : (d && d.bgType ? d : null);
        if (!th) { toast('Not a theme file'); return; }
        editId = Store.importTheme(th); render(); toast('Theme imported', 'ok'); };
      rd.readAsText(f); };
    inp.click();
  }
  return { apply, resolve, open, bgCss };
})();

/* ================================================================
   TOAST
   ================================================================ */
let toastTimer;
function toast(msg, kind) {
  const wrap = document.getElementById('toasts');
  const t = el('div', { class: 'toast' + (kind === 'ok' ? ' ok' : '') }, [
    el('span', { class: 'ic', text: kind === 'ok' ? '✓' : 'ℹ' }), msg ]);
  wrap.append(t);
  setTimeout(() => { t.style.transition = 'opacity .3s, transform .3s'; t.style.opacity = '0'; t.style.transform = 'translateY(8px)'; setTimeout(() => t.remove(), 300); }, 2200);
}

/* ================================================================
   WIRING
   ================================================================ */
function init() {
  Store.subscribe(s => Views.renderAll(s));
  Views.renderAll(Store.get());

  document.getElementById('addStream').onclick = () => { Store.addStream(); Views.openStreamSettings(Store.curStream().id); };   // name + set its defaults right away
  document.getElementById('addSlide').onclick = () => { if (!Store.curStream()) { toast('Add a stream first'); return; } openPicker(); };
  document.getElementById('picker').onclick = e => { if (e.target.id === 'picker') closePicker(); };

  // mobile drill-down: ONE screen at a time — Streams → Slides(questions) → Edit slide
  const main = document.querySelector('.main');
  const isMobile = () => window.matchMedia('(max-width: 860px)').matches;
  const setMView = v => main.setAttribute('data-mview', v);
  setMView('streams');
  window.__makerNav = { setMView, isMobile };   // back buttons in the editor use this
  document.getElementById('navToggle').onclick = () => setMView('streams');   // hamburger = jump to Streams
  document.getElementById('slidesBack').onclick = () => setMView('streams');
  // tap a STREAM → its questions; tap a QUESTION → edit that slide
  document.getElementById('streamList').addEventListener('click', e => { if (isMobile() && e.target.closest('.row')) setMView('slides'); });
  document.getElementById('slideList').addEventListener('click', e => { if (isMobile() && e.target.closest('.row')) setMView('editor'); });

  // export — always the whole deck, encrypted with a password (so answers stay hidden)
  document.getElementById('exportBtn').onclick = () => IO.exportEncrypted();

  // deck name (asked up front; used for export filenames)
  const deckInput = document.getElementById('deckName');
  deckInput.value = Store.project().name === 'Untitled Deck' ? '' : (Store.project().name || '');
  deckInput.oninput = () => Store.setDeckName(deckInput.value.trim() || 'Untitled Deck');

  // import
  const fileInput = document.getElementById('fileInput');
  document.getElementById('importBtn').onclick = () => fileInput.click();
  fileInput.onchange = () => { if (fileInput.files[0]) IO.importFile(fileInput.files[0]); fileInput.value = ''; };

  // present / preview (debug harness) — starts from the selected slide
  const present = () => { const s = Store.curStream(); if (!s) { toast('Add a stream first'); return; } Present.open(s, Store.get().selSlide); };
  document.getElementById('presentBtn').onclick = present;
  document.getElementById('themeBtn').onclick = () => Theme.open();
  document.getElementById('resetBtn').onclick = () => { if (confirm('Clear ALL local data (deck, slides, themes, scores) and reload the fresh sample deck?\n\nExport first if you want to keep your work — this cannot be undone.')) Store.reset(); };

  // keyboard niceties
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePicker();
    const typing = /^(INPUT|TEXTAREA|SELECT)$/.test((e.target.tagName || ''));
    if (!typing && (e.key === 'p' || e.key === 'P')) present();
  });

  // test/automation hook (also handy for debugging)
  window.CFC = { Store, Theme, Present, Scores, SlideTypes, kindOf, CryptoBox, IO };
}
document.addEventListener('DOMContentLoaded', init);
</script>
