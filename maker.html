<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CFC Quiz · Maker</title>
<style>
  /* ============================================================
     THEME — clean & classic, subtle motion. Tool UI (not the show).
     ============================================================ */
  :root {
    --bg:        #f4f5f7;
    --panel:     #ffffff;
    --ink:       #1d2330;
    --ink-soft:  #5b6472;
    --line:      #e3e6eb;
    --line-2:    #cfd4dd;
    --accent:    #4f46e5;
    --accent-ink:#ffffff;
    --accent-soft:#eef0fe;
    --danger:    #d6455d;
    --ok:        #1f9d6b;
    --radius:    10px;
    --shadow:    0 1px 2px rgba(20,28,48,.06), 0 6px 20px rgba(20,28,48,.06);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: var(--font); color: var(--ink);
    background: var(--bg); font-size: 14px; line-height: 1.45;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; font-size: inherit; }

  /* ---- Layout ---- */
  .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
  .topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 18px; background: var(--panel);
    border-bottom: 1px solid var(--line); box-shadow: var(--shadow); z-index: 5;
  }
  .brand { font-weight: 700; letter-spacing: .2px; display: flex; align-items: center; gap: 9px; }
  .brand .dot { width: 11px; height: 11px; border-radius: 3px; background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft); }
  .brand small { font-weight: 500; color: var(--ink-soft); }
  .topbar .spacer { flex: 1; }
  .saved { font-size: 12px; color: var(--ink-soft); display: flex; align-items: center; gap: 6px; }
  .saved .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); }

  /* three panels: Streams | Slides | Slide options(editor) */
  .main { display: grid; grid-template-columns: 220px 320px 1fr; min-height: 0; }
  .sidebar { display: contents; }                       /* its two .col children become grid items */
  .col { background: var(--panel); border-right: 1px solid var(--line);
    overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; min-height: 0; }
  .editor { overflow-y: auto; padding: 22px 26px; }
  .btn.m-back { display: none; margin-bottom: 12px; }   /* mobile-only drill-down back buttons (beats .btn) */

  /* ---- Buttons ---- */
  .btn {
    border: 1px solid var(--line-2); background: #fff; color: var(--ink);
    padding: 7px 13px; border-radius: 8px; transition: transform .08s ease, box-shadow .15s ease, background .15s ease, border-color .15s;
    display: inline-flex; align-items: center; gap: 7px; font-weight: 500;
  }
  .btn:hover { border-color: var(--accent); box-shadow: var(--shadow); }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.05); }
  .btn.ghost { border-color: transparent; background: transparent; padding: 6px 9px; }
  .btn.ghost:hover { background: var(--accent-soft); border-color: transparent; box-shadow: none; }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn.sm { padding: 4px 9px; font-size: 12.5px; }
  .icon-btn { border: none; background: transparent; padding: 4px 5px; border-radius: 6px; color: var(--ink-soft); line-height: 1; font-size: 14px; }
  .icon-btn:hover:not(:disabled) { background: var(--accent-soft); color: var(--accent); }
  .icon-btn:disabled { opacity: .3; cursor: default; }
  /* import/export format dropdown */
  .io-menu { position: absolute; z-index: 80; background: #fff; border: 1px solid var(--line-2); border-radius: 10px; box-shadow: var(--shadow); padding: 5px; min-width: 170px; }
  .io-menu button { display: block; width: 100%; text-align: left; border: none; background: transparent; padding: 9px 12px; border-radius: 7px; font: inherit; color: var(--ink); cursor: pointer; }
  .io-menu button:hover { background: var(--accent-soft); }
  .io-menu .io-sub { font-size: 11.5px; color: var(--ink-soft); padding: 4px 12px 6px; }

  /* ---- Sidebar sections ---- */
  .sect { padding: 14px 14px 8px; }
  .sect + .sect { border-top: 1px solid var(--line); }
  .sect-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .sect-head h3 { margin: 0; font-size: 11.5px; text-transform: uppercase; letter-spacing: .8px; color: var(--ink-soft); }

  .list { display: flex; flex-direction: column; gap: 4px; }
  .row {
    display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 8px;
    border: 1px solid transparent; cursor: pointer; transition: background .12s, border-color .12s;
  }
  .row:hover { background: var(--bg); }
  .row.active { background: var(--accent-soft); border-color: #d9dcfb; }
  .row .grow { flex: 1; min-width: 0; }
  .row .title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .sub { font-size: 12px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .badge { font-size: 10.5px; font-weight: 700; color: var(--accent); background: var(--accent-soft);
    padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: .4px; }
  .row .tools { display: flex; gap: 2px; opacity: .45; }   /* always visible — hidden tools are undiscoverable */
  .row:hover .tools, .row.active .tools { opacity: 1; }
  .stream-rename { font: inherit; font-weight: 600; width: 100%; padding: 1px 4px; margin: -1px 0;
    border: 1px solid var(--accent); border-radius: 5px; background: var(--panel); color: var(--ink); outline: none; }

  .empty { color: var(--ink-soft); font-size: 13px; padding: 10px 9px; }

  /* ---- Editor ---- */
  .ed-head { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .ed-head .type-chip { font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-soft);
    padding: 4px 11px; border-radius: 20px; }
  .ed-head h2 { margin: 0; font-size: 19px; }
  .ed-sub { color: var(--ink-soft); margin: 2px 0 20px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px 22px; max-width: 760px; }

  .field { margin-bottom: 18px; }
  .field > label { display: block; font-weight: 600; margin-bottom: 6px; }
  .field .hint { font-weight: 400; color: var(--ink-soft); font-size: 12.5px; margin-left: 6px; }
  .field input[type=text], .field input[type=number], .field textarea, .field select {
    width: 100%; padding: 9px 11px; border: 1px solid var(--line-2); border-radius: 8px;
    background: #fff; color: var(--ink); transition: border-color .15s, box-shadow .15s; outline: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .field textarea { resize: vertical; min-height: 70px; }

  /* choices */
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice { display: flex; align-items: center; gap: 9px; }
  .choice .mark { flex: 0 0 auto; }
  .choice input[type=text] { flex: 1; }
  .choice .correct-tag { font-size: 11px; font-weight: 700; color: var(--ok); opacity: 0; transition: opacity .15s; }
  .choice.is-correct .correct-tag { opacity: 1; }
  .choice .mark input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }

  /* matching pairs */
  .pairs { display: flex; flex-direction: column; gap: 8px; }
  .pair { display: grid; grid-template-columns: 1fr auto 1fr auto; gap: 8px; align-items: center; }
  .pair .link { color: var(--ink-soft); }

  /* boolean toggle */
  .seg { display: inline-flex; border: 1px solid var(--line-2); border-radius: 8px; overflow: hidden; }
  .seg button { border: none; background: #fff; padding: 8px 18px; color: var(--ink-soft); font-weight: 600; }
  .seg button.on { background: var(--accent); color: #fff; }

  /* image field */
  .imgfield { display: flex; gap: 14px; align-items: flex-start; }
  .imgfield .thumb { width: 120px; height: 84px; border: 1px dashed var(--line-2); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--ink-soft); font-size: 12px; background: var(--bg); }
  .imgfield .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .imgfield .ctrls { display: flex; flex-direction: column; gap: 8px; flex: 1; }

  .add-row { width: 100%; justify-content: center; border-style: dashed; color: var(--ink-soft); }
  .add-row:hover { color: var(--accent); }

  /* ---- Type picker popover ---- */
  .picker { position: fixed; inset: 0; background: rgba(20,28,48,.32); display: none; z-index: 50;
    align-items: center; justify-content: center; animation: fade .15s ease; }
  .picker.open { display: flex; }
  .picker .sheet { background: #fff; border-radius: 14px; box-shadow: 0 20px 60px rgba(20,28,48,.3);
    width: min(620px, 92vw); max-height: 80vh; overflow: auto; padding: 22px; animation: pop .18s cubic-bezier(.2,.8,.3,1.2); }
  .picker h3 { margin: 0 0 4px; }
  .picker .muted { color: var(--ink-soft); margin: 0 0 16px; }
  .pgroup { margin-bottom: 16px; }
  .pgroup h4 { font-size: 11.5px; text-transform: uppercase; letter-spacing: .8px; color: var(--ink-soft); margin: 0 0 8px; }
  .ptiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .ptile { text-align: left; border: 1px solid var(--line); border-radius: 10px; padding: 11px 13px; background: #fff;
    transition: border-color .12s, box-shadow .12s, transform .08s; }
  .ptile:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateY(-1px); }
  .ptile .pt-name { font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .ptile .pt-desc { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .ptile .pt-ico { font-size: 16px; }

  /* ---- Dropdown menu ---- */
  .menu-wrap { position: relative; }
  .menu { position: absolute; right: 0; top: calc(100% + 6px); background: #fff; border: 1px solid var(--line);
    border-radius: 10px; box-shadow: 0 12px 36px rgba(20,28,48,.18); padding: 6px; min-width: 210px; display: none; z-index: 40;
    animation: pop .14s ease; }
  .menu.open { display: block; }
  .menu button { display: flex; width: 100%; align-items: center; gap: 9px; padding: 9px 11px; border: none;
    background: transparent; border-radius: 7px; text-align: left; color: var(--ink); }
  .menu button:hover { background: var(--accent-soft); }
  .menu .sep { height: 1px; background: var(--line); margin: 5px 4px; }
  .menu .mlabel { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--ink-soft); padding: 6px 11px 3px; }

  /* ---- Toast ---- */
  .toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 80;
    display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast { background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 10px; font-weight: 500;
    box-shadow: 0 10px 30px rgba(20,28,48,.3); animation: rise .25s cubic-bezier(.2,.8,.3,1.2); display: flex; align-items: center; gap: 9px; }
  .toast.ok .ic { color: #7ef0bf; }

  .empty-editor { display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--ink-soft); text-align: center; gap: 8px; }
  .empty-editor .big { font-size: 40px; opacity: .35; }

  @keyframes pop { from { opacity: 0; transform: scale(.96) translateY(-4px); } to { opacity: 1; transform: none; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* ============================================================
     PRESENT / PREVIEW — the "show" view (also the Display engine).
     Dark, cinematic, classic, projector-legible, animated.
     ============================================================ */
  .present { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column;
    background: radial-gradient(120% 100% at 50% 0%, #232c45 0%, #11162a 55%, #0a0e1d 100%);
    color: #fff; font-family: var(--font); }
  .present.open { display: flex; }
  .pv-main { flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 5vh 6vw; overflow: hidden; position: relative; }
  .pv-stage { width: 100%; max-width: 1120px; text-align: center; animation: pvIn .5s cubic-bezier(.2,.85,.25,1); }
  .pv-badge { display: inline-block; font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase;
    color: #9fb0d0; border: 1px solid rgba(255,255,255,.18); padding: 6px 14px; border-radius: 20px; margin-bottom: 3vh; }
  .pv-q { font-size: clamp(26px, 4.6vw, 54px); font-weight: 800; line-height: 1.16; letter-spacing: -.5px; margin: 0 auto 3vh; max-width: 16ch; }
  .pv-sub { color: #9fb0d0; font-size: clamp(16px, 2.2vw, 26px); margin-top: 2vh;
    white-space: pre-line; line-height: 1.45; max-width: 26em; margin-left: auto; margin-right: auto; text-align: left; }
  .pv-title-huge { font-size: clamp(46px, 9vw, 124px); font-weight: 900; letter-spacing: -1.5px; line-height: 1.02;
    background: linear-gradient(180deg, #ffffff, #aebede); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .pv-media { margin: 0 auto 3vh; max-width: min(620px, 64vw); }
  .pv-media img { width: 100%; border-radius: 18px; box-shadow: 0 24px 70px rgba(0,0,0,.55); }

  .pv-options { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; max-width: 940px; margin: 0 auto; }
  .pv-options.n1 { grid-template-columns: 1fr; max-width: 560px; }
  .pv-opt { display: flex; align-items: center; gap: 16px; padding: clamp(14px,2vh,22px) 22px; text-align: left;
    background: rgba(255,255,255,.06); border: 2px solid rgba(255,255,255,.12); border-radius: 14px;
    font-size: clamp(17px, 2.3vw, 27px); font-weight: 600; animation: optIn .45s both; transition: all .45s cubic-bezier(.2,.8,.2,1); }
  .pv-letter { width: 44px; height: 44px; flex: 0 0 auto; border-radius: 11px; background: var(--accent);
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; }
  .pv-opt-text { flex: 1; }
  .pv-opt.correct { background: rgba(47,211,154,.18); border-color: #2fd39a; transform: scale(1.03);
    box-shadow: 0 0 0 3px rgba(47,211,154,.28), 0 16px 44px rgba(47,211,154,.22); }
  .pv-opt.correct .pv-letter { background: #2fd39a; color: #08231a; }
  .pv-opt.dim { opacity: .38; filter: saturate(.4); }
  .pv-check { margin-left: auto; color: #2fd39a; font-weight: 900; font-size: 1.4em; }

  .pv-answer { font-size: clamp(30px, 5.5vw, 70px); font-weight: 900; color: #7ef0bf; margin-top: 1vh; animation: pop .45s; }
  /* Reveal Answers browser slide */
  .pv-ra { position: relative; }
  .pv-ra-inner { width: 100%; text-align: center; animation: pvIn .35s cubic-bezier(.2,.85,.25,1); }
  .pv-ra-arrow { position: absolute; top: 50%; transform: translateY(-50%); z-index: 6; width: 62px; height: 62px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.28); background: rgba(255,255,255,.08); color: inherit; font-size: 24px; cursor: pointer; }
  .pv-ra-arrow.prev { left: -8px; } .pv-ra-arrow.next { right: -8px; }
  .pv-ra-arrow:hover:not(:disabled) { background: rgba(255,255,255,.2); }
  .pv-ra-arrow:disabled { opacity: .25; cursor: default; }
  .pv-ra-bar { display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 2.5vh; }
  .pv-ra-counter { font-weight: 800; font-size: clamp(16px, 2vw, 24px); opacity: .85; font-variant-numeric: tabular-nums; }
  .pv-ra-prog { width: clamp(110px, 15vw, 200px); height: 6px; border-radius: 3px; background: rgba(255,255,255,.18); overflow: hidden; }
  .pv-ra-prog-fill { height: 100%; width: 0%; background: currentColor; opacity: .75; }
  .pv-ra-pause { width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(255,255,255,.28); background: rgba(255,255,255,.08); color: inherit; font-size: 17px; cursor: pointer; }
  .pv-ra-pause:hover { background: rgba(255,255,255,.2); }
  .pv-passage { font-size: clamp(22px, 3.2vw, 40px); font-weight: 600; line-height: 1.35; max-width: 22ch; margin: 0 auto; }

  /* timer ring — big & centered */
  .pv-timer { position: absolute; top: 2.5vh; left: 50%; transform: translateX(-50%); width: 230px; height: 230px; z-index: 4; }
  .pv-timer .num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 82px; font-variant-numeric: tabular-nums; }
  .pv-timer .num.long { font-size: 58px; }
  .pv-timer .prog { transition: none; }
  .pv-timer.warn .prog { stroke: #ff6b81 !important; }
  .pv-timer.warn .num { color: #ff6b81; animation: tick .5s infinite; }
  .pv-timer.ended { display: none; }
  .pv-timesup { position: absolute; top: 5vh; left: 50%; transform: translateX(-50%); z-index: 5; white-space: nowrap;
    font-size: clamp(46px, 8vw, 108px); font-weight: 900; color: #ff6b81; letter-spacing: 1px;
    text-shadow: 0 8px 34px rgba(255,107,129,.5); animation: timesupPop .5s cubic-bezier(.2,.9,.3,1.3); }
  @keyframes timesupPop { from { opacity: 0; transform: translateX(-50%) scale(.7); } to { opacity: 1; transform: translateX(-50%) scale(1); } }

  /* buzzer */
  .pv-buzz { margin-top: 3vh; display: inline-flex; align-items: center; gap: 14px; background: linear-gradient(180deg,#ff4d63,#e11d36);
    color: #fff; padding: 18px 44px; border-radius: 50px; font-size: clamp(22px,3vw,34px); font-weight: 900;
    box-shadow: 0 16px 44px rgba(225,29,54,.5); animation: buzzPulse 1.2s infinite; }

  /* leaderboard */
  .pv-board { max-width: 780px; margin: 0 auto; text-align: left; display: flex; flex-direction: column; gap: 11px; }
  .pv-board-row { display: flex; align-items: center; gap: 16px; }
  .pv-rank { width: 40px; font-weight: 800; color: var(--pv-ink-soft, #9fb0d0); font-size: 20px; text-align: center; }
  .pv-rank.top { color: #fbbf24; }
  .pv-team { width: 130px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pv-bar { flex: 1; height: 32px; background: rgba(255,255,255,.07); border-radius: 8px; overflow: hidden; }
  .pv-bar-fill { height: 100%; width: 0; border-radius: 8px; background: linear-gradient(90deg, var(--accent), #8b5cf6);
    transition: width 1.1s cubic-bezier(.2,.85,.2,1); }
  .pv-score { width: 66px; text-align: right; font-weight: 800; font-size: 20px; }

  /* matching — two clearly DIVIDED halves; each half breaks into 1/2/3 columns by item count */
  .pv-cols { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(28px,5vw,72px); width: 100%; position: relative; align-items: start; }
  .pv-cols::before { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; transform: translateX(-50%); opacity: .25; background: linear-gradient(to bottom, transparent, currentColor 15%, currentColor 85%, transparent); }
  .pv-col { display: grid; grid-auto-flow: column; gap: 10px 14px; align-content: start; min-width: 0; }
  .pv-mitem { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14); border-radius: 12px;
    padding: 13px 18px; font-weight: 600; min-width: 0; font-size: clamp(16px,1.9vw,22px); animation: optIn .4s both; overflow-wrap: break-word; }
  .pv-pairlist { display: grid; gap: 10px clamp(28px,4vw,56px); max-width: 640px; margin: 0 auto; justify-items: center; }
  .pv-pairlist.two { grid-auto-flow: column; max-width: 1100px; }   /* long answer lists read in two columns */
  .pv-pair-row { display: flex; align-items: center; gap: 14px; justify-content: center; font-size: clamp(17px,2.1vw,26px);
    font-weight: 600; animation: optIn .4s both; }
  .pv-pair-row .ar { color: #2fd39a; font-weight: 900; }

  /* controls */
  .pv-controls { display: flex; align-items: center; justify-content: safe center; gap: 12px; padding: 13px;
    background: #0c1124; border-top: 1px solid rgba(255,255,255,.08); color: #fff;
    flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; -ms-overflow-style: none; }
  .pv-controls::-webkit-scrollbar { display: none; }
  .pv-controls > * { flex: 0 0 auto; }
  .pv-hold-label { color: #fff; }
  .pv-step { color: #9fb0d0; font-size: 13px; min-width: 86px; text-align: center; font-variant-numeric: tabular-nums; }
  .pv-btn { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.18); border-radius: 10px;
    padding: 10px 18px; font-weight: 600; transition: background .15s; }
  .pv-btn:hover { background: rgba(255,255,255,.2); }
  .pv-btn.primary { background: var(--accent); border-color: var(--accent); }
  .pv-hint { color: #6b7690; font-size: 12px; margin-left: 6px; }

  @keyframes pvIn { from { opacity: 0; transform: translateY(22px) scale(.985); } to { opacity: 1; transform: none; } }
  @keyframes optIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @keyframes buzzPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes tick { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

  /* ---- THEME VARIABLES (later rules override the hardcoded Show colors) ---- */
  .present { --pv-bg: radial-gradient(120% 100% at 50% 0%, #232c45 0%, #11162a 55%, #0a0e1d 100%);
    --pv-ink:#fff; --pv-ink-soft: rgba(255,255,255,.62); --pv-accent:#4f46e5; --pv-accent2:#8b5cf6;
    --pv-correct:#2fd39a; --pv-correct-soft: rgba(47,211,154,.18); --pv-tile: rgba(255,255,255,.06);
    --pv-tile-border: rgba(255,255,255,.12); --pv-heading-font: var(--font); --pv-body-font: var(--font);
    background: var(--pv-bg); color: var(--pv-ink); font-family: var(--pv-body-font); }
  .pv-q, .pv-title-huge { font-family: var(--pv-heading-font); }
  .pv-title-huge { background: none; -webkit-text-fill-color: currentColor; color: var(--pv-ink); }
  .pv-sub, .pv-badge, .pv-step { color: var(--pv-ink-soft); }
  .pv-badge { border-color: var(--pv-tile-border); }
  .pv-letter { background: var(--pv-accent); color: var(--pv-on-accent, #fff); }
  .pv-opt { background: var(--pv-tile); border-color: var(--pv-tile-border); }
  .pv-opt.correct { background: var(--pv-correct-soft); border-color: var(--pv-correct);
    box-shadow: 0 0 0 3px var(--pv-correct-soft), 0 16px 44px var(--pv-correct-soft); }
  .pv-opt.correct .pv-letter { background: var(--pv-correct); color: var(--pv-on-correct, #06231a); }
  .pv-check, .pv-answer, .pv-pair-row .ar { color: var(--pv-correct); }
  .pv-bar { background: var(--pv-tile); }
  .pv-bar-fill { background: linear-gradient(90deg, var(--pv-accent), var(--pv-accent2)); }
  .pv-mitem { background: var(--pv-tile); border-color: var(--pv-tile-border); }
  .pv-timer .prog { stroke: var(--pv-ink); }

  /* ---- timer field ---- */
  .timerfield { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .timerfield .num { width: 78px; }
  .timerfield .chips { display: flex; gap: 6px; }
  .timerfield .chip { padding: 5px 10px; border: 1px solid var(--line-2); border-radius: 20px; background: #fff; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); }
  .timerfield .chip:hover { border-color: var(--accent); color: var(--accent); }
  .timerfield .chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .timerfield.off .num, .timerfield.off .chips, .timerfield.off .tsel { opacity: .4; pointer-events: none; }
  .timerfield .tsel { padding: 6px 9px; border: 1px solid var(--line-2); border-radius: 7px; min-width: 92px; background: #fff; }
  .row .title.q3 { white-space: normal; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.28; }
  .fmt-label { font-size: 12px; color: var(--ink-soft); font-weight: 600; margin-left: 4px; }
  .fmt-select { padding: 6px 10px; border: 1px solid var(--line-2); border-radius: 8px; background: #fff; font-weight: 600; }
  .deck-name { border: 1px solid var(--line-2); border-radius: 8px; padding: 6px 12px; font-weight: 600; min-width: 200px; background: var(--bg); color: var(--ink); }
  .deck-name:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-soft); }

  /* ---- show: stream switcher ---- */
  .pv-stream-sel { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.18); border-radius: 10px; padding: 9px 10px; font-weight: 600; max-width: 190px; }
  .pv-stream-sel option { color: #111; }
  /* ---- show: score tally ---- */
  .pv-tally { display: grid; grid-template-columns: repeat(2, minmax(280px, 1fr)); gap: 8px 22px; width: min(960px, 95vw); margin: 2.5vh auto 0; max-height: 62vh; overflow: auto; padding: 4px; }
  .pv-trow { display: flex; align-items: center; gap: 12px; background: var(--pv-tile, rgba(255,255,255,.06)); border: 1px solid var(--pv-tile-border, rgba(255,255,255,.12)); border-radius: 12px; padding: 7px 12px; transition: background .15s; }
  .pv-trow.plus { background: var(--pv-correct-soft, rgba(47,211,154,.2)); border-color: var(--pv-correct, #2fd39a); }
  .pv-trow.minus { background: rgba(255,93,115,.18); border-color: #ff5d73; }
  .pv-tname { flex: 1; font-weight: 700; font-size: 18px; text-align: left; }
  .pv-tscore { min-width: 44px; text-align: right; font-weight: 900; font-size: 22px; }
  .pv-team-card { background: var(--pv-tile, rgba(255,255,255,.06)); border: 1px solid var(--pv-tile-border, rgba(255,255,255,.12)); border-radius: 14px; padding: 14px; text-align: center; transition: background .2s, transform .1s; }
  .pv-team-card.flash { background: var(--pv-correct-soft, rgba(47,211,154,.22)); transform: scale(1.04); }
  .pv-team-name { font-weight: 700; font-size: 15px; opacity: .85; }
  .pv-team-score { font-size: 38px; font-weight: 900; margin: 4px 0 8px; }
  .pv-pm-row { display: flex; gap: 8px; justify-content: center; }
  .pv-pm { width: 44px; height: 44px; border-radius: 10px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.08); color: #fff; font-size: 22px; font-weight: 800; cursor: pointer; }
  .pv-pm:hover { background: rgba(255,255,255,.18); }
  .pv-pm.plus { background: var(--pv-accent, #4f46e5); border-color: var(--pv-accent, #4f46e5); }
  .pv-mark-row { display: flex; gap: 8px; justify-content: center; }
  .pv-mark { width: 46px; height: 46px; border-radius: 10px; border: 1px solid var(--pv-tile-border, rgba(255,255,255,.2)); background: var(--pv-tile, rgba(255,255,255,.08)); color: var(--pv-ink, #fff); font-size: 22px; font-weight: 800; cursor: pointer; transition: all .15s; }
  .pv-mark:hover { filter: brightness(1.25); }
  .pv-mark.check.on { background: #2fd39a; border-color: #2fd39a; color: #06231a; }
  .pv-mark.cross.on { background: #ff5d73; border-color: #ff5d73; color: #fff; }
  .pv-team-card.plus { background: rgba(47,211,154,.16); border-color: #2fd39a; }
  .pv-team-card.minus { background: rgba(255,93,115,.16); border-color: #ff5d73; }
  .pv-award { display: flex; justify-content: center; margin-top: 2.5vh; }
  .pv-submit { background: var(--pv-accent, #4f46e5); color: var(--pv-on-accent, #fff); border: none; border-radius: 12px; padding: 12px 30px; font-weight: 800; font-size: 16px; cursor: pointer; transition: filter .15s; }
  .pv-submit:hover { filter: brightness(1.08); }
  .pv-award-status { text-align: center; color: #9fb0d0; margin-top: 12px; min-height: 18px; }
  .pv-score-edit { width: 86px; text-align: right; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.22); border-radius: 8px; color: #fff; padding: 6px 8px; font-weight: 800; font-size: 18px; }
  .pv-score-edit:focus { outline: none; border-color: var(--pv-accent, #4f46e5); }
  .pv-board-hint { color: #9fb0d0; font-size: 13px; margin: -2vh 0 3vh; }
  /* ---- show: standings overlay ---- */
  .pv-board-overlay { position: absolute; inset: 0; z-index: 20; background: #0a0e1d; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4vh 5vw; animation: fade .2s; }
  .pv-board-title { font-size: clamp(22px, 3.6vw, 42px); font-weight: 900; margin-bottom: 1.5vh; }
  .pv-bgrid { display: grid; grid-template-columns: repeat(2, minmax(260px, 1fr)); gap: 8px 22px; width: min(940px, 95vw); max-height: 66vh; overflow: auto; padding: 4px; }
  .pv-brow { display: flex; align-items: center; gap: 10px; padding: 7px 12px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14); border-radius: 10px; }
  .pv-brow.lead { border-color: #fbbf24; background: rgba(251,191,36,.1); }
  .pv-board-overlay .pv-rank { color: #9fb0d0; width: 32px; }
  .pv-board-overlay .pv-rank.top { color: #fbbf24; }
  .pv-bteam { flex: 1; font-weight: 700; font-size: 16px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pv-bscore { min-width: 40px; text-align: right; font-weight: 900; font-size: 20px; color: #fff; }
  .pv-bpm { width: 34px; height: 34px; flex: 0 0 auto; border-radius: 8px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1); color: #fff; font-size: 18px; font-weight: 800; cursor: pointer; transition: filter .12s; }
  .pv-bpm:hover { filter: brightness(1.3); }
  .pv-bpm.plus { background: var(--pv-accent, #4f46e5); border-color: var(--pv-accent, #4f46e5); color: var(--pv-on-accent, #fff); }

  /* ---- drag & drop ---- */
  .row.dragging { opacity: .4; }
  .row.drop-before { box-shadow: inset 0 2px 0 var(--accent); }
  .row.drop-after { box-shadow: inset 0 -2px 0 var(--accent); }
  .row .drag-handle { cursor: grab; color: var(--line-2); padding: 0 2px; font-size: 12px; user-select: none; }
  .row:hover .drag-handle { color: var(--ink-soft); }

  /* ---- per-stream theme picker ---- */
  .theme-pick { display: flex; align-items: center; flex-wrap: wrap; gap: 6px 8px; padding: 9px 14px; margin-bottom: 4px;
    background: var(--bg); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  #deckTeams .theme-pick-note { flex-basis: 100%; }   /* "shared by all streams" drops to its own line, never overflows */
  .theme-pick-label { font-size: 12px; font-weight: 700; color: var(--ink-soft); white-space: nowrap; }
  .theme-pick-note { font-size: 11px; color: var(--ink-soft); font-style: italic; }
  .theme-pick select { flex: 1; padding: 6px 8px; border: 1px solid var(--line-2); border-radius: 7px; background: #fff; font-size: 12.5px; font-weight: 600; color: var(--ink); min-width: 0; }
  .teams-input { width: 58px; padding: 6px 8px; border: 1px solid var(--line-2); border-radius: 7px; background: #fff; font-weight: 700; }

  /* ---- drawer (theme editor) ---- */
  .drawer-bg { position: fixed; inset: 0; background: rgba(20,28,48,.32); display: none; z-index: 60; animation: fade .15s; }
  .drawer-bg.open { display: block; }
  .drawer { position: fixed; top: 0; right: 0; height: 100%; width: min(760px, 96vw); background: var(--panel);
    box-shadow: -10px 0 40px rgba(20,28,48,.22); z-index: 61; transform: translateX(100%);
    transition: transform .25s cubic-bezier(.2,.8,.2,1); display: flex; flex-direction: column; }
  .drawer.open { transform: none; }
  .drawer-head { display: flex; align-items: center; gap: 10px; padding: 15px 20px; border-bottom: 1px solid var(--line); }
  .drawer-head h2 { margin: 0; font-size: 17px; }
  .drawer-body { flex: 1; overflow: hidden; display: grid; grid-template-columns: 230px 1fr; min-height: 0; }
  .theme-list { border-right: 1px solid var(--line); padding: 12px; overflow: auto; display: flex; flex-direction: column; gap: 6px; }
  .theme-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; }
  .theme-item:hover { background: var(--bg); }
  .theme-item.active { background: var(--accent-soft); border-color: #d9dcfb; }
  .theme-item .sw { width: 24px; height: 24px; border-radius: 6px; flex: 0 0 auto; border: 1px solid rgba(0,0,0,.12); }
  .theme-item .nm { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .theme-item .def { font-size: 9.5px; font-weight: 800; color: var(--ok); letter-spacing: .5px; }
  .theme-edit { padding: 18px 22px; overflow: auto; }
  .theme-preview { border-radius: 14px; padding: 26px 20px; margin-bottom: 18px; text-align: center; box-shadow: var(--shadow); }
  .theme-preview .tp-q { font-weight: 800; font-size: 22px; margin-bottom: 16px; }
  .theme-preview .tp-opts { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .theme-preview .tp-opt { display: flex; align-items: center; gap: 8px; padding: 9px 15px; border-radius: 10px; border: 2px solid; font-weight: 600; font-size: 14px; }
  .theme-preview .tp-letter { width: 25px; height: 25px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-size: 12px; }
  .tp-contrast { margin-top: 16px; display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; }
  .tp-contrast.ok { background: #16623f; color: #fff; }
  .tp-contrast.warn { background: #7a5b00; color: #fff; }
  .tp-contrast.bad { background: #7a1020; color: #fff; }
  .trow { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .trow label { width: 110px; font-weight: 600; font-size: 13px; }
  .trow input[type=color] { width: 46px; height: 30px; padding: 0; border: 1px solid var(--line-2); border-radius: 6px; background: #fff; cursor: pointer; }
  .trow input[type=text], .trow select { padding: 7px 9px; border: 1px solid var(--line-2); border-radius: 7px; min-width: 170px; }
  .trow input[type=range] { flex: 1; min-width: 140px; accent-color: var(--accent); }

  /* ---- intentional advance (press-and-hold) ---- */
  .pv-advance { min-width: 240px; display: flex; justify-content: center; }
  .pv-hold { position: relative; overflow: hidden; border: 1px solid var(--pv-accent, #4f46e5);
    background: rgba(255,255,255,.08); color: #fff; border-radius: 12px; padding: 12px 26px;
    font-weight: 700; font-size: 15px; cursor: pointer; user-select: none; min-width: 240px; transition: background .15s; }
  .pv-hold:hover { background: rgba(255,255,255,.15); }
  .pv-hold.holding { box-shadow: 0 0 0 3px rgba(127,127,255,.35); }
  .pv-hold-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0; z-index: 0;
    background: var(--pv-accent, #4f46e5); opacity: .55; }
  .pv-hold-label { position: relative; z-index: 1; display: inline-flex; align-items: center; gap: 8px; }
  .pv-hold-label::before { content: '⊙'; font-size: 14px; opacity: .85; }
  .pv-locked { min-width: 240px; text-align: center; color: #9fb0d0; font-size: 13px; padding: 12px;
    border: 1px dashed rgba(255,255,255,.18); border-radius: 12px; }
  .pv-timer.done .prog { stroke: var(--pv-correct, #2fd39a) !important; }
  .pv-btn[disabled] { opacity: .55; pointer-events: none; }
  .pv-timerctl { display: flex; gap: 8px; }
  .pv-btn.sm { padding: 8px 13px; font-size: 13px; }
  .pv-btn.primary { background: var(--pv-accent, #4f46e5); border-color: var(--pv-accent, #4f46e5); color: var(--pv-on-accent, #fff); }
  .pv-btn.warn { background: rgba(255,107,129,.16); border-color: rgba(255,107,129,.5); }
  .pv-btn.warn:hover { background: rgba(255,107,129,.28); }
  .pv-skip { opacity: .55; font-size: 13px; }
  .pv-skip:hover { opacity: 1; }
  /* AUDIENCE MODE — the actual display: no operator chrome, no Skip */
  .present.audience .pv-controls { display: none; }

  /* ---- timer clearance + points + option caption ---- */
  .pv-main.has-timer { padding-top: 262px; }
  .pv-points { display: inline-block; margin: 0 auto 2.6vh; font-weight: 800; font-size: clamp(14px, 1.7vw, 19px);
    color: var(--pv-on-accent, #fff); background: var(--pv-accent, #4f46e5); padding: 5px 16px; border-radius: 20px; box-shadow: 0 6px 18px rgba(0,0,0,.25); }
  .pv-ocap { display: flex; gap: 9px; justify-content: center; flex-wrap: wrap; margin: 0 auto 1.8vh; }
  .pv-ocap-pill { font-size: clamp(11px, 1.3vw, 14px); font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--pv-ink-soft, #9fb0d0); border: 1px solid var(--pv-tile-border, rgba(255,255,255,.18)); padding: 6px 14px; border-radius: 20px; }

  /* marking a team: pop the row and light its green/red background (committed on advance) */
  .pv-trow { position: relative; }
  .pv-trow.plus, .pv-trow.minus { animation: markPop .28s ease; }
  @keyframes markPop { 0% { transform: scale(.99); } 45% { transform: scale(1.02); } 100% { transform: scale(1); } }

  /* question progress label */
  .pv-progress { position: absolute; top: 2.6vh; left: 3vw; font-size: clamp(12px,1.5vw,16px); font-weight: 700;
    letter-spacing: 1px; color: var(--pv-ink-soft, #9fb0d0); z-index: 4; font-variant-numeric: tabular-nums; }
  /* deck branding — show chrome, never interactive; colors follow the theme.
     ALWAYS centered: a branded show reserves a header band at the top, and the
     timer ring + slide content start below it (.present.branded rules). */
  .pv-brand { position: absolute; top: 2.2vh; left: 50%; transform: translateX(-50%); z-index: 4; display: flex; align-items: center; gap: 10px; opacity: .92; pointer-events: none; max-width: 90vw; white-space: nowrap; }
  .present.branded .pv-main { padding-top: calc(5vh + 52px); }
  .present.branded .pv-timer { top: calc(2.2vh + 52px); }
  .present.branded .pv-main.has-timer { padding-top: calc(262px + 52px); }
  .pv-brand img { height: clamp(28px, 4.5vh, 44px); max-width: 180px; object-fit: contain; display: block; }
  .pv-brand span { font-weight: 800; font-size: clamp(13px, 1.5vw, 19px); letter-spacing: .4px; }
  .pv-footnote { position: absolute; left: 3vw; bottom: 1.6vh; z-index: 4; font-size: clamp(11px, 1.2vw, 15px);
    color: var(--pv-ink-soft, #9fb0d0); max-width: 44vw; text-align: left; pointer-events: none;
    display: flex; align-items: center; gap: 8px; }
  .pv-footnote img { height: clamp(18px, 2.6vh, 26px); max-width: 90px; object-fit: contain; display: block; }
  .pv-footnote span { white-space: pre-line; }

  /* podium finale — top 3 on the podium, the rest of the field beside it */
  .pv-podium-wrap { display: flex; align-items: flex-end; justify-content: center; gap: clamp(20px,4vw,64px); margin-top: 2vh; flex-wrap: wrap; }
  .pv-podium { display: flex; justify-content: center; align-items: flex-end; gap: clamp(10px,2.4vw,30px); }
  .pv-pod { display: flex; flex-direction: column; align-items: center; position: relative; }
  .pv-pod-crown { font-size: clamp(26px,3.6vw,46px); line-height: 1; animation: podCrown 2.4s ease-in-out infinite; transform-origin: bottom center; }
  .pv-pod-medal { font-size: clamp(28px,4.2vw,54px); line-height: 1; animation: pop .5s; }
  .pv-pod-name { font-weight: 800; font-size: clamp(15px,2vw,26px); margin: 6px 0 10px; max-width: 24vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
  .pv-pod-block { position: relative; width: clamp(86px,13vw,168px); height: 0; border-radius: 14px 14px 0 0; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start; gap: 2px; padding-top: 16px; font-weight: 900; color: #1a1205;
    box-shadow: 0 16px 44px rgba(0,0,0,.45); transition: height 1s cubic-bezier(.2,.85,.2,1); overflow: hidden; }
  .pv-pod-block::after { content: ''; position: absolute; left: 0; right: 0; top: 0; height: 42%;
    background: linear-gradient(180deg, rgba(255,255,255,.5), transparent); pointer-events: none; }
  .pv-pod-block.gold { background: linear-gradient(180deg,#fde68a,#f59e0b); }
  .pv-pod-block.silver { background: linear-gradient(180deg,#f1f5f9,#94a3b8); }
  .pv-pod-block.bronze { background: linear-gradient(180deg,#fcd9b6,#d97706); }
  .pv-pod-place { font-size: clamp(26px,3.2vw,42px); line-height: 1; opacity: .32; font-weight: 900; }
  .pv-pod-score { font-size: clamp(22px,3.4vw,46px); line-height: 1.05; }
  /* the rest of the field — a no-scroll table that grows into columns (filled top-to-bottom) so everyone shows */
  .pv-pod-rest { text-align: left; display: flex; flex-direction: column; align-self: center; }
  .pv-pod-rest-head { font-size: clamp(12px,1.4vw,15px); text-transform: uppercase; letter-spacing: 1.5px; color: var(--pv-ink-soft); margin-bottom: 10px; font-weight: 800; }
  .pv-pod-rest-list { display: grid; grid-auto-flow: column; grid-template-rows: repeat(2, auto); gap: 6px 12px; }
  .pv-pod-rest-row { display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 10px; min-width: 150px;
    background: var(--pv-tile); border: 1px solid var(--pv-tile-border); border-radius: 10px; padding: 7px 12px; animation: optIn .4s both; }
  .pv-pod-rest-rank { color: var(--pv-ink-soft); font-weight: 800; font-variant-numeric: tabular-nums; text-align: center; }
  .pv-pod-rest-name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pv-pod-rest-score { font-weight: 800; font-variant-numeric: tabular-nums; }
  .pv-pod-rest-row.top { border-color: #fbbf24; }
  .pv-pod-rest-row.top .pv-pod-rest-rank { color: #fbbf24; }
  @keyframes podCrown { 0%,100% { transform: translateY(0) rotate(-6deg); } 50% { transform: translateY(-5px) rotate(6deg); } }

  /* clean, snappy scroll areas — no chunky OS scrollbar */
  .pv-tally, .pv-bgrid, .pv-jump-list { scrollbar-width: none; -ms-overflow-style: none; overscroll-behavior: contain; }
  .pv-tally::-webkit-scrollbar, .pv-bgrid::-webkit-scrollbar, .pv-jump-list::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* ---- hamburger (mobile nav toggle) ---- */
  .hamburger { display: none; font-size: 20px; flex: 0 0 auto; }
  .nav-backdrop { position: fixed; inset: 0; background: rgba(20,28,48,.4); z-index: 65; display: none; }
  .nav-backdrop.open { display: block; }

  /* ---- mobile: maker app + show ---- */
  @media (max-width: 860px) {
    .topbar { flex-wrap: nowrap; overflow-x: auto; gap: 8px; padding: 8px 10px; -webkit-overflow-scrolling: touch; }
    .topbar .saved { display: none; }
    .topbar .btn .lbl { display: none; }
    .topbar .btn { padding: 8px 10px; flex: 0 0 auto; }
    .brand { flex: 0 0 auto; } .brand small { display: none; }
    .deck-name { min-width: 120px; width: 120px; flex: 0 0 auto; }
    .hamburger { display: inline-flex; }
    /* mobile = ONE screen at a time: Streams → Slides(questions) → Edit slide (drill-down) */
    .main { position: relative; display: block; }
    .col, .editor { position: absolute; inset: 0; overflow-y: auto; display: none; border-right: none; }
    .main[data-mview="streams"] .col-streams { display: block; }
    .main[data-mview="slides"]  .col-slides  { display: block; }
    .main[data-mview="editor"]  .editor      { display: block; }
    .btn.m-back { display: inline-flex; }
    .editor { padding: 16px 14px; }
    .card { padding: 16px; max-width: none; }
  }
  @media (max-width: 760px) {
    .pv-main { padding: 3vh 4vw; }
    .pv-main.has-timer { padding-top: clamp(120px, 22vh, 170px); }
    .present.branded .pv-main.has-timer { padding-top: calc(clamp(120px, 22vh, 170px) + 44px); }
    .pv-timer { transform: translateX(-50%) scale(.62); transform-origin: top center; }
    .pv-options { grid-template-columns: 1fr; }
    .pv-tally, .pv-bgrid { grid-template-columns: 1fr; }
    .pv-controls { gap: 8px; padding: 10px; }
    .pv-hint { display: none; }
    .pv-step { min-width: 54px; }
    .pv-advance, .pv-hold, .pv-locked { min-width: 150px; }
    .pv-stream-sel { max-width: 120px; }
    .pv-btn { padding: 9px 12px; }
  }
</style>
</head>
<body>
<div class="app">

            <h3>Streams</h3>
            <button class="btn sm" id="addStream">+ Stream</button>
          </div>

        </div>
      </aside>
      <aside class="col col-slides">
        <div class="sect" style="flex:1;">
          <div class="sect-head">
            <button class="btn ghost sm m-back" id="slidesBack">← Streams</button>
