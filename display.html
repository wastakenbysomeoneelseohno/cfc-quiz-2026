<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CFC Quiz · Display</title>
<style>
  :root { --accent:#4f46e5; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: var(--font); background: radial-gradient(120% 100% at 50% 0%, #232c45 0%, #11162a 55%, #0a0e1d 100%); color: #fff; }

  /* ---------- landing ---------- */
  .landing { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6vh 5vw; }
  .card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.12); border-radius: 18px;
    box-shadow: 0 24px 70px rgba(0,0,0,.4); padding: 38px 40px; width: min(560px, 94vw); animation: pop .3s cubic-bezier(.2,.8,.3,1.1); }
  .card h1 { margin: 0 0 4px; font-size: 30px; }
  .card .brand-dot { width: 14px; height: 14px; border-radius: 4px; background: var(--accent); display: inline-block; vertical-align: middle; margin-right: 8px; box-shadow: 0 0 0 5px rgba(79,70,229,.25); }
  .card .sub { color: #9fb0d0; margin: 0 0 26px; }
  .step { display: none; }
  .step.on { display: block; animation: fade .25s; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-weight: 600; margin-bottom: 7px; color: #cdd6e6; }
  .field input[type=number], .field select { width: 100%; padding: 12px 13px; border-radius: 10px; border: 1px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.08); color: #fff; font-size: 16px; font-weight: 600; }
  .field select option { color: #111; }
  .drop { border: 2px dashed rgba(255,255,255,.25); border-radius: 14px; padding: 30px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
  .drop:hover { border-color: var(--accent); background: rgba(79,70,229,.1); }
  .drop .big { font-size: 40px; margin-bottom: 8px; }
  .drop .hint { color: #9fb0d0; font-size: 13px; margin-top: 6px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .check { display: flex; align-items: center; gap: 9px; color: #cdd6e6; font-weight: 600; cursor: pointer; user-select: none; }
  .check input { width: 18px; height: 18px; accent-color: var(--accent); }
  .btn { border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1); color: #fff; padding: 12px 22px; border-radius: 11px; font-weight: 700; font-size: 16px; cursor: pointer; font-family: inherit; transition: background .15s; }
  .btn:hover { background: rgba(255,255,255,.2); }
  .btn.primary { background: var(--accent); border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.block { width: 100%; }
  .errline { color: #ff8da3; font-size: 13px; min-height: 18px; margin-top: 6px; }
  .loaded { background: rgba(47,211,154,.14); border: 1px solid #2fd39a; border-radius: 12px; padding: 12px 14px; margin-bottom: 18px; }
  .loaded b { color: #7ef0bf; }
  .resume { background: rgba(79,70,229,.16); border: 1px solid var(--accent); border-radius: 12px; padding: 14px; margin-bottom: 18px; animation: pop .3s; }
  .resume .r-title { font-weight: 700; margin-bottom: 4px; }
  .resume .r-sub { color: #9fb0d0; font-size: 13px; margin-bottom: 12px; }

  /* ============================================================
     SHOW (the live screen) — mirrors the Maker engine.
     ============================================================ */
  .present { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column;
    --pv-bg: radial-gradient(120% 100% at 50% 0%, #232c45 0%, #11162a 55%, #0a0e1d 100%);
    --pv-ink:#fff; --pv-ink-soft: rgba(255,255,255,.62); --pv-accent:#4f46e5; --pv-accent2:#8b5cf6;
    --pv-correct:#2fd39a; --pv-correct-soft: rgba(47,211,154,.18); --pv-tile: rgba(255,255,255,.06);
    --pv-tile-border: rgba(255,255,255,.12); --pv-heading-font: var(--font); --pv-body-font: var(--font);
    --pv-on-accent:#fff; --pv-on-correct:#06231a;
    background: var(--pv-bg); color: var(--pv-ink); font-family: var(--pv-body-font); }
  .present.open { display: flex; }
  .pv-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 5vh 6vw; overflow: hidden; position: relative; }
  .pv-stage { width: 100%; max-width: 1120px; text-align: center; animation: pvIn .5s cubic-bezier(.2,.85,.25,1); }
  .pv-badge { display: inline-block; font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--pv-ink-soft);
    border: 1px solid var(--pv-tile-border); padding: 6px 14px; border-radius: 20px; margin-bottom: 3vh; }
  .pv-q { font-size: clamp(26px, 4.6vw, 54px); font-weight: 800; line-height: 1.16; letter-spacing: -.5px; margin: 0 auto 3vh; max-width: 16ch; font-family: var(--pv-heading-font); }
  .pv-sub { color: var(--pv-ink-soft); font-size: clamp(16px, 2.2vw, 26px); margin-top: 2vh;
    white-space: pre-line; line-height: 1.45; max-width: 26em; margin-left: auto; margin-right: auto; text-align: left; }
  .pv-title-huge { font-size: clamp(46px, 9vw, 124px); font-weight: 900; letter-spacing: -1.5px; line-height: 1.02; color: var(--pv-ink); font-family: var(--pv-heading-font); }
  .pv-media { margin: 0 auto 3vh; max-width: min(620px, 64vw); }
  .pv-media img { width: 100%; border-radius: 18px; box-shadow: 0 24px 70px rgba(0,0,0,.55); }
  .pv-options { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; max-width: 940px; margin: 0 auto; }
  .pv-options.n1 { grid-template-columns: 1fr; max-width: 560px; }
  .pv-opt { display: flex; align-items: center; gap: 16px; padding: clamp(14px,2vh,22px) 22px; text-align: left;
    background: var(--pv-tile); border: 2px solid var(--pv-tile-border); border-radius: 14px;
    font-size: clamp(17px, 2.3vw, 27px); font-weight: 600; animation: optIn .45s both; transition: all .45s cubic-bezier(.2,.8,.2,1); }
  .pv-letter { width: 44px; height: 44px; flex: 0 0 auto; border-radius: 11px; background: var(--pv-accent); color: var(--pv-on-accent);
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; }
  .pv-opt-text { flex: 1; }
  .pv-opt.correct { background: var(--pv-correct-soft); border-color: var(--pv-correct); transform: scale(1.03);
    box-shadow: 0 0 0 3px var(--pv-correct-soft), 0 16px 44px var(--pv-correct-soft); }
  .pv-opt.correct .pv-letter { background: var(--pv-correct); color: var(--pv-on-correct); }
  .pv-opt.dim { opacity: .38; filter: saturate(.4); }
  .pv-check { margin-left: auto; color: var(--pv-correct); font-weight: 900; font-size: 1.4em; }
  .pv-answer { font-size: clamp(30px, 5.5vw, 70px); font-weight: 900; color: var(--pv-correct); margin-top: 1vh; animation: pop .45s; }
  .pv-passage { font-size: clamp(22px, 3.2vw, 40px); font-weight: 600; line-height: 1.35; max-width: 22ch; margin: 0 auto; }

  /* timer */
  .pv-timer { position: absolute; top: 2.5vh; left: 50%; transform: translateX(-50%); width: 230px; height: 230px; z-index: 4; }
  .pv-timer .num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 82px; font-variant-numeric: tabular-nums; }
  .pv-timer .num.long { font-size: 58px; }
  .pv-timer .prog { stroke: var(--pv-ink); }
  .pv-timer.warn .prog { stroke: #ff6b81 !important; }
  .pv-timer.warn .num { color: #ff6b81; animation: tick .5s infinite; }
  .pv-timer.ended { display: none; }
  .pv-timesup { position: absolute; top: 5vh; left: 50%; transform: translateX(-50%); z-index: 5; white-space: nowrap;
    font-size: clamp(46px, 8vw, 108px); font-weight: 900; color: #ff6b81; text-shadow: 0 8px 34px rgba(255,107,129,.5); animation: timesupPop .5s cubic-bezier(.2,.9,.3,1.3); }

  .pv-buzz { margin-top: 3vh; display: inline-flex; align-items: center; gap: 14px; background: linear-gradient(180deg,#ff4d63,#e11d36);
    color: #fff; padding: 18px 44px; border-radius: 50px; font-size: clamp(22px,3vw,34px); font-weight: 900; box-shadow: 0 16px 44px rgba(225,29,54,.5); animation: buzzPulse 1.2s infinite; }

  /* matching */
  .pv-cols { display: flex; gap: clamp(20px,5vw,70px); justify-content: center; align-items: flex-start; }
  .pv-col { display: flex; flex-direction: column; gap: 12px; }
  .pv-mitem { background: var(--pv-tile); border: 1px solid var(--pv-tile-border); border-radius: 12px; padding: 14px 22px; font-weight: 600; min-width: 190px; font-size: clamp(16px,1.9vw,22px); animation: optIn .4s both; }
  .pv-pairlist { display: flex; flex-direction: column; gap: 10px; max-width: 640px; margin: 0 auto; }
  .pv-pair-row { display: flex; align-items: center; gap: 14px; justify-content: center; font-size: clamp(17px,2.1vw,26px); font-weight: 600; animation: optIn .4s both; }
  .pv-pair-row .ar { color: var(--pv-correct); font-weight: 900; }

  /* leaderboard slide (bars) */
  .pv-board { max-width: 780px; margin: 0 auto; text-align: left; display: flex; flex-direction: column; gap: 11px; }
  .pv-board-row { display: flex; align-items: center; gap: 16px; }
  .pv-rank { width: 40px; font-weight: 800; color: var(--pv-ink-soft); font-size: 20px; text-align: center; }
  .pv-rank.top { color: #fbbf24; }
  .pv-team { width: 130px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pv-bar { flex: 1; height: 32px; background: var(--pv-tile); border-radius: 8px; overflow: hidden; }
  .pv-bar-fill { height: 100%; width: 0; border-radius: 8px; background: linear-gradient(90deg, var(--pv-accent), var(--pv-accent2)); transition: width 1.1s cubic-bezier(.2,.85,.2,1); }
  .pv-score { width: 66px; text-align: right; font-weight: 800; font-size: 20px; }

  /* score tally (2 columns) */
  .pv-tally { display: grid; grid-template-columns: repeat(2, minmax(280px, 1fr)); gap: 8px 22px; width: min(960px, 95vw); margin: 2.5vh auto 0; max-height: 62vh; overflow: auto; padding: 4px; }
  .pv-trow { display: flex; align-items: center; gap: 12px; background: var(--pv-tile); border: 1px solid var(--pv-tile-border); border-radius: 12px; padding: 7px 12px; transition: background .15s; }
  .pv-trow.plus { background: var(--pv-correct-soft); border-color: var(--pv-correct); }
  .pv-trow.minus { background: rgba(255,93,115,.18); border-color: #ff5d73; }
  .pv-tname { flex: 1; font-weight: 700; font-size: 18px; text-align: left; }
  .pv-tscore { min-width: 44px; text-align: right; font-weight: 900; font-size: 22px; }
  .pv-mark { width: 46px; height: 46px; border-radius: 10px; border: 1px solid var(--pv-tile-border); background: var(--pv-tile); color: var(--pv-ink); font-size: 22px; font-weight: 800; cursor: pointer; transition: all .15s; }
  .pv-mark:hover { filter: brightness(1.25); }
  .pv-mark.check.on { background: #2fd39a; border-color: #2fd39a; color: #06231a; }
  .pv-mark.cross.on { background: #ff5d73; border-color: #ff5d73; color: #fff; }
  .pv-award { display: flex; justify-content: center; margin-top: 2.5vh; }
  .pv-submit { background: var(--pv-accent); color: var(--pv-on-accent); border: none; border-radius: 12px; padding: 12px 30px; font-weight: 800; font-size: 16px; cursor: pointer; }
  .pv-submit:hover { filter: brightness(1.08); }
  .pv-award-status { text-align: center; color: var(--pv-ink-soft); margin-top: 12px; min-height: 18px; }

  /* standings overlay (2 columns) */
  .pv-board-overlay { position: absolute; inset: 0; z-index: 20; background: #0a0e1d; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4vh 5vw; animation: fade .2s; }
  .pv-board-title { font-size: clamp(22px, 3.6vw, 42px); font-weight: 900; margin-bottom: 1.5vh; }
  .pv-board-hint { color: #9fb0d0; font-size: 13px; margin: 0 0 3vh; }
  .pv-bgrid { display: grid; grid-template-columns: repeat(2, minmax(260px, 1fr)); gap: 8px 22px; width: min(940px, 95vw); max-height: 66vh; overflow: auto; padding: 4px; }
  .pv-brow { display: flex; align-items: center; gap: 10px; padding: 7px 12px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14); border-radius: 10px; }
  .pv-brow.lead { border-color: #fbbf24; background: rgba(251,191,36,.1); }
  .pv-board-overlay .pv-rank { color: #9fb0d0; width: 32px; }
  .pv-board-overlay .pv-rank.top { color: #fbbf24; }
  .pv-bteam { flex: 1; font-weight: 700; font-size: 16px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pv-bscore { min-width: 40px; text-align: right; font-weight: 900; font-size: 20px; color: #fff; }
  .pv-bpm { width: 34px; height: 34px; flex: 0 0 auto; border-radius: 8px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1); color: #fff; font-size: 18px; font-weight: 800; cursor: pointer; }
  .pv-bpm:hover { filter: brightness(1.3); }
  .pv-bpm.plus { background: var(--pv-accent); border-color: var(--pv-accent); color: var(--pv-on-accent); }

  /* controls */
  .pv-controls { display: flex; align-items: center; justify-content: safe center; gap: 12px; padding: 13px; background: #0c1124; border-top: 1px solid rgba(255,255,255,.08); color: #fff;
    flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; -ms-overflow-style: none; }
  .pv-controls::-webkit-scrollbar { display: none; }
  .pv-controls > * { flex: 0 0 auto; }
  .pv-step { color: #9fb0d0; font-size: 13px; min-width: 86px; text-align: center; font-variant-numeric: tabular-nums; }
  .pv-btn2 { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.18); border-radius: 10px; padding: 10px 16px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s; }
  .pv-btn2:hover { background: rgba(255,255,255,.2); }
  .pv-btn2.sm { padding: 8px 13px; font-size: 13px; }
  .pv-btn2.primary { background: var(--pv-accent); border-color: var(--pv-accent); color: var(--pv-on-accent); }
  .pv-btn2.warn { background: rgba(255,107,129,.16); border-color: rgba(255,107,129,.5); }
  .pv-btn2.warn:hover { background: rgba(255,107,129,.28); }
  .pv-btn2[disabled] { opacity: .55; pointer-events: none; }
  .pv-stream-sel { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.18); border-radius: 10px; padding: 9px 10px; font-weight: 600; max-width: 190px; font-family: inherit; }
  .pv-stream-sel option { color: #111; }
  .pv-timerctl { display: flex; gap: 8px; }
  .pv-hint { color: #6b7690; font-size: 12px; margin-left: 6px; }
  .pv-advance { min-width: 240px; display: flex; justify-content: center; }
  .pv-hold { position: relative; overflow: hidden; border: 1px solid var(--pv-accent); background: rgba(255,255,255,.08); color: #fff; border-radius: 12px; padding: 12px 26px; font-weight: 700; font-size: 15px; cursor: pointer; user-select: none; min-width: 240px; font-family: inherit; }
  .pv-hold:hover { background: rgba(255,255,255,.15); }
  .pv-hold.holding { box-shadow: 0 0 0 3px rgba(127,127,255,.35); }
  .pv-hold-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0; z-index: 0; background: var(--pv-accent); opacity: .55; }
  .pv-hold-label { position: relative; z-index: 1; display: inline-flex; align-items: center; gap: 8px; color: #fff; }
  .pv-hold-label::before { content: '⊙'; font-size: 14px; opacity: .85; }
  .pv-locked { min-width: 240px; text-align: center; color: #9fb0d0; font-size: 13px; padding: 12px; border: 1px dashed rgba(255,255,255,.18); border-radius: 12px; }
  .pv-trophy { cursor: default; }
  .pv-jump { position: absolute; inset: 0; z-index: 25; background: rgba(8,12,28,.96); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5vh 6vw; animation: fade .15s; }
  .pv-jump-title { font-size: 22px; font-weight: 800; margin-bottom: 18px; color: #fff; }
  .pv-jump-hint { color: #9fb0d0; font-size: 13px; margin: -8px 0 18px; }
  .pv-jump-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; width: min(940px, 95vw); max-height: 64vh; overflow: auto; padding: 4px; align-items: start; }
  .pv-jnum { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14); border-radius: 10px; overflow: hidden; }
  .pv-jnum.open { border-color: var(--pv-accent); }
  .pv-jnum-head { width: 100%; display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: transparent; border: none; color: #fff; cursor: pointer; font-family: inherit; text-align: left; }
  .pv-jnum-head:hover { background: rgba(255,255,255,.06); }
  .pv-jnum-n { font-size: 24px; font-weight: 900; min-width: 34px; }
  .pv-jnum-k { font-size: 11px; color: #9fb0d0; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .pv-jnum-body { display: none; padding: 0 16px 14px; }
  .pv-jnum.open .pv-jnum-body { display: block; }
  .pv-jnum-q { font-size: 15px; color: #dbe2ee; margin-bottom: 10px; }

  @keyframes pop { from { opacity: 0; transform: scale(.96) translateY(-4px); } to { opacity: 1; transform: none; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pvIn { from { opacity: 0; transform: translateY(22px) scale(.985); } to { opacity: 1; transform: none; } }
  @keyframes optIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @keyframes buzzPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes tick { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
  @keyframes timesupPop { from { opacity: 0; transform: translateX(-50%) scale(.7); } to { opacity: 1; transform: translateX(-50%) scale(1); } }

  /* ---- timer clearance + auto-fit ---- */
  /* the ring is ~250px tall pinned at the top; reserve enough so content never sits under it */
  .pv-main.has-timer { padding-top: 262px; }

  /* ---- points + option caption (sit near the options, never under the ring) ---- */
  .pv-points { display: inline-block; margin: 0 auto 2.6vh; font-weight: 800; font-size: clamp(14px, 1.7vw, 19px);
    color: var(--pv-on-accent); background: var(--pv-accent); padding: 5px 16px; border-radius: 20px; box-shadow: 0 6px 18px rgba(0,0,0,.25); }
  .pv-ocap { display: flex; gap: 9px; justify-content: center; flex-wrap: wrap; margin: 0 auto 1.8vh; }
  .pv-ocap-pill { font-size: clamp(11px, 1.3vw, 14px); font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--pv-ink-soft); border: 1px solid var(--pv-tile-border); padding: 6px 14px; border-radius: 20px; }

  /* marking a team: pop the row and light its green/red background (committed on advance) */
  .pv-trow { position: relative; }
  .pv-trow.plus, .pv-trow.minus { animation: markPop .28s ease; }
  @keyframes markPop { 0% { transform: scale(.99); } 45% { transform: scale(1.02); } 100% { transform: scale(1); } }

  /* question progress label (small, top-left corner; only on question slides) */
  .pv-progress { position: absolute; top: 2.6vh; left: 3vw; font-size: clamp(12px,1.5vw,16px); font-weight: 700;
    letter-spacing: 1px; color: var(--pv-ink-soft); z-index: 4; font-variant-numeric: tabular-nums; }

  /* podium finale — top 3 on the podium, the rest of the field beside it */
  .pv-podium-wrap { display: flex; align-items: flex-end; justify-content: center; gap: clamp(20px,4vw,64px); margin-top: 2vh; flex-wrap: wrap; }
  .pv-podium { display: flex; justify-content: center; align-items: flex-end; gap: clamp(10px,2.4vw,30px); }
  .pv-pod { display: flex; flex-direction: column; align-items: center; position: relative; }
  .pv-pod-crown { font-size: clamp(26px,3.6vw,46px); line-height: 1; animation: podCrown 2.4s ease-in-out infinite; transform-origin: bottom center; }
  .pv-pod-medal { font-size: clamp(28px,4.2vw,54px); line-height: 1; animation: pop .5s; }
  .pv-pod-name { font-weight: 800; font-size: clamp(15px,2vw,26px); margin: 6px 0 10px; max-width: 24vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
  .pv-pod-block { position: relative; width: clamp(86px,13vw,168px); height: 0; border-radius: 14px 14px 0 0; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start; gap: 2px; padding-top: 16px; font-weight: 900; color: #1a1205;
    box-shadow: 0 16px 44px rgba(0,0,0,.45); transition: height 1s cubic-bezier(.2,.85,.2,1); overflow: hidden; }
  .pv-pod-block::after { content: ''; position: absolute; left: 0; right: 0; top: 0; height: 42%;
    background: linear-gradient(180deg, rgba(255,255,255,.5), transparent); pointer-events: none; }
  .pv-pod-block.gold { background: linear-gradient(180deg,#fde68a,#f59e0b); }
  .pv-pod-block.silver { background: linear-gradient(180deg,#f1f5f9,#94a3b8); }
  .pv-pod-block.bronze { background: linear-gradient(180deg,#fcd9b6,#d97706); }
  .pv-pod-place { font-size: clamp(26px,3.2vw,42px); line-height: 1; opacity: .32; font-weight: 900; }
  .pv-pod-score { font-size: clamp(22px,3.4vw,46px); line-height: 1.05; }
  /* the rest of the field — a no-scroll table that grows into columns (filled top-to-bottom) so everyone shows */
  .pv-pod-rest { text-align: left; display: flex; flex-direction: column; align-self: center; }
  .pv-pod-rest-head { font-size: clamp(12px,1.4vw,15px); text-transform: uppercase; letter-spacing: 1.5px; color: var(--pv-ink-soft); margin-bottom: 10px; font-weight: 800; }
  .pv-pod-rest-list { display: grid; grid-auto-flow: column; grid-template-rows: repeat(2, auto); gap: 6px 12px; }
  .pv-pod-rest-row { display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 10px; min-width: 150px;
    background: var(--pv-tile); border: 1px solid var(--pv-tile-border); border-radius: 10px; padding: 7px 12px; animation: optIn .4s both; }
  .pv-pod-rest-rank { color: var(--pv-ink-soft); font-weight: 800; font-variant-numeric: tabular-nums; text-align: center; }
  .pv-pod-rest-name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pv-pod-rest-score { font-weight: 800; font-variant-numeric: tabular-nums; }
  .pv-pod-rest-row.top { border-color: #fbbf24; }
  .pv-pod-rest-row.top .pv-pod-rest-rank { color: #fbbf24; }
  @keyframes podCrown { 0%,100% { transform: translateY(0) rotate(-6deg); } 50% { transform: translateY(-5px) rotate(6deg); } }

  /* clean, snappy scroll areas — no chunky OS scrollbar */
  .pv-tally, .pv-bgrid, .pv-jump-list { scrollbar-width: none; -ms-overflow-style: none; overscroll-behavior: contain; }
  .pv-tally::-webkit-scrollbar, .pv-bgrid::-webkit-scrollbar, .pv-jump-list::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* mobile */
  @media (max-width: 760px) {
    .pv-main { padding: 3vh 4vw; }
    .pv-main.has-timer { padding-top: clamp(120px, 22vh, 170px); }
    .pv-timer { transform: translateX(-50%) scale(.62); transform-origin: top center; }
    .pv-options { grid-template-columns: 1fr; }
    .pv-tally, .pv-bgrid { grid-template-columns: 1fr; }
    .pv-controls { gap: 8px; padding: 10px; }
    .pv-hint { display: none; }
    .pv-step { min-width: 54px; }
    .pv-advance, .pv-hold, .pv-locked { min-width: 150px; }
    .pv-stream-sel { max-width: 120px; }
    .pv-btn2 { padding: 9px 12px; }
  }
</style>

<body>
<div class="landing" id="landing">
  <div class="card">
    <h1><span class="brand-dot"></span>CFC Quiz · Display</h1>
    <p class="sub">Load a quiz file, set the teams, and run the show.</p>

    <!-- step 1: config -->
    <div class="step on" id="step1">
      <div class="drop" id="drop">
        <div class="big">📂</div>
        <div><b>Click to load a quiz file</b></div>
        <div class="hint">.json or encrypted .cfcq.json exported from the Maker</div>
      </div>
      <input type="file" id="file" accept="application/json,.json" hidden />
      <div id="pwArea" style="display:none; margin-top:18px;">
        <div class="field">
          <label>🔒 Password</label>
          <input type="password" id="pw" placeholder="Enter the file password" autocomplete="off" />
        </div>
        <button class="btn block primary" id="unlockBtn">🔓 Unlock</button>
      </div>
      <div class="errline" id="err1"></div>
    </div>

    <!-- step 2: teams -->
    <div class="step" id="step2">
      <div class="loaded" id="loaded"></div>
      <div class="resume" id="resumeBox" style="display:none;"></div>
      <div class="field">
        <label>Stream (quiz track)</label>
        <select id="streamSel"></select>
      </div>
      <div class="field">
        <label>Number of teams <span style="font-weight:400;opacity:.7">— shared by all streams</span></label>
        <input type="number" id="teamCount" min="1" max="99" value="20" />
      </div>
      <label class="check" style="margin-bottom:20px;"><input type="checkbox" id="resetScores" checked /> Start scores from 0 — uncheck to keep the running scoreboard</label>
      <div class="row">
        <button class="btn block primary" id="startBtn">▶ Start show</button>
        <button class="btn" id="backBtn" title="Load a different file">↺</button>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";
/* ================================================================
   CFC QUIZ — DISPLAY (run-the-show app)
   Open → load config (decrypt if needed) → set teams → run.
   Self-contained; mirrors the Maker's show engine.
   ================================================================ */
const el = (tag, props = {}, kids = []) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k === 'text') n.textContent = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (v === true) n.setAttribute(k, '');
    else if (v !== false && v != null) n.setAttribute(k, v);
  }
  (Array.isArray(kids) ? kids : [kids]).forEach(c => c != null && n.append(c.nodeType ? c : document.createTextNode(c)));
  return n;
};

/* ---------- theme ---------- */
const THEME_FONTS = {
  'System Sans':   '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
  'Georgia Serif': 'Georgia, "Times New Roman", serif',
  'Helvetica':     'Helvetica, Arial, sans-serif',
  'Trebuchet':     '"Trebuchet MS", Helvetica, sans-serif',
  'Palatino Serif':'"Palatino Linotype", "Book Antiqua", Palatino, serif',
  'Verdana':       'Verdana, Geneva, Tahoma, sans-serif',
};
const Theme = (() => {
  const fam = k => THEME_FONTS[k] || k;
  const hexToRgba = (hex, a) => { let h = (hex || '#000').replace('#', ''); if (h.length === 3) h = h.split('').map(c => c + c).join(''); const n = parseInt(h, 16); return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')'; };
  const lum = hex => { let h = (hex || '#000').replace('#', ''); if (h.length === 3) h = h.split('').map(c => c + c).join(''); const v = [0, 2, 4].map(i => { let x = parseInt(h.substr(i, 2), 16) / 255; return x <= 0.03928 ? x / 12.92 : Math.pow((x + 0.055) / 1.055, 2.4); }); return 0.2126 * v[0] + 0.7152 * v[1] + 0.0722 * v[2]; };
  const readableOn = hex => { const L = lum(hex); return (1.05 / (L + 0.05)) >= ((L + 0.05) / 0.05) ? '#ffffff' : '#0b1220'; };
  function bgCss(t) {
    if (t.bgType === 'solid') return t.bg1;
    if (t.bgType === 'radial') return 'radial-gradient(120% 100% at 50% 0%, ' + t.bg1 + ' 0%, ' + t.bg2 + ' 70%)';
    return 'linear-gradient(' + (t.angle || 160) + 'deg, ' + t.bg1 + ', ' + t.bg2 + ')';
  }
  function apply(elm, t) {
    if (!elm || !t) return;
    const set = (k, v) => elm.style.setProperty(k, v);
    set('--pv-bg', bgCss(t)); set('--pv-ink', t.ink); set('--pv-ink-soft', hexToRgba(t.ink, .62));
    set('--pv-accent', t.accent); set('--pv-accent2', t.accent);
    set('--pv-correct', t.correct); set('--pv-correct-soft', hexToRgba(t.correct, .18));
    set('--pv-on-accent', readableOn(t.accent)); set('--pv-on-correct', readableOn(t.correct));
    set('--pv-tile', hexToRgba(t.ink, .07)); set('--pv-tile-border', hexToRgba(t.ink, .16));
    set('--pv-heading-font', fam(t.headingFont)); set('--pv-body-font', fam(t.bodyFont));
  }
  function resolve(project, stream) {
    const themes = project.themes || [];
    const id = (stream && stream.themeId) || project.themeId;
    return themes.find(t => t.id === id) || themes[0] || { ink: '#fff', accent: '#4f46e5', correct: '#2fd39a', bgType: 'radial', bg1: '#232c45', bg2: '#0a0e1d', headingFont: 'System Sans', bodyFont: 'System Sans' };
  }
  return { apply, resolve, bgCss };
})();

/* ---------- crypto (decrypt) ---------- */
const CryptoBox = (() => {
  const enc = new TextEncoder(), dec = new TextDecoder();
  const subtle = (window.crypto && window.crypto.subtle) ? window.crypto.subtle : null;
  const b642ab = b64 => { const s = atob(b64); const b = new Uint8Array(s.length); for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i); return b.buffer; };
  async function deriveKey(password, salt) {
    const base = await subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 150000, hash: 'SHA-256' }, base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  }
  async function decrypt(file, password) {
    if (!subtle) throw new Error('Web Crypto unavailable');
    const salt = new Uint8Array(b642ab(file.salt)), iv = new Uint8Array(b642ab(file.iv));
    const key = await deriveKey(password, salt);
    const pt = await subtle.decrypt({ name: 'AES-GCM', iv }, key, b642ab(file.data));
    return JSON.parse(dec.decode(pt));
  }
  return { decrypt, available: !!subtle };
})();

/* ---------- scores ----------
   ONE scoreboard PER DECK (config file): all streams in a deck are parallel
   tracks played by the SAME teams, so scores carry across streams — but a
   different deck gets its own untouched scoreboard. use(deckKey) selects the
   bucket when a file is loaded; the streamId argument is kept on the API so
   call sites don't care. */
const Scores = (() => {
  // deck-keyed buckets, Display-owned. d_ = display store; the Maker never
  // shares a key, so a Reset in the Maker can't touch a live event's scores.
  const KEY = 'd_cfc-quiz-scores-v1';
  let bucket = 'shared';
  const read = () => { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch (e) { return {}; } };
  let data = read();
  // read-merge-write: only this tab's bucket is replaced, so decks written by a parallel tab survive
  const save = () => { try { const cur = read(); if (data[bucket] === undefined) delete cur[bucket]; else cur[bucket] = data[bucket]; data = cur; localStorage.setItem(KEY, JSON.stringify(cur)); } catch (e) {} };
  function use(deckKey) { bucket = deckKey || 'shared'; data = read(); }
  function get(streamId, n) { const src = data[bucket] || []; const a = []; for (let i = 0; i < n; i++) a.push(src[i] || 0); return a; }
  function add(streamId, i, delta) { const a = data[bucket] || (data[bucket] = []); a[i] = (a[i] || 0) + delta; save(); }
  function set(streamId, i, value) { const a = data[bucket] || (data[bucket] = []); a[i] = value | 0; save(); }   // negatives allowed
  function reset(streamId) { delete data[bucket]; save(); }
  function hasAny() { return (data[bucket] || []).some(v => v); }
  function standings(streamId, n) { return get(streamId, n).map((score, i) => ({ name: 'Team ' + (i + 1), score, idx: i })).sort((a, b) => b.score - a.score); }
  return { use, get, add, set, reset, hasAny, standings };
})();

/* ---------- sessions — where each deck's show left off, keyed per deck,
   so reloading any known config file can offer to resume it ---------- */
const Session = (() => {
  const KEY = 'd_cfc-quiz-sessions-v1';   // d_ = display-owned resume sessions
  // read fresh on every operation and only touch our own deck's entry,
  // so parallel tabs running other decks are never rolled back
  const read = () => { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch (e) { return {}; } };
  const write = m => { try { localStorage.setItem(KEY, JSON.stringify(m)); } catch (e) {} };
  function save(deckKey, s) { if (!deckKey) return; const m = read(); m[deckKey] = s; write(m); }
  function load(deckKey) { return (deckKey && read()[deckKey]) || null; }
  function clear(deckKey) { if (!deckKey) return; const m = read(); delete m[deckKey]; write(m); }
  return { save, load, clear };
})();

/* ================================================================
   SHOW ENGINE
   ================================================================ */
const Show = (() => {
  const stage = kids => el('div', { class: 'pv-stage' }, kids);
  const badge = t => el('div', { class: 'pv-badge', text: t });
  const q = t => el('div', { class: 'pv-q', text: t || '' });
  const media = src => src ? el('div', { class: 'pv-media' }, [ el('img', { src }) ]) : null;
  const answer = t => el('div', { class: 'pv-answer', text: t });
  const shuffle = a => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
  const pointsOf = d => { const p = d && d.points; return (p == null || p === '') ? 1 : Number(p); };
  const ocap = parts => { const ps = parts.filter(Boolean); return ps.length ? el('div', { class: 'pv-ocap' }, ps.map(t => el('span', { class: 'pv-ocap-pill', text: t }))) : null; };
  function fitStage(main) {
    if (!main) return;
    const st = main.querySelector('.pv-stage'); if (!st) return;
    st.style.transform = ''; st.style.animation = '';
    const cs = getComputedStyle(main);
    const availH = main.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
    const availW = main.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
    const k = Math.min(1, availH / st.scrollHeight, availW / st.scrollWidth);
    if (k < 1) { st.style.animation = 'none'; st.style.transform = 'scale(' + k + ')'; }
  }
  function buildPodium(all) {
    const top = all.slice(0, 3), rest = all.slice(3);
    const wrap = el('div', { class: 'pv-podium-wrap' });
    const podium = el('div', { class: 'pv-podium' });
    const meta = [ { medal: '🥇', cls: 'gold', h: '34vh' }, { medal: '🥈', cls: 'silver', h: '24vh' }, { medal: '🥉', cls: 'bronze', h: '17vh' } ];
    [1, 0, 2].forEach(r => {           // render order 2nd–1st–3rd so the winner stands in the centre
      const t = top[r]; if (!t) return; const m = meta[r];
      const pod = el('div', { class: 'pv-pod' });
      if (r === 0) pod.append(el('div', { class: 'pv-pod-crown', text: '👑' }));
      pod.append(el('div', { class: 'pv-pod-medal', text: m.medal }), el('div', { class: 'pv-pod-name', text: t.name }));
      const block = el('div', { class: 'pv-pod-block ' + m.cls }, [
        el('div', { class: 'pv-pod-place', text: (r + 1) }),
        el('div', { class: 'pv-pod-score', text: t.score }) ]);
      block.dataset.h = m.h;   // target height — a quiet re-render snaps to it instead of replaying the grow
      pod.append(block); podium.append(pod);
      setTimeout(() => { block.style.height = m.h; }, 90);
    });
    wrap.append(podium);
    if (rest.length) {                 // everyone below 3rd, as a side scoreboard table
      const side = el('div', { class: 'pv-pod-rest' }, [ el('div', { class: 'pv-pod-rest-head', text: 'The rest of the field' }) ]);
      side.append(scoreTable(rest, 4)); wrap.append(side);
    }
    return wrap;
  }
  // a ranked rank/name/score table that lays itself out across columns to fit the space (every team shows)
  function scoreTable(teams, startRank) {
    startRank = startRank || 1;
    const list = el('div', { class: 'pv-pod-rest-list' });
    list.dataset.count = teams.length;
    teams.forEach((t, i) => {
      const row = el('div', { class: 'pv-pod-rest-row' + (startRank === 1 && i < 3 ? ' top' : '') }, [
        el('span', { class: 'pv-pod-rest-rank', text: (i + startRank) }),
        el('span', { class: 'pv-pod-rest-name', text: t.name }),
        el('span', { class: 'pv-pod-rest-score', text: t.score }) ]);
      row.style.animationDelay = (i * 0.04) + 's';
      list.append(row);
    });
    layoutRest(list, teams.length);
    return list;
  }
  // adapt a score table: more vertical space → more rows (fewer, wider columns). Recomputed on resize.
  function layoutRest(list, count) {
    if (!list || !count) return;
    const vh = window.innerHeight || 720;
    const rows = Math.max(2, Math.min(count, Math.floor((vh * 0.46) / 46)));
    list.style.gridTemplateRows = 'repeat(' + rows + ', auto)';
  }
  function optionsGrid(options, { reveal = false } = {}) {
    const opts = Array.isArray(options) ? options : [];
    const grid = el('div', { class: 'pv-options' + (opts.length <= 1 ? ' n1' : '') });
    opts.forEach((o, i) => {
      const correct = !!o.correct;
      const tile = el('div', { class: 'pv-opt' + (reveal && correct ? ' correct' : '') + (reveal && !correct ? ' dim' : '') });
      tile.style.animationDelay = (i * 0.08) + 's';
      tile.append(el('span', { class: 'pv-letter', text: String.fromCharCode(65 + i) }), el('span', { class: 'pv-opt-text', text: o.text || '' }));
      if (reveal && correct) tile.append(el('span', { class: 'pv-check', text: '✓' }));
      grid.append(tile);
    });
    return grid;
  }

  const Q2 = ['question', 'reveal', 'score'], SOLO = ['solo'];
  const renderers = {
    title: { phases: SOLO, render: d => stage([ el('div', { class: 'pv-title-huge', text: d.heading || 'Title' }), d.subheading ? el('div', { class: 'pv-sub', text: d.subheading }) : null ]) },
    answer: { phases: SOLO, render: d => stage([ badge('Answer'), el('div', { class: 'pv-q', text: d.heading || '' }), d.body ? el('div', { class: 'pv-passage', text: d.body }) : null ]) },
    leaderboard: { phases: SOLO, render: (d, ctx) => {
      const n = (ctx.stream && ctx.stream.teamCount) || 8;
      const teams = Scores.standings(ctx.stream.id, n);   // ALL teams, ranked
      return stage([ el('div', { class: 'pv-q', text: d.title || 'Standings' }), scoreTable(teams, 1) ]);
    } },
    podium: { phases: SOLO, render: (d, ctx) => {
      const n = (ctx.stream && ctx.stream.teamCount) || 8;
      const teams = Scores.standings(ctx.stream.id, n);
      return stage([ el('div', { class: 'pv-q', text: d.title || 'Winners!' }), buildPodium(teams) ]);
    } },
    'choices': { phases: Q2, render: (d, ctx) => stage([ media(d.media), q(d.question), ctx.phase === 'question' ? ocap([ d.choice && d.choice.multiple ? 'Select all that apply' : null ]) : null, optionsGrid((d.choice && d.choice.options) || [], { reveal: ctx.phase === 'reveal' }) ]) },
    'true-false': { phases: Q2, render: (d, ctx) => { const opts = [ { text: 'True', correct: d.answer === true }, { text: 'False', correct: d.answer === false } ]; return stage([ q(d.statement), optionsGrid(opts, { reveal: ctx.phase === 'reveal' }) ]); } },
    'short-answer': { phases: Q2, render: (d, ctx) => stage([ q(d.question), ctx.phase === 'reveal' ? answer(d.answer) : null ]) },
    'titled-question': { phases: Q2, render: (d, ctx) => stage([ d.title ? badge(d.title) : null, q(d.question), ctx.phase === 'reveal' ? answer(d.answer) : null ]) },
    'image-question': { phases: Q2, render: (d, ctx) => stage([ media(d.media), q(d.question), ctx.phase === 'reveal' ? answer(d.answer) : null ]) },
    matching: { phases: Q2, render: (d, ctx) => {
      const pairs = Array.isArray(d.pairs) ? d.pairs : [];
      if (ctx.phase === 'reveal') {
        const list = el('div', { class: 'pv-pairlist' });
        pairs.forEach((p, i) => { const row = el('div', { class: 'pv-pair-row' }, [ el('span', { text: p.left }), el('span', { class: 'ar', text: '↔' }), el('span', { text: p.right }) ]); row.style.animationDelay = (i * 0.07) + 's'; list.append(row); });
        return stage([ q(d.instruction), list ]);
      }
      const lefts = el('div', { class: 'pv-col' }), rights = el('div', { class: 'pv-col' });
      pairs.forEach(p => lefts.append(el('div', { class: 'pv-mitem', text: p.left })));
      stableShuffle(ctx.slideId, pairs).forEach(p => rights.append(el('div', { class: 'pv-mitem', text: p.right })));   // fixed order for the run — re-render (← Back) keeps it
      return stage([ q(d.instruction), el('div', { class: 'pv-cols' }, [ lefts, rights ]) ]);
    } },
    poll: { phases: ['question'], render: d => stage([ badge('Poll'), q(d.question), optionsGrid((d.options || []).map(o => ({ text: o.text })), { reveal: false }) ]) },
    buzzer: { phases: Q2, render: (d, ctx) => stage([ q(d.question), ctx.phase === 'question' ? el('div', { class: 'pv-buzz', text: '🔔 BUZZ!' }) : answer(d.answer) ]) },
  };

  function burst(host) {
    const colors = ['#4f46e5', '#2fd39a', '#fbbf24', '#ff6b81', '#8b5cf6'];
    for (let i = 0; i < 30; i++) {
      const p = el('div'); const ang = Math.random() * Math.PI * 2, dist = 120 + Math.random() * 240;
      p.style.cssText = 'position:absolute;left:50%;top:40%;width:9px;height:13px;border-radius:2px;z-index:6;background:' + colors[i % colors.length] + ';transform:translate(-50%,-50%);opacity:1;transition:transform 1s cubic-bezier(.1,.7,.2,1),opacity 1s;';
      host.append(p);
      requestAnimationFrame(() => { p.style.transform = 'translate(' + (Math.cos(ang) * dist) + 'px,' + (Math.sin(ang) * dist + 220) + 'px) rotate(' + (Math.random() * 720) + 'deg)'; p.style.opacity = '0'; });
      setTimeout(() => p.remove(), 1100);
    }
  }
  // long countdowns read as minutes (2:30); under a minute stays a big plain number
  const fmtClock = s => { s = Math.ceil(Math.max(0, s)); return s >= 60 ? Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0') : String(s); };
  function makeTimer(host, seconds, onDone, autoStart) {
    const size = 230, r = 104, C = 2 * Math.PI * r;
    const wrap = el('div', { class: 'pv-timer' });
    wrap.innerHTML = '<svg width="' + size + '" height="' + size + '"><circle cx="115" cy="115" r="' + r + '" stroke="rgba(255,255,255,.12)" stroke-width="13" fill="none"/><circle class="prog" cx="115" cy="115" r="' + r + '" stroke="#fff" stroke-width="13" fill="none" stroke-linecap="round" stroke-dasharray="' + C + '" stroke-dashoffset="0" transform="rotate(-90 115 115)"/></svg><div class="num"></div>';
    host.append(wrap);
    const prog = wrap.querySelector('.prog'), num = wrap.querySelector('.num');
    // DEADLINE-based clock: remaining is derived from wall-clock (endAt), never from frame deltas,
    // so an occluded window (rAF suspended — e.g. the score-console popup covering the show) can't
    // freeze it or make it jump. A setInterval fallback still fires Time's-up while rAF is throttled.
    const now = () => performance.now();
    let remaining = seconds, displayMax = seconds, running = false, fired = false, endAt = 0, raf = null, iv = null;
    function compute() { if (running) remaining = Math.max(0, (endAt - now()) / 1000); return remaining; }
    function paint() { const txt = fmtClock(remaining); num.textContent = txt; num.classList.toggle('long', txt.length > 3); prog.style.strokeDashoffset = (C * (displayMax > 0 ? 1 - Math.max(0, remaining) / displayMax : 1)).toString(); wrap.classList.toggle('warn', remaining <= 5 && running); }
    function stopLoops() { if (raf) { cancelAnimationFrame(raf); raf = null; } if (iv) { clearInterval(iv); iv = null; } }
    function fire() { running = false; remaining = 0; stopLoops(); paint(); if (!fired) { fired = true; wrap.classList.add('ended'); host.append(el('div', { class: 'pv-timesup', text: '⏰ Time’s up!' })); if (onDone) onDone(); } }

  function close() {
    flushScore();
    if (stopTimer) { stopTimer(); stopTimer = null; }
    if (advanceCtl) { advanceCtl.cancel(); advanceCtl = null; }   // a held button must not fire after Exit
    closeConsole();                                    // the private console belongs to this show
    overlay.querySelectorAll('.pv-jump').forEach(e => e.remove()); // don't leave stale overlays for the next open
    overlay.classList.remove('open');
    window.removeEventListener('resize', onResize);
    if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
    document.getElementById('landing').style.display = 'flex';
    if (onCloseCb) onCloseCb();
  }
  // no keyboard shortcuts — every action is an on-screen button click (Esc does NOT exit)

  return { open, next, prev, gotoSlide, openConsole, openJump, setOnClose: fn => { onCloseCb = fn; },
    info: () => ({ idx, len: steps.length, type: (steps[idx] && steps[idx].slide.type) || null }) };
})();
window.__CFCShow = Show; // test/automation hook (mirrors Maker's window.CFC)
window.__CFCScores = Scores;

/* ================================================================
   LANDING FLOW
   ================================================================ */
(() => {
  let project = null, fileName = '', deckKey = '';
  const $ = id => document.getElementById(id);
  const show = (s) => { $('step1').classList.toggle('on', s === 1); $('step2').classList.toggle('on', s === 2); };
  /* the deck's identity = deckname_timestamp: the Maker stamps exportedAt into the
     config, so the same file always maps to the same cached scores + session here
     (survives renames, distinguishes re-exports). Old unstamped files: file name. */
  const keyOf = (p, fn) => p.exportedAt ? (p.name || 'Untitled Deck') + '_' + p.exportedAt : 'file:' + fn;

  function migrateSlide(sl) {
    sl.options = sl.options || {};
    if (sl.type === 'multiple-choice' || sl.type === 'multiple-answer') {
      const opts = ((sl.data && sl.data.options) || []).map(o => ({ text: o.text || '', correct: !!o.correct }));
      sl.data.choice = { options: opts, multiple: sl.type === 'multiple-answer' }; delete sl.data.options; sl.type = 'choices';
    }
    return sl;
  }
  function normalize(p) {
    // deck-level team count (all streams share one scoreboard → one team count), mirrored onto every stream
    p.teamCount = Math.max(1, Math.min(99, Math.round(p.teamCount || (p.streams && p.streams[0] && p.streams[0].teamCount) || 20)));
    p.streams = (p.streams || []).map(s => ({ id: s.id || ('s' + Math.random().toString(36).slice(2)), name: s.name || 'Stream', teamCount: p.teamCount, themeId: s.themeId || null, slides: (s.slides || []).map(sl => migrateSlide({ id: sl.id || ('sl' + Math.random().toString(36).slice(2)), type: sl.type, data: sl.data || {}, options: sl.options || {} })) }));
    p.themes = p.themes || [];
    return p;
  }
  // set the deck's team count once, for every stream (shared scoreboard)
  function setDeckTeams(n) { const v = Math.max(1, Math.min(99, Math.round(Number(n) || 20))); project.teamCount = v; project.streams.forEach(s => s.teamCount = v); return v; }

  function useProject(p) {
    project = normalize(p);
    if (!project.streams.length) { $('err1').textContent = 'This file has no streams.'; return; }
    const sel = $('streamSel'); sel.innerHTML = '';
    project.streams.forEach(s => sel.append(el('option', { value: s.id, text: s.name + ' (' + s.slides.length + ' slides)' })));
    // teams are deck-level: one value for the whole deck, unchanged by which stream is selected
    $('teamCount').value = project.teamCount || 20;
    deckKey = keyOf(project, fileName);
    Scores.use(deckKey); // every deck gets its own scoreboard, shared by its streams
    // build with textContent — the deck name is file-controlled and must never reach innerHTML
    const ld = $('loaded'); ld.textContent = 'Loaded: ';
    ld.append(el('b', { text: project.name || 'Untitled Deck' }), ' · ' + project.streams.length + ' stream(s)');
    syncReset();
    renderResume();
    show(2);
  }

  /* protect live data: a deck that already has scores defaults to KEEPING them;
     only a deck with no scores yet defaults to starting from 0 */
  function syncReset() { $('resetScores').checked = !Scores.hasAny(); }

  /* known deck? offer to pick up exactly where its show stopped (scores kept) — or start fresh.
     Re-rendered every time the landing appears (load AND exit), so it never shows a stale spot. */
  function renderResume() {
    const box = $('resumeBox'); box.style.display = 'none'; box.innerHTML = '';
    const sess = Session.load(deckKey);
    if (!sess || !project) return;
    const stream = project.streams.find(s => s.id === sess.streamId);
    if (!stream || !stream.slides.length) return;
    box.append(
      el('div', { class: 'r-title', text: '⏯ Continue where you left off?' }),
      el('div', { class: 'r-sub', text: 'Last time you were on ' + sess.label + ' in “' + sess.streamName + '” — scores are kept.' }),
      el('div', { class: 'row' }, [
        el('button', { class: 'btn primary block', id: 'resumeBtn', text: '▶ Continue from ' + sess.label }),
        el('button', { class: 'btn', id: 'freshBtn', title: 'Start over from slide 1 with scores reset to 0', text: '↺ Start fresh' }),
      ]),
    );
    box.querySelector('#resumeBtn').onclick = () => {
      const cur = Session.load(deckKey) || sess; // always the LATEST saved spot
      const st = project.streams.find(s => s.id === cur.streamId) || stream;
      if (!st.slides || !st.slides.length) { $('err1').textContent = 'That stream has no slides any more.'; return; }
      setDeckTeams(cur.teamCount || project.teamCount);
      document.getElementById('landing').style.display = 'none';
      Show.open(project, st, { startIdx: cur.idx, fileName, deckKey, shuffleOrders: cur.shuffleOrders });   // keep e.g. matching column order across a crash/refresh
    };
    box.querySelector('#freshBtn').onclick = () => {
      // a real clean slate: slide 1, scoreboard zeroed, old session forgotten
      const sel = $('streamSel'); const st = project.streams.find(x => x.id === sel.value) || stream;
      if (!st.slides || !st.slides.length) { $('err1').textContent = 'That stream has no slides — pick another one.'; return; }   // guard BEFORE wiping anything
      setDeckTeams($('teamCount').value);
      Scores.reset(st.id);
      Session.clear(deckKey);
      document.getElementById('landing').style.display = 'none';
      Show.open(project, st, { startIdx: 0, fresh: true, fileName, deckKey });
    };
    box.style.display = 'block';
  }
  Show.setOnClose(() => { syncReset(); renderResume(); }); // exiting a show refreshes the landing

  let pendingEncrypted = null;
  function handleFile(f) {
    fileName = f.name || '';
    $('err1').textContent = ''; $('pwArea').style.display = 'none'; pendingEncrypted = null;
    const rd = new FileReader();
    rd.onload = () => {
      let data; try { data = JSON.parse(rd.result); } catch { $('err1').textContent = 'Not a valid JSON file.'; return; }
      if (data.kind === 'encrypted') { pendingEncrypted = data; $('pwArea').style.display = 'block'; $('pw').value = ''; $('pw').focus(); return; }
      if (data.app !== 'cfc-quiz' || !Array.isArray(data.streams)) { $('err1').textContent = 'Not a CFC Quiz file.'; return; }
      useProject(data);
    };
    rd.onerror = () => { $('err1').textContent = 'Could not read that file — try again.'; };
    rd.readAsText(f);
  }
  async function unlock() {
    if (!pendingEncrypted) return;
    if (!CryptoBox.available) { $('err1').textContent = 'This browser can’t decrypt here (insecure http:// page?). Open display.html as a local file or over https.'; return; }
    const pw = $('pw').value; if (!pw) { $('err1').textContent = 'Enter the password.'; return; }
    let data; try { data = await CryptoBox.decrypt(pendingEncrypted, pw); } catch (e) { $('err1').textContent = 'Wrong password or corrupted file.'; return; }
    if (data.app !== 'cfc-quiz' || !Array.isArray(data.streams)) { $('err1').textContent = 'Not a CFC Quiz file.'; return; }
    $('pw').value = ''; pendingEncrypted = null; $('pwArea').style.display = 'none';
    useProject(data);
  }

  $('drop').onclick = () => $('file').click();
  $('file').onchange = () => { if ($('file').files[0]) handleFile($('file').files[0]); $('file').value = ''; };
  $('unlockBtn').onclick = unlock;
  $('pw').onkeydown = e => { if (e.key === 'Enter') unlock(); };
  $('backBtn').onclick = () => { show(1); $('err1').textContent = ''; $('pwArea').style.display = 'none'; $('pw').value = ''; pendingEncrypted = null; };
  $('startBtn').onclick = () => {
    const sel = $('streamSel'); const stream = project.streams.find(x => x.id === sel.value); if (!stream) return;
    if (!stream.slides || !stream.slides.length) { const b = $('startBtn'), t = b.textContent; b.textContent = 'This stream has no slides'; b.disabled = true; setTimeout(() => { b.textContent = t; b.disabled = false; }, 1800); return; }
    setDeckTeams($('teamCount').value);
    if ($('resetScores').checked) Scores.reset(stream.id);
    document.getElementById('landing').style.display = 'none';
    Show.open(project, stream, { fileName, deckKey });
  };
})();
</script>
</body>
</html>
